<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Gateway Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--surface:#1e293b;--surface2:#334155;--border:#475569;--text:#e2e8f0;--text2:#94a3b8;--accent:#3b82f6;--green:#22c55e;--orange:#f59e0b;--red:#ef4444;--purple:#a78bfa}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{padding:20px 24px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:24px;font-weight:700}
.header .status{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--text2)}
.header .status .dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.main{padding:24px;max-width:1400px;margin:0 auto}
.tabs{display:flex;gap:8px;margin-bottom:24px;border-bottom:1px solid var(--border);padding-bottom:12px}
.tab{padding:8px 16px;border-radius:6px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:14px;transition:all .15s}
.tab:hover{color:var(--accent)}
.tab.active{background:var(--accent);color:#fff}
.tab-content{display:none}
.tab-content.active{display:block}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
.stat-card .label{font-size:13px;color:var(--text2);margin-bottom:8px}
.stat-card .value{font-size:32px;font-weight:700;color:var(--accent);margin-bottom:4px}
.stat-card .sub{font-size:12px;color:var(--text2)}
.chart-container{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:24px}
.chart-container .title{font-size:16px;font-weight:600;margin-bottom:16px}
.chart{height:300px;display:flex;align-items:flex-end;gap:8px;padding:20px 0}
.chart-bar{flex:1;background:var(--accent);border-radius:4px 4px 0 0;min-height:20px;position:relative;transition:all .3s}
.chart-bar:hover{background:var(--purple)}
.chart-bar .label{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--text2);white-space:nowrap}
.table-container{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.table{width:100%;border-collapse:collapse}
.table th{text-align:left;padding:12px 16px;background:var(--surface2);color:var(--text2);font-size:13px;font-weight:600;border-bottom:1px solid var(--border)}
.table td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:14px}
.table tr:last-child td{border-bottom:none}
.table tr:hover{background:var(--surface2)}
.btn{padding:8px 16px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;font-size:13px;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:#2563eb}
.btn.danger{background:var(--red);border-color:var(--red);color:#fff}
.btn.danger:hover{background:#dc2626}
.badge{display:inline-block;padding:4px 8px;border-radius:4px;font-size:11px;font-weight:600}
.badge.success{background:rgba(34,211,153,.2);color:var(--green)}
.badge.error{background:rgba(239,68,68,.2);color:var(--red)}
.badge.warning{background:rgba(251,191,36,.2);color:var(--orange)}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-content{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:500px;width:90%}
.modal-content .title{font-size:18px;font-weight:600;margin-bottom:16px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px}
.form-group input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-size:14px}
.form-group input:focus{outline:none;border-color:var(--accent)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.loading{text-align:center;padding:40px;color:var(--text2)}
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.empty .icon{font-size:64px;margin-bottom:16px;opacity:.5}
.toast{position:fixed;bottom:24px;right:24px;background:var(--accent);color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:2000}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="header">
<h1>🚀 LLM Gateway</h1>
<div class="status">
<span class="dot"></span>
<span id="statusText">运行中</span>
</div>
</div>

<div class="main">
<div class="tabs">
<button class="tab active" data-tab="overview" onclick="switchTab('overview')">📊 概览</button>
<button class="tab" data-tab="models" onclick="switchTab('models')">🤖 模型</button>
<button class="tab" data-tab="tokens" onclick="switchTab('tokens')">🔑 Token</button>
<button class="tab" data-tab="logs" onclick="switchTab('logs')">📝 日志</button>
</div>

<div class="tab-content active" id="overview">
<div class="stats-grid" id="statsGrid"></div>
<div class="chart-container">
<div class="title">每日用量趋势</div>
<div class="chart" id="dailyChart"></div>
</div>
<div class="chart-container">
<div class="title">模型使用分布</div>
<div class="chart" id="modelChart"></div>
</div>
</div>

<div class="tab-content" id="models">
<div class="table-container">
<table class="table" id="modelsTable">
<thead>
<tr>
<th>模型</th>
<th>Provider</th>
<th>请求数</th>
<th>Tokens</th>
<th>成本</th>
<th>平均延迟</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>

<div class="tab-content" id="tokens">
<div style="margin-bottom:16px">
<button class="btn primary" onclick="showCreateTokenModal()">+ 创建 Token</button>
</div>
<div class="table-container">
<table class="table" id="tokensTable">
<thead>
<tr>
<th>名称</th>
<th>Token</th>
<th>状态</th>
<th>创建时间</th>
<th>操作</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>

<div class="tab-content" id="logs">
<div class="table-container">
<table class="table" id="logsTable">
<thead>
<tr>
<th>时间</th>
<th>Token</th>
<th>模型</th>
<th>Tokens</th>
<th>成本</th>
<th>延迟</th>
<th>状态</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>
</div>

<div class="modal" id="createTokenModal">
<div class="modal-content">
<div class="title">创建 Access Token</div>
<div class="form-group">
<label>Token 名称</label>
<input type="text" id="tokenName" placeholder="例如：production-api">
</div>
<div class="modal-actions">
<button class="btn" onclick="hideCreateTokenModal()">取消</button>
<button class="btn primary" onclick="createToken()">创建</button>
</div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
let adminSecret=prompt('请输入 Admin Secret:','llm-gateway-secret-2026');
if(!adminSecret){adminSecret='llm-gateway-secret-2026'}

async function api(path,options={}){
  const res=await fetch(path,{
    ...options,
    headers:{
      'Authorization':`Bearer ${adminSecret}`,
      'Content-Type':'application/json',
      ...options.headers
    }
  });
  if(!res.ok)throw new Error(`API error: ${res.status}`);
  return res.json();
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.toggle('active',c.id===tab));
  if(tab==='overview')loadOverview();
  if(tab==='models')loadModels();
  if(tab==='tokens')loadTokens();
  if(tab==='logs')loadLogs();
}

async function loadOverview(){
  try{
    const data=await api('/admin/stats?days=7');
    const{overview,by_model,daily}=data;
    
    // Stats cards
    const grid=document.getElementById('statsGrid');
    grid.innerHTML=`
      <div class="stat-card">
        <div class="label">总请求数</div>
        <div class="value">${(overview.total_requests||0).toLocaleString()}</div>
        <div class="sub">最近 7 天</div>
      </div>
      <div class="stat-card">
        <div class="label">总 Tokens</div>
        <div class="value">${(overview.total_tokens||0).toLocaleString()}</div>
        <div class="sub">${(overview.total_prompt_tokens||0).toLocaleString()} 输入 + ${(overview.total_completion_tokens||0).toLocaleString()} 输出</div>
      </div>
      <div class="stat-card">
        <div class="label">总成本</div>
        <div class="value">$${(overview.total_cost||0).toFixed(4)}</div>
        <div class="sub">最近 7 天</div>
      </div>
      <div class="stat-card">
        <div class="label">平均延迟</div>
        <div class="value">${Math.round(overview.avg_latency||0)}ms</div>
        <div class="sub">${overview.error_count||0} 错误</div>
      </div>
    `;
    
    // Daily chart
    const dailyChart=document.getElementById('dailyChart');
    if(daily&&daily.length>0){
      const maxReq=Math.max(...daily.map(d=>d.requests));
      dailyChart.innerHTML=daily.map(d=>`
        <div class="chart-bar" style="height:${(d.requests/maxReq*100)||5}%" title="${d.date}: ${d.requests} 请求">
          <div class="label">${d.date.slice(5)}</div>
        </div>
      `).join('');
    }else{
      dailyChart.innerHTML='<div class="empty"><div class="icon">📊</div><p>暂无数据</p></div>';
    }
    
    // Model chart
    const modelChart=document.getElementById('modelChart');
    if(by_model&&by_model.length>0){
      const maxCost=Math.max(...by_model.map(m=>m.cost));
      modelChart.innerHTML=by_model.map(m=>`
        <div class="chart-bar" style="height:${(m.cost/maxCost*100)||5}%" title="${m.model}: $${m.cost.toFixed(4)}">
          <div class="label">${m.model.split('-')[0]}</div>
        </div>
      `).join('');
    }else{
      modelChart.innerHTML='<div class="empty"><div class="icon">🤖</div><p>暂无数据</p></div>';
    }
  }catch(e){
    showToast('加载失败: '+e.message);
  }
}

async function loadModels(){
  try{
    const data=await api('/admin/stats?days=7');
    const tbody=document.getElementById('modelsTable').querySelector('tbody');
    if(data.by_model&&data.by_model.length>0){
      tbody.innerHTML=data.by_model.map(m=>`
        <tr>
          <td>${m.model}</td>
          <td>-</td>
          <td>${m.requests.toLocaleString()}</td>
          <td>${m.tokens.toLocaleString()}</td>
          <td>$${m.cost.toFixed(4)}</td>
          <td>${Math.round(m.avg_latency)}ms</td>
        </tr>
      `).join('');
    }else{
      tbody.innerHTML='<tr><td colspan="6" class="empty">暂无数据</td></tr>';
    }
  }catch(e){
    showToast('加载失败: '+e.message);
  }
}

async function loadTokens(){
  try{
    const data=await api('/admin/tokens');
    const tbody=document.getElementById('tokensTable').querySelector('tbody');
    if(data.tokens&&data.tokens.length>0){
      tbody.innerHTML=data.tokens.map(t=>`
        <tr>
          <td>${t.name}</td>
          <td><code>${t.token_masked}</code></td>
          <td><span class="badge ${t.enabled?'success':'error'}">${t.enabled?'启用':'禁用'}</span></td>
          <td>${new Date(t.created_at).toLocaleString('zh-CN')}</td>
          <td>
            <button class="btn" onclick="toggleToken(${t.id},${!t.enabled})">${t.enabled?'禁用':'启用'}</button>
            <button class="btn danger" onclick="deleteToken(${t.id})">删除</button>
          </td>
        </tr>
      `).join('');
    }else{
      tbody.innerHTML='<tr><td colspan="5" class="empty">暂无 Token</td></tr>';
    }
  }catch(e){
    showToast('加载失败: '+e.message);
  }
}

async function loadLogs(){
  try{
    const data=await api('/admin/logs?limit=50');
    const tbody=document.getElementById('logsTable').querySelector('tbody');
    if(data.logs&&data.logs.length>0){
      tbody.innerHTML=data.logs.map(l=>`
        <tr>
          <td>${new Date(l.timestamp).toLocaleString('zh-CN')}</td>
          <td>${l.token_name||'-'}</td>
          <td>${l.model}</td>
          <td>${l.total_tokens.toLocaleString()}</td>
          <td>$${l.total_cost.toFixed(6)}</td>
          <td>${l.latency_ms}ms</td>
          <td><span class="badge ${l.status==='ok'?'success':'error'}">${l.status}</span></td>
        </tr>
      `).join('');
    }else{
      tbody.innerHTML='<tr><td colspan="7" class="empty">暂无日志</td></tr>';
    }
  }catch(e){
    showToast('加载失败: '+e.message);
  }
}

function showCreateTokenModal(){
  document.getElementById('createTokenModal').classList.add('show');
}

function hideCreateTokenModal(){
  document.getElementById('createTokenModal').classList.remove('show');
  document.getElementById('tokenName').value='';
}

async function createToken(){
  const name=document.getElementById('tokenName').value.trim();
  if(!name){showToast('请输入名称');return}
  try{
    const data=await api('/admin/tokens',{
      method:'POST',
      body:JSON.stringify({name})
    });
    showToast(`✅ Token 创建成功: ${data.token}`);
    hideCreateTokenModal();
    loadTokens();
  }catch(e){
    showToast('创建失败: '+e.message);
  }
}

async function toggleToken(id,enabled){
  try{
    await api(`/admin/tokens/${id}?enabled=${enabled}`,{method:'PATCH'});
    showToast('✅ 已更新');
    loadTokens();
  }catch(e){
    showToast('更新失败: '+e.message);
  }
}

async function deleteToken(id){
  if(!confirm('确定删除这个 Token？'))return;
  try{
    await api(`/admin/tokens/${id}`,{method:'DELETE'});
    showToast('✅ 已删除');
    loadTokens();
  }catch(e){
    showToast('删除失败: '+e.message);
  }
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// Auto-refresh
setInterval(()=>{
  const activeTab=document.querySelector('.tab.active').dataset.tab;
  if(activeTab==='overview')loadOverview();
},30000);

// Initialize
loadOverview();
</script>
</body>
</html>
