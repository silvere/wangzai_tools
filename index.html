        // Category mapping for grouping
        const categoryMap = {
            "CSS/前端": "CSS/前端",
            "开发工具": "开发工具",
            "评测AI": "评测/AI",
            "文本内容": "文本内容",
            "设计可视化": "设计/可视化",
            "游戏娱乐": "游戏/娱乐",
            "生活工具": "生活/健康"
        };

        function renderTools(filterCategory = 'all', searchText = '') {
            const grid = document.getElementById('tool-grid');
            grid.innerHTML = '';

            const filtered = tools.filter(tool => {
                const matchCategory = filterCategory === 'all' ||
                    (filterCategory === 'CSS' && tool.category.startsWith('CSS')) ||
                    (filterCategory === '开发工具' && tool.category === '开发工具') ||
                    (filterCategory === '评测AI' && tool.category === '评测AI') ||
                    (filterCategory === '文本内容' && tool.category === '文本内容') ||
                    (filterCategory === '设计可视化' && tool.category === '设计可视化') ||
                    (filterCategory === '游戏娱乐' && tool.category === '游戏娱乐') ||
                    (filterCategory === '生活健康' && tool.category === '生活工具');
                const matchSearch = !searchText ||
                    tool.name.toLowerCase().includes(searchText.toLowerCase()) ||
                    tool.description.toLowerCase().includes(searchText.toLowerCase());
                return matchCategory && matchSearch;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center py-12 text-gray-500">未找到匹配的工具 😕</div>';
                return;
            }

            filtered.forEach(tool => {
                const card = document.createElement('a');
                card.href = tool.path;
                card.target = '_blank';
                card.className = 'tool-card block bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden hover:border-blue-500';
                card.innerHTML = `
                    <div class="p-5">
                        <div class="flex items-start justify-between mb-2">
                            <h3 class="font-semibold text-gray-900 text-lg leading-tight">${tool.name}</h3>
                        </div>
                        <p class="text-gray-600 text-sm mb-4">${tool.description}</p>
                        <div class="flex items-center justify-between">
                            <span class="inline-block px-2 py-1 bg-gray-100 text-gray-600 rounded text-xs font-medium">${tool.category}</span>
                            <span class="text-blue-600 text-sm font-medium">打开 →</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Category filter
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.category-btn').forEach(b => {
                    b.classList.remove('bg-blue-600', 'text-white');
                    b.classList.add('bg-gray-200', 'text-gray-700');
                });
                btn.classList.remove('bg-gray-200', 'text-gray-700');
                btn.classList.add('bg-blue-600', 'text-white');
                const category = btn.dataset.category;
                const search = document.getElementById('search').value;
                renderTools(category, search);
            });
        });

        // Search
        document.getElementById('search').addEventListener('input', (e) => {
            const searchText = e.target.value;
            const activeBtn = document.querySelector('.category-btn.bg-blue-600');
            const category = activeBtn.dataset.category;
            renderTools(category, searchText);
        });

        // Initial render
        renderTools();
    </script>
