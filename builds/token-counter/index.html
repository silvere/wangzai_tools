<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token 计数器 - 多模型支持</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .input-section {
            margin-bottom: 30px;
        }

        textarea {
            width: 100%;
            min-height: 200px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .model-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .model-btn {
            padding: 10px 20px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .model-btn:hover {
            background: #f0f0f0;
        }

        .model-btn.active {
            background: #667eea;
            color: white;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .result-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .result-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .result-value {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .result-detail {
            font-size: 13px;
            opacity: 0.8;
        }

        .comparison-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .comparison-table th,
        .comparison-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .comparison-table th {
            background: #f5f5f5;
            font-weight: 600;
            color: #333;
        }

        .comparison-table tr:hover {
            background: #f9f9f9;
        }

        .cost-badge {
            display: inline-block;
            padding: 4px 12px;
            background: #4caf50;
            color: white;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .templates {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .template-btn {
            padding: 8px 16px;
            background: #f0f0f0;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .template-btn:hover {
            background: #667eea;
            color: white;
        }

        .stats-row {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 10px;
        }

        .stat-item {
            flex: 1;
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }
            
            .results-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔢 Token 计数器</h1>
            <p class="subtitle">多模型 Token 统计 & 成本估算</p>
        </header>

        <div class="main-content">
            <div class="input-section">
                <h3 style="margin-bottom: 15px;">快速模板</h3>
                <div class="templates">
                    <button class="template-btn" onclick="loadTemplate('short')">短文本</button>
                    <button class="template-btn" onclick="loadTemplate('medium')">中等长度</button>
                    <button class="template-btn" onclick="loadTemplate('long')">长文本</button>
                    <button class="template-btn" onclick="loadTemplate('code')">代码示例</button>
                    <button class="template-btn" onclick="loadTemplate('chinese')">中文文本</button>
                </div>

                <h3 style="margin-bottom: 15px;">输入文本</h3>
                <textarea id="textInput" placeholder="在此输入或粘贴文本...&#10;&#10;支持中英文、代码、Markdown等任意格式&#10;实时计算不同模型的 Token 数量和成本" oninput="updateCounts()"></textarea>
            </div>

            <div class="stats-row">
                <div class="stat-item">
                    <div class="stat-label">字符数</div>
                    <div class="stat-value" id="charCount">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">单词数</div>
                    <div class="stat-value" id="wordCount">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">行数</div>
                    <div class="stat-value" id="lineCount">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">中文字符</div>
                    <div class="stat-value" id="chineseCount">0</div>
                </div>
            </div>

            <h3 style="margin: 30px 0 15px 0;">Token 统计（按模型）</h3>
            
            <table class="comparison-table">
                <thead>
                    <tr>
                        <th>模型</th>
                        <th>Token 数</th>
                        <th>输入成本</th>
                        <th>输出成本（1K tokens）</th>
                        <th>特点</th>
                    </tr>
                </thead>
                <tbody id="comparisonBody">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // 模型配置（价格单位：美元/百万tokens）
        const models = [
            {
                name: 'GPT-4o',
                inputPrice: 2.50,
                outputPrice: 10.00,
                ratio: 0.25, // 英文约4字符=1token，中文约1.5字符=1token
                chineseRatio: 0.67,
                note: '最新多模态模型'
            },
            {
                name: 'GPT-4o-mini',
                inputPrice: 0.15,
                outputPrice: 0.60,
                ratio: 0.25,
                chineseRatio: 0.67,
                note: '性价比之选'
            },
            {
                name: 'Claude 3.5 Sonnet',
                inputPrice: 3.00,
                outputPrice: 15.00,
                ratio: 0.27,
                chineseRatio: 0.70,
                note: '强大推理能力'
            },
            {
                name: 'Claude 3 Haiku',
                inputPrice: 0.25,
                outputPrice: 1.25,
                ratio: 0.27,
                chineseRatio: 0.70,
                note: '快速响应'
            },
            {
                name: 'Gemini 1.5 Pro',
                inputPrice: 1.25,
                outputPrice: 5.00,
                ratio: 0.26,
                chineseRatio: 0.68,
                note: '长上下文'
            },
            {
                name: 'DeepSeek V3',
                inputPrice: 0.27,
                outputPrice: 1.10,
                ratio: 0.28,
                chineseRatio: 0.75,
                note: '国产开源'
            },
            {
                name: 'Qwen2.5-72B',
                inputPrice: 0.35,
                outputPrice: 0.70,
                ratio: 0.28,
                chineseRatio: 0.80,
                note: '中文优化'
            },
            {
                name: 'GLM-4',
                inputPrice: 0.50,
                outputPrice: 0.50,
                ratio: 0.30,
                chineseRatio: 0.85,
                note: '中文理解'
            }
        ];

        const templates = {
            short: "Hello, world! This is a short test message.",
            medium: "人工智能（Artificial Intelligence, AI）是计算机科学的一个分支，它企图了解智能的实质，并生产出一种新的能以人类智能相似的方式做出反应的智能机器。该领域的研究包括机器人、语言识别、图像识别、自然语言处理和专家系统等。\n\nAI can be categorized as either weak or strong. Weak AI is designed to perform specific tasks, while strong AI aims to replicate human cognitive abilities.",
            long: `# 大语言模型评测指南

## 1. 评测维度

### 1.1 基础能力
- 语言理解：阅读理解、语义分析
- 语言生成：文本创作、摘要生成
- 知识问答：事实性问题、常识推理
- 逻辑推理：数学计算、因果推理

### 1.2 专业能力
- 代码生成：Python、JavaScript、Java等
- 多语言：中英文、小语种支持
- 长文本：上下文理解、信息检索
- 安全性：有害内容过滤、隐私保护

## 2. 评测方法

### 2.1 自动化评测
使用标准数据集（MMLU、GSM8K、HumanEval等）进行批量测试，计算准确率、F1分数等指标。

### 2.2 人工评测
通过人工标注评估模型输出的质量、相关性、创造性等主观指标。

### 2.3 对抗测试
设计边界案例、对抗样本，测试模型的鲁棒性和安全性。

## 3. 最佳实践

1. 多维度评估：不要只看单一指标
2. 真实场景：使用实际业务数据
3. 持续监控：定期重新评测
4. 成本考量：平衡性能与价格

评测是一个持续迭代的过程，需要根据实际应用场景不断调整评测策略。`,
            code: `def calculate_tokens(text, model="gpt-4"):
    """
    计算文本的token数量
    
    Args:
        text: 输入文本
        model: 模型名称
    
    Returns:
        token数量
    """
    import tiktoken
    
    try:
        encoding = tiktoken.encoding_for_model(model)
    except KeyError:
        encoding = tiktoken.get_encoding("cl100k_base")
    
    tokens = encoding.encode(text)
    return len(tokens)

# 示例用法
text = "Hello, world! 你好，世界！"
token_count = calculate_tokens(text)
print(f"Token count: {token_count}")`,
            chinese: "在人工智能快速发展的今天，大语言模型已经成为了自然语言处理领域的核心技术。从GPT系列到Claude，从国外的先进模型到国内的通义千问、文心一言，各种模型层出不穷。如何科学、客观地评测这些模型的能力，成为了业界关注的焦点。评测不仅要考虑模型的准确性，还要关注其推理能力、创造性、安全性等多个维度。同时，成本效益也是实际应用中不可忽视的重要因素。"
        };

        function loadTemplate(type) {
            document.getElementById('textInput').value = templates[type];
            updateCounts();
        }

        function estimateTokens(text, ratio, chineseRatio) {
            // 统计中文字符
            const chineseChars = (text.match(/[\u4e00-\u9fa5]/g) || []).length;
            const totalChars = text.length;
            const nonChineseChars = totalChars - chineseChars;
            
            // 分别计算中英文token
            const chineseTokens = chineseChars * chineseRatio;
            const englishTokens = nonChineseChars * ratio;
            
            return Math.ceil(chineseTokens + englishTokens);
        }

        function formatCost(cost) {
            if (cost < 0.01) {
                return `$${(cost * 1000).toFixed(4)}/K`;
            }
            return `$${cost.toFixed(4)}`;
        }

        function updateCounts() {
            const text = document.getElementById('textInput').value;
            
            // 基础统计
            const charCount = text.length;
            const wordCount = text.trim() ? text.trim().split(/\s+/).length : 0;
            const lineCount = text.split('\n').length;
            const chineseCount = (text.match(/[\u4e00-\u9fa5]/g) || []).length;
            
            document.getElementById('charCount').textContent = charCount.toLocaleString();
            document.getElementById('wordCount').textContent = wordCount.toLocaleString();
            document.getElementById('lineCount').textContent = lineCount.toLocaleString();
            document.getElementById('chineseCount').textContent = chineseCount.toLocaleString();
            
            // 更新模型对比表
            const tbody = document.getElementById('comparisonBody');
            tbody.innerHTML = '';
            
            models.forEach(model => {
                const tokens = estimateTokens(text, model.ratio, model.chineseRatio);
                const inputCost = (tokens / 1000000) * model.inputPrice;
                const outputCost = (1000 / 1000000) * model.outputPrice;
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${model.name}</strong></td>
                    <td><strong style="color: #667eea; font-size: 18px;">${tokens.toLocaleString()}</strong></td>
                    <td>${formatCost(inputCost)}</td>
                    <td>${formatCost(outputCost)}</td>
                    <td><span style="color: #666; font-size: 13px;">${model.note}</span></td>
                `;
                tbody.appendChild(row);
            });
        }

        // 初始化
        updateCounts();
    </script>
</body>
</html>
