<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎬 Markdown 幻灯片 - MD Slides</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a1a;--card:#12122a;--border:#1e1e40;--accent:#7c83ff;--accent2:#4ade80;--text:#e0e0e0;--dim:#888}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}

/* Editor Layout */
.app{display:flex;height:100vh;flex-direction:column}
.toolbar{background:#0d0d20;border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.toolbar h1{font-size:1em;color:#fff;margin-right:auto}
.toolbar .info{color:var(--dim);font-size:0.8em}
.btn{background:var(--accent);color:#fff;border:none;padding:6px 16px;border-radius:6px;cursor:pointer;font-size:0.85em;transition:all 0.2s}
.btn:hover{opacity:0.85}
.btn-green{background:#166534}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--dim)}
.btn-outline:hover{border-color:var(--accent);color:#fff}
.main{display:flex;flex:1;overflow:hidden}
.editor-pane{width:40%;border-right:1px solid var(--border);display:flex;flex-direction:column}
.editor-pane textarea{flex:1;background:var(--bg);color:var(--text);border:none;padding:16px;font-family:'SF Mono',Monaco,Consolas,monospace;font-size:0.9em;line-height:1.6;resize:none;outline:none}
.preview-pane{flex:1;display:flex;flex-direction:column;background:#111}
.slide-nav{background:#0d0d20;border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:12px}
.slide-nav .page{color:var(--dim);font-size:0.85em}
.slide-container{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;overflow:hidden}
.slide{background:#1a1a2e;border-radius:12px;width:100%;max-width:800px;aspect-ratio:16/9;padding:48px;display:flex;flex-direction:column;justify-content:center;box-shadow:0 8px 32px rgba(0,0,0,0.4);overflow:auto;position:relative}
.slide h1{font-size:2em;color:#fff;margin-bottom:16px;text-align:center}
.slide h2{font-size:1.5em;color:var(--accent);margin-bottom:12px}
.slide h3{font-size:1.2em;color:var(--accent2);margin-bottom:8px}
.slide p{font-size:1em;line-height:1.8;margin-bottom:8px;color:var(--text)}
.slide ul,.slide ol{padding-left:24px;margin-bottom:8px}
.slide li{font-size:0.95em;line-height:1.8;margin-bottom:4px}
.slide code{background:#0d0d20;padding:2px 6px;border-radius:4px;font-family:'SF Mono',Monaco,Consolas,monospace;font-size:0.85em;color:var(--accent)}
.slide pre{background:#0d0d20;padding:16px;border-radius:8px;overflow-x:auto;margin:8px 0}
.slide pre code{background:none;padding:0}
.slide blockquote{border-left:3px solid var(--accent);padding-left:16px;color:var(--dim);font-style:italic;margin:8px 0}
.slide strong{color:#fff}
.slide em{color:var(--accent2)}
.slide img{max-width:80%;max-height:60%;margin:8px auto;display:block;border-radius:8px}
.slide .slide-num{position:absolute;bottom:12px;right:20px;color:#333;font-size:0.75em}

/* Themes */
.slide.theme-dark{background:#1a1a2e}
.slide.theme-light{background:#f5f5f0;color:#333}
.slide.theme-light h1{color:#222}
.slide.theme-light h2{color:#4a5aba}
.slide.theme-light h3{color:#2d8a4e}
.slide.theme-light p,.slide.theme-light li{color:#444}
.slide.theme-light code{background:#e8e8e0;color:#4a5aba}
.slide.theme-light pre{background:#e8e8e0}
.slide.theme-light blockquote{color:#888;border-left-color:#4a5aba}
.slide.theme-light strong{color:#222}
.slide.theme-light em{color:#2d8a4e}
.slide.theme-light .slide-num{color:#ccc}
.slide.theme-blue{background:linear-gradient(135deg,#0f2027,#203a43,#2c5364)}
.slide.theme-blue h2{color:#64ffda}
.slide.theme-blue h3{color:#80cbc4}
.slide.theme-gradient{background:linear-gradient(135deg,#1a1a3e,#2d1b4e,#1a3a2e)}
.slide.theme-gradient h2{color:#bb86fc}
.slide.theme-gradient h3{color:#03dac6}

/* Fullscreen */
.fullscreen{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:9999;background:#000;display:flex;align-items:center;justify-content:center}
.fullscreen .slide{max-width:90vw;max-height:85vh;padding:64px;border-radius:0}
.fullscreen .slide h1{font-size:2.5em}
.fullscreen .slide h2{font-size:2em}
.fullscreen .slide p,.fullscreen .slide li{font-size:1.3em}
.fs-nav{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:12px;z-index:10000}
.fs-close{position:fixed;top:16px;right:16px;z-index:10000}

/* Thumbnails */
.thumb-strip{background:#0d0d20;border-top:1px solid var(--border);padding:8px;display:flex;gap:8px;overflow-x:auto;flex-shrink:0}
.thumb{width:120px;height:68px;background:#1a1a2e;border:2px solid transparent;border-radius:6px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.6em;padding:4px;overflow:hidden;color:var(--dim)}
.thumb.active{border-color:var(--accent)}
.thumb:hover{border-color:var(--accent)}

select{background:#0d0d20;border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:6px;font-size:0.8em;outline:none}
@media(max-width:768px){.main{flex-direction:column}.editor-pane{width:100%;height:40%}.preview-pane{height:60%}.slide{padding:24px}.slide h1{font-size:1.4em}}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="toolbar">
    <h1>🎬 MD Slides</h1>
    <span class="info" id="slideCount">0 slides</span>
    <select id="themeSelect" onchange="changeTheme()">
      <option value="dark">🌙 暗色</option>
      <option value="light">☀️ 亮色</option>
      <option value="blue">🌊 深海</option>
      <option value="gradient">🎨 渐变</option>
    </select>
    <button class="btn btn-outline" onclick="loadDemo()">📝 示例</button>
    <button class="btn btn-outline" onclick="exportHTML()">💾 导出</button>
    <button class="btn btn-green" onclick="enterFullscreen()">▶ 演示</button>
  </div>
  <div class="main">
    <div class="editor-pane">
      <textarea id="editor" placeholder="在这里写 Markdown...&#10;&#10;用 --- 分隔每页幻灯片&#10;&#10;# 标题页&#10;## 小标题&#10;- 列表项&#10;**加粗** *斜体* `代码`&#10;&#10;---&#10;&#10;# 第二页" oninput="render()"></textarea>
    </div>
    <div class="preview-pane">
      <div class="slide-nav">
        <button class="btn btn-outline" onclick="prevSlide()">◀</button>
        <span class="page" id="pageInfo">1 / 1</span>
        <button class="btn btn-outline" onclick="nextSlide()">▶</button>
      </div>
      <div class="slide-container">
        <div class="slide theme-dark" id="slideView"></div>
      </div>
      <div class="thumb-strip" id="thumbStrip"></div>
    </div>
  </div>
</div>

<!-- Fullscreen overlay -->
<div class="fullscreen" id="fsOverlay" style="display:none">
  <div class="slide theme-dark" id="fsSlide"></div>
  <div class="fs-nav">
    <button class="btn" onclick="fsPrev()">◀ 上一页</button>
    <span id="fsPage" style="color:#fff;line-height:32px">1/1</span>
    <button class="btn" onclick="fsNext()">下一页 ▶</button>
  </div>
  <button class="btn btn-outline fs-close" onclick="exitFullscreen()">✕ 退出</button>
</div>

<script>
let slides = [];
let current = 0;
let theme = 'dark';

function parseMD(md) {
  // Simple markdown parser
  let html = md;
  // Code blocks
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Images
  html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
  // Links
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" style="color:var(--accent)">$1</a>');
  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Bold & italic
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Blockquote
  html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  // Unordered list
  html = html.replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
  // Ordered list
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  // Paragraphs
  html = html.replace(/^(?!<[hupblo]|<li|<img|<a|<code|<pre)(.+)$/gm, '<p>$1</p>');
  // Clean up
  html = html.replace(/<\/blockquote>\n<blockquote>/g, '<br>');
  return html;
}

function render() {
  const md = document.getElementById('editor').value;
  slides = md.split(/\n---\n/).map(s => s.trim()).filter(s => s);
  if (slides.length === 0) slides = [''];
  if (current >= slides.length) current = slides.length - 1;

  document.getElementById('slideCount').textContent = slides.length + ' slides';
  showSlide(current);
  renderThumbs();
}

function showSlide(idx) {
  current = idx;
  const slideEl = document.getElementById('slideView');
  slideEl.innerHTML = parseMD(slides[current]) + '<div class="slide-num">' + (current+1) + ' / ' + slides.length + '</div>';
  document.getElementById('pageInfo').textContent = (current+1) + ' / ' + slides.length;

  // Update thumb active
  document.querySelectorAll('.thumb').forEach((t,i) => {
    t.classList.toggle('active', i === current);
  });
}

function renderThumbs() {
  const strip = document.getElementById('thumbStrip');
  strip.innerHTML = '';
  slides.forEach((s, i) => {
    const t = document.createElement('div');
    t.className = 'thumb' + (i === current ? ' active' : '');
    // Show first line as preview
    const firstLine = s.split('\n')[0].replace(/^#+\s*/, '').substring(0, 20);
    t.textContent = (i+1) + '. ' + firstLine;
    t.onclick = () => showSlide(i);
    strip.appendChild(t);
  });
}

function prevSlide() { if (current > 0) showSlide(current - 1); }
function nextSlide() { if (current < slides.length - 1) showSlide(current + 1); }

function changeTheme() {
  theme = document.getElementById('themeSelect').value;
  document.getElementById('slideView').className = 'slide theme-' + theme;
  document.getElementById('fsSlide').className = 'slide theme-' + theme;
}

// Fullscreen
function enterFullscreen() {
  const overlay = document.getElementById('fsOverlay');
  overlay.style.display = 'flex';
  showFsSlide(current);
  document.addEventListener('keydown', fsKeyHandler);
}

function exitFullscreen() {
  document.getElementById('fsOverlay').style.display = 'none';
  document.removeEventListener('keydown', fsKeyHandler);
}

function showFsSlide(idx) {
  current = idx;
  const el = document.getElementById('fsSlide');
  el.className = 'slide theme-' + theme;
  el.innerHTML = parseMD(slides[current]) + '<div class="slide-num">' + (current+1) + ' / ' + slides.length + '</div>';
  document.getElementById('fsPage').textContent = (current+1) + '/' + slides.length;
  showSlide(current);
}

function fsPrev() { if (current > 0) showFsSlide(current - 1); }
function fsNext() { if (current < slides.length - 1) showFsSlide(current + 1); }

function fsKeyHandler(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); fsNext(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); fsPrev(); }
  else if (e.key === 'Escape') exitFullscreen();
}

// Keyboard shortcuts in editor
document.addEventListener('keydown', function(e) {
  if (document.getElementById('fsOverlay').style.display !== 'none') return;
  if (e.key === 'ArrowRight' && e.altKey) { e.preventDefault(); nextSlide(); }
  if (e.key === 'ArrowLeft' && e.altKey) { e.preventDefault(); prevSlide(); }
});

function loadDemo() {
  document.getElementById('editor').value = `# 🎬 Markdown 幻灯片
## 用 Markdown 写演示文稿

旺仔出品 · Build #9

---

## 使用方法

- 左侧编辑 Markdown
- 用 \`---\` 分隔每页幻灯片
- 右侧实时预览
- 点击 **▶ 演示** 进入全屏模式

---

## 支持的语法

### 文本格式
- **加粗文本** 和 *斜体文本*
- \`行内代码\` 和代码块
- [链接](https://example.com)

> 引用文本也支持哦

---

## 代码展示

\`\`\`python
def hello():
    print("Hello from MD Slides!")
    return "🎬"
\`\`\`

代码块会自动高亮显示

---

## 四套主题

1. 🌙 **暗色** — 经典深色主题
2. ☀️ **亮色** — 清爽白色主题
3. 🌊 **深海** — 蓝绿渐变
4. 🎨 **渐变** — 紫绿渐变

在顶部下拉菜单切换 ↑

---

## 快捷键

| 操作 | 快捷键 |
|------|--------|
| 上一页 | Alt + ← |
| 下一页 | Alt + → |
| 全屏上/下页 | ← / → |
| 退出全屏 | Esc |

---

# 🎉 开始创作吧！

删除这些示例内容，写你自己的演示文稿

**Tip:** 点击 💾 导出 可以保存为独立 HTML 文件`;
  render();
}

function exportHTML() {
  let slideHTML = slides.map((s, i) =>
    '<div class="slide theme-' + theme + '" style="width:100vw;height:100vh;display:flex;flex-direction:column;justify-content:center;padding:64px;">' +
    parseMD(s) + '<div class="slide-num">' + (i+1) + '/' + slides.length + '</div></div>'
  ).join('\n');

  const exported = `<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>MD Slides Export</title>
<style>*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#0a0a1a;--accent:#7c83ff;--accent2:#4ade80;--text:#e0e0e0;--dim:#888}body{background:#000;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif}
.slide{position:absolute;top:0;left:0;width:100vw;height:100vh;display:none;flex-direction:column;justify-content:center;padding:64px;color:var(--text)}
.slide.active{display:flex}.slide h1{font-size:2.5em;color:#fff;margin-bottom:16px;text-align:center}.slide h2{font-size:2em;color:var(--accent);margin-bottom:12px}.slide h3{font-size:1.4em;color:var(--accent2);margin-bottom:8px}.slide p{font-size:1.3em;line-height:1.8;margin-bottom:8px}.slide ul,.slide ol{padding-left:24px;margin-bottom:8px}.slide li{font-size:1.2em;line-height:1.8;margin-bottom:4px}.slide code{background:#0d0d20;padding:2px 6px;border-radius:4px;font-family:monospace;font-size:0.85em;color:var(--accent)}.slide pre{background:#0d0d20;padding:16px;border-radius:8px;overflow-x:auto;margin:8px 0}.slide pre code{background:none;padding:0}.slide blockquote{border-left:3px solid var(--accent);padding-left:16px;color:var(--dim);font-style:italic;margin:8px 0}.slide strong{color:#fff}.slide em{color:var(--accent2)}.slide .slide-num{position:absolute;bottom:12px;right:20px;color:#333;font-size:0.75em}
.slide.theme-dark{background:#1a1a2e}.slide.theme-light{background:#f5f5f0;color:#333}.slide.theme-light h1{color:#222}.slide.theme-light h2{color:#4a5aba}.slide.theme-light p,.slide.theme-light li{color:#444}.slide.theme-light strong{color:#222}.slide.theme-blue{background:linear-gradient(135deg,#0f2027,#203a43,#2c5364)}.slide.theme-blue h2{color:#64ffda}.slide.theme-gradient{background:linear-gradient(135deg,#1a1a3e,#2d1b4e,#1a3a2e)}.slide.theme-gradient h2{color:#bb86fc}
.nav{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10}.nav button{background:rgba(255,255,255,0.1);color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:0.9em}.nav button:hover{background:rgba(255,255,255,0.2)}.nav span{color:#666;line-height:32px;font-size:0.85em}
</style></head><body>
` + slideHTML.replace(/class="slide theme/g, 'class="slide s theme') + `
<div class="nav"><button onclick="go(-1)">◀</button><span id="pg">1/${slides.length}</span><button onclick="go(1)">▶</button></div>
<script>let c=0,all=document.querySelectorAll('.slide.s');all[0].classList.add('active');function go(d){all[c].classList.remove('active');c=Math.max(0,Math.min(all.length-1,c+d));all[c].classList.add('active');document.getElementById('pg').textContent=(c+1)+'/'+all.length}document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();go(1)}else if(e.key==='ArrowLeft'){e.preventDefault();go(-1)}});<\/script></body></html>`;

  const blob = new Blob([exported], {type: 'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'slides.html';
  a.click();
}

// Init with demo
loadDemo();
</script>
</body>
</html>
