<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔧 开发者工具箱 - Dev Toolbox</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a1a;--card:#12122a;--border:#1e1e40;--accent:#7c83ff;--accent2:#4ade80;--text:#e0e0e0;--dim:#888;--input-bg:#0d0d20}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{text-align:center;padding:32px 16px 16px;border-bottom:1px solid var(--border)}
.header h1{font-size:1.8em;color:#fff}
.header .sub{color:var(--dim);margin-top:4px;font-size:0.9em}
.nav{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:16px;max-width:900px;margin:0 auto}
.nav button{background:var(--card);border:1px solid var(--border);color:var(--dim);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:0.85em;transition:all 0.2s}
.nav button:hover{border-color:var(--accent);color:#fff}
.nav button.active{background:var(--accent);border-color:var(--accent);color:#fff}
.tool-panel{display:none;max-width:900px;margin:0 auto;padding:16px}
.tool-panel.active{display:block}
.tool-panel h2{font-size:1.2em;color:#fff;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.col{flex:1;min-width:200px}
textarea,.input-field{width:100%;background:var(--input-bg);border:1px solid var(--border);color:var(--text);padding:12px;border-radius:8px;font-family:'SF Mono',Monaco,Consolas,monospace;font-size:0.85em;resize:vertical;outline:none;transition:border-color 0.2s}
textarea:focus,.input-field:focus{border-color:var(--accent)}
textarea{min-height:160px}
.btn{background:var(--accent);color:#fff;border:none;padding:8px 20px;border-radius:8px;cursor:pointer;font-size:0.85em;transition:all 0.2s}
.btn:hover{opacity:0.85;transform:translateY(-1px)}
.btn-row{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap}
.btn-secondary{background:transparent;border:1px solid var(--border);color:var(--dim)}
.btn-secondary:hover{border-color:var(--accent);color:#fff}
.btn-green{background:#166534}
.result-box{background:var(--input-bg);border:1px solid var(--border);border-radius:8px;padding:12px;font-family:'SF Mono',Monaco,Consolas,monospace;font-size:0.85em;white-space:pre-wrap;word-break:break-all;max-height:300px;overflow-y:auto;margin-top:8px}
.status{font-size:0.8em;margin-top:4px}
.status.ok{color:var(--accent2)}
.status.err{color:#f87171}
label{display:block;color:var(--dim);font-size:0.8em;margin-bottom:4px}
.color-preview{width:60px;height:60px;border-radius:8px;border:1px solid var(--border);display:inline-block;vertical-align:middle}
.inline{display:flex;gap:8px;align-items:center}
select{background:var(--input-bg);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-size:0.85em;outline:none}
.regex-match{background:#7c83ff33;border-radius:2px;padding:0 2px}
.copy-toast{position:fixed;bottom:24px;right:24px;background:var(--accent2);color:#000;padding:10px 20px;border-radius:8px;font-size:0.85em;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999}
.copy-toast.show{opacity:1}
.footer{text-align:center;padding:24px;color:#444;font-size:0.8em}
@media(max-width:600px){.row{flex-direction:column}.nav{gap:4px}.nav button{padding:6px 10px;font-size:0.8em}}
</style>
</head>
<body>
<div class="header">
  <h1>🔧 开发者工具箱</h1>
  <div class="sub">Dev Swiss Army Knife · 8 tools in one page</div>
</div>
<div class="nav" id="nav"></div>
<div id="panels"></div>
<div class="copy-toast" id="toast">✅ 已复制到剪贴板</div>
<div class="footer">🥛 旺仔 · Build #7 · Made for 老大</div>

<script>
const tools = [
  {id:'json',icon:'📋',name:'JSON 格式化'},
  {id:'base64',icon:'🔐',name:'Base64'},
  {id:'url',icon:'🔗',name:'URL 编解码'},
  {id:'ts',icon:'⏰',name:'时间戳转换'},
  {id:'uuid',icon:'🆔',name:'UUID 生成'},
  {id:'hash',icon:'#️⃣',name:'Hash 计算'},
  {id:'color',icon:'🎨',name:'颜色转换'},
  {id:'regex',icon:'🔍',name:'正则测试'}
];

// Build nav
const nav = document.getElementById('nav');
const panels = document.getElementById('panels');
tools.forEach((t,i) => {
  const btn = document.createElement('button');
  btn.textContent = t.icon + ' ' + t.name;
  btn.onclick = () => switchTool(t.id);
  btn.id = 'nav-'+t.id;
  if(i===0) btn.className='active';
  nav.appendChild(btn);
});

function switchTool(id) {
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+id).classList.add('active');
  document.querySelectorAll('.tool-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg || '✅ 已复制到剪贴板';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1500);
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(()=>toast());
}

// ===== JSON =====
function buildJSON() {
  return `<div class="tool-panel active" id="panel-json">
    <h2>📋 JSON 格式化 / 校验</h2>
    <div class="row"><div class="col">
      <label>输入 JSON</label>
      <textarea id="json-in" placeholder='{"name":"旺仔","age":1}'></textarea>
    </div><div class="col">
      <label>输出</label>
      <textarea id="json-out" readonly></textarea>
    </div></div>
    <div class="btn-row">
      <button class="btn" onclick="jsonFormat()">格式化</button>
      <button class="btn btn-secondary" onclick="jsonMinify()">压缩</button>
      <button class="btn btn-secondary" onclick="copyText(document.getElementById('json-out').value)">复制结果</button>
    </div>
    <div class="status" id="json-status"></div>
  </div>`;
}

function jsonFormat() {
  try {
    const obj = JSON.parse(document.getElementById('json-in').value);
    document.getElementById('json-out').value = JSON.stringify(obj, null, 2);
    document.getElementById('json-status').className = 'status ok';
    document.getElementById('json-status').textContent = '✅ 有效 JSON · ' + JSON.stringify(obj).length + ' bytes';
  } catch(e) {
    document.getElementById('json-out').value = '';
    document.getElementById('json-status').className = 'status err';
    document.getElementById('json-status').textContent = '❌ ' + e.message;
  }
}

function jsonMinify() {
  try {
    const obj = JSON.parse(document.getElementById('json-in').value);
    document.getElementById('json-out').value = JSON.stringify(obj);
    document.getElementById('json-status').className = 'status ok';
    document.getElementById('json-status').textContent = '✅ 已压缩 · ' + JSON.stringify(obj).length + ' bytes';
  } catch(e) {
    document.getElementById('json-status').className = 'status err';
    document.getElementById('json-status').textContent = '❌ ' + e.message;
  }
}

// ===== Base64 =====
function buildBase64() {
  return `<div class="tool-panel" id="panel-base64">
    <h2>🔐 Base64 编解码</h2>
    <label>输入文本</label>
    <textarea id="b64-in" placeholder="Hello, 旺仔!"></textarea>
    <div class="btn-row">
      <button class="btn" onclick="b64Encode()">编码 →</button>
      <button class="btn btn-secondary" onclick="b64Decode()">← 解码</button>
      <button class="btn btn-secondary" onclick="copyText(document.getElementById('b64-out').value)">复制</button>
    </div>
    <label>结果</label>
    <textarea id="b64-out" readonly></textarea>
  </div>`;
}

function b64Encode() {
  try {
    const input = document.getElementById('b64-in').value;
    document.getElementById('b64-out').value = btoa(unescape(encodeURIComponent(input)));
  } catch(e) { document.getElementById('b64-out').value = '❌ ' + e.message; }
}

function b64Decode() {
  try {
    const input = document.getElementById('b64-in').value;
    document.getElementById('b64-out').value = decodeURIComponent(escape(atob(input)));
  } catch(e) { document.getElementById('b64-out').value = '❌ ' + e.message; }
}

// ===== URL =====
function buildURL() {
  return `<div class="tool-panel" id="panel-url">
    <h2>🔗 URL 编解码</h2>
    <label>输入</label>
    <textarea id="url-in" placeholder="https://example.com/搜索?q=旺仔&type=all"></textarea>
    <div class="btn-row">
      <button class="btn" onclick="urlEncode()">编码 →</button>
      <button class="btn btn-secondary" onclick="urlDecode()">← 解码</button>
      <button class="btn btn-secondary" onclick="copyText(document.getElementById('url-out').value)">复制</button>
    </div>
    <label>结果</label>
    <textarea id="url-out" readonly></textarea>
  </div>`;
}

function urlEncode() { document.getElementById('url-out').value = encodeURIComponent(document.getElementById('url-in').value); }
function urlDecode() {
  try { document.getElementById('url-out').value = decodeURIComponent(document.getElementById('url-in').value); }
  catch(e) { document.getElementById('url-out').value = '❌ ' + e.message; }
}

// ===== Timestamp =====
function buildTS() {
  return `<div class="tool-panel" id="panel-ts">
    <h2>⏰ 时间戳转换</h2>
    <div class="btn-row">
      <button class="btn btn-green" onclick="tsNow()">📍 当前时间戳</button>
    </div>
    <div class="row"><div class="col">
      <label>Unix 时间戳（秒）</label>
      <input class="input-field" id="ts-unix" type="number" placeholder="1739577600" oninput="tsToDate()">
    </div><div class="col">
      <label>日期时间</label>
      <input class="input-field" id="ts-date" type="text" placeholder="2026-02-15 08:00:00" oninput="dateToTs()">
    </div></div>
    <div class="result-box" id="ts-detail"></div>
  </div>`;
}

function tsNow() {
  const now = Math.floor(Date.now()/1000);
  document.getElementById('ts-unix').value = now;
  tsToDate();
}

function tsToDate() {
  const ts = parseInt(document.getElementById('ts-unix').value);
  if(isNaN(ts)) return;
  const d = new Date(ts * 1000);
  document.getElementById('ts-date').value = d.toLocaleString('zh-CN',{timeZone:'Asia/Shanghai'});
  const detail = `本地时间: ${d.toLocaleString('zh-CN')}
UTC 时间: ${d.toUTCString()}
ISO 8601: ${d.toISOString()}
毫秒时间戳: ${ts * 1000}
距今: ${timeDiff(d)}`;
  document.getElementById('ts-detail').textContent = detail;
}

function dateToTs() {
  const str = document.getElementById('ts-date').value;
  const d = new Date(str);
  if(isNaN(d.getTime())) return;
  document.getElementById('ts-unix').value = Math.floor(d.getTime()/1000);
  const detail = `Unix: ${Math.floor(d.getTime()/1000)}
UTC: ${d.toUTCString()}
ISO: ${d.toISOString()}`;
  document.getElementById('ts-detail').textContent = detail;
}

function timeDiff(d) {
  const diff = Date.now() - d.getTime();
  const abs = Math.abs(diff);
  const suffix = diff > 0 ? '前' : '后';
  if(abs < 60000) return Math.floor(abs/1000) + ' 秒' + suffix;
  if(abs < 3600000) return Math.floor(abs/60000) + ' 分钟' + suffix;
  if(abs < 86400000) return Math.floor(abs/3600000) + ' 小时' + suffix;
  return Math.floor(abs/86400000) + ' 天' + suffix;
}

// ===== UUID =====
function buildUUID() {
  return `<div class="tool-panel" id="panel-uuid">
    <h2>🆔 UUID 生成器</h2>
    <div class="btn-row">
      <button class="btn" onclick="genUUIDs(1)">生成 1 个</button>
      <button class="btn btn-secondary" onclick="genUUIDs(5)">生成 5 个</button>
      <button class="btn btn-secondary" onclick="genUUIDs(10)">生成 10 个</button>
      <button class="btn btn-secondary" onclick="copyText(document.getElementById('uuid-out').textContent)">复制全部</button>
    </div>
    <div class="result-box" id="uuid-out"></div>
    <div style="margin-top:12px">
      <label>UUID 校验</label>
      <input class="input-field" id="uuid-check" placeholder="粘贴 UUID 进行校验" oninput="checkUUID()">
      <div class="status" id="uuid-status"></div>
    </div>
  </div>`;
}

function genUUID() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random()*16|0;
    return (c==='x'?r:(r&0x3|0x8)).toString(16);
  });
}

function genUUIDs(n) {
  const arr = [];
  for(let i=0;i<n;i++) arr.push(genUUID());
  document.getElementById('uuid-out').textContent = arr.join('\n');
}

function checkUUID() {
  const v = document.getElementById('uuid-check').value.trim();
  const el = document.getElementById('uuid-status');
  if(!v){el.textContent='';return;}
  const re = /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i;
  if(re.test(v)){el.className='status ok';el.textContent='✅ 有效 UUID (v'+v[14]+')';}
  else{el.className='status err';el.textContent='❌ 无效 UUID 格式';}
}

// ===== Hash =====
function buildHash() {
  return `<div class="tool-panel" id="panel-hash">
    <h2>#️⃣ Hash 计算</h2>
    <label>输入文本</label>
    <textarea id="hash-in" placeholder="输入要计算 hash 的文本"></textarea>
    <div class="btn-row">
      <button class="btn" onclick="calcHash('SHA-256')">SHA-256</button>
      <button class="btn btn-secondary" onclick="calcHash('SHA-1')">SHA-1</button>
      <button class="btn btn-secondary" onclick="calcHash('SHA-384')">SHA-384</button>
      <button class="btn btn-secondary" onclick="calcHash('SHA-512')">SHA-512</button>
    </div>
    <div class="result-box" id="hash-out">点击上方按钮计算</div>
  </div>`;
}

async function calcHash(algo) {
  const text = document.getElementById('hash-in').value;
  const buf = new TextEncoder().encode(text);
  const hash = await crypto.subtle.digest(algo, buf);
  const hex = Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
  document.getElementById('hash-out').textContent = algo + ':\n' + hex;
  copyText(hex);
}

// ===== Color =====
function buildColor() {
  return `<div class="tool-panel" id="panel-color">
    <h2>🎨 颜色转换</h2>
    <div class="row">
      <div class="col">
        <label>选择颜色</label>
        <div class="inline">
          <input type="color" id="color-picker" value="#7c83ff" oninput="colorFromPicker()" style="width:60px;height:40px;border:none;cursor:pointer">
          <div class="color-preview" id="color-preview" style="background:#7c83ff"></div>
        </div>
      </div>
      <div class="col">
        <label>HEX</label>
        <input class="input-field" id="color-hex" value="#7c83ff" oninput="colorFromHex()">
        <label style="margin-top:8px">RGB</label>
        <input class="input-field" id="color-rgb" value="rgb(124, 131, 255)" oninput="colorFromRGB()">
        <label style="margin-top:8px">HSL</label>
        <input class="input-field" id="color-hsl" value="" readonly>
      </div>
    </div>
  </div>`;
}

function colorFromPicker() {
  const hex = document.getElementById('color-picker').value;
  document.getElementById('color-hex').value = hex;
  updateColor(hex);
}

function colorFromHex() {
  const hex = document.getElementById('color-hex').value;
  if(/^#[0-9a-f]{6}$/i.test(hex)) {
    document.getElementById('color-picker').value = hex;
    updateColor(hex);
  }
}

function colorFromRGB() {
  const m = document.getElementById('color-rgb').value.match(/(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/);
  if(m) {
    const hex = '#' + [m[1],m[2],m[3]].map(x=>(+x).toString(16).padStart(2,'0')).join('');
    document.getElementById('color-hex').value = hex;
    document.getElementById('color-picker').value = hex;
    updateColor(hex);
  }
}

function updateColor(hex) {
  document.getElementById('color-preview').style.background = hex;
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  document.getElementById('color-rgb').value = `rgb(${r}, ${g}, ${b})`;
  // HSL
  const rr=r/255,gg=g/255,bb=b/255;
  const max=Math.max(rr,gg,bb),min=Math.min(rr,gg,bb);
  let h,s,l=(max+min)/2;
  if(max===min){h=s=0;}else{
    const d=max-min;s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){case rr:h=((gg-bb)/d+(gg<bb?6:0))/6;break;case gg:h=((bb-rr)/d+2)/6;break;case bb:h=((rr-gg)/d+4)/6;break;}
  }
  document.getElementById('color-hsl').value = `hsl(${Math.round(h*360)}, ${Math.round(s*100)}%, ${Math.round(l*100)}%)`;
}

// ===== Regex =====
function buildRegex() {
  return `<div class="tool-panel" id="panel-regex">
    <h2>🔍 正则表达式测试</h2>
    <div class="row"><div class="col" style="flex:2">
      <label>正则表达式</label>
      <input class="input-field" id="regex-pattern" placeholder="[a-z]+@[a-z]+\\.[a-z]+" oninput="testRegex()">
    </div><div class="col" style="flex:0.5">
      <label>Flags</label>
      <input class="input-field" id="regex-flags" value="gi" oninput="testRegex()">
    </div></div>
    <label>测试文本</label>
    <textarea id="regex-text" placeholder="输入测试文本，匹配部分会高亮显示" oninput="testRegex()"></textarea>
    <div class="status" id="regex-status"></div>
    <label>匹配结果</label>
    <div class="result-box" id="regex-out"></div>
    <label style="margin-top:8px">高亮预览</label>
    <div class="result-box" id="regex-highlight" style="white-space:pre-wrap"></div>
  </div>`;
}

function testRegex() {
  const pattern = document.getElementById('regex-pattern').value;
  const flags = document.getElementById('regex-flags').value;
  const text = document.getElementById('regex-text').value;
  const status = document.getElementById('regex-status');
  const out = document.getElementById('regex-out');
  const hl = document.getElementById('regex-highlight');
  if(!pattern){status.textContent='';out.textContent='';hl.innerHTML='';return;}
  try {
    const re = new RegExp(pattern, flags);
    const matches = [...text.matchAll(new RegExp(pattern, flags.includes('g')?flags:flags+'g'))];
    status.className = 'status ok';
    status.textContent = `✅ 有效正则 · ${matches.length} 个匹配`;
    out.textContent = matches.map((m,i)=>`[${i}] "${m[0]}" (index: ${m.index})`).join('\n') || '无匹配';
    // Highlight
    let html = '', last = 0;
    matches.forEach(m => {
      html += escHtml(text.slice(last, m.index));
      html += '<span class="regex-match">' + escHtml(m[0]) + '</span>';
      last = m.index + m[0].length;
    });
    html += escHtml(text.slice(last));
    hl.innerHTML = html;
  } catch(e) {
    status.className = 'status err';
    status.textContent = '❌ ' + e.message;
    out.textContent = '';
    hl.innerHTML = '';
  }
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// Build all panels
panels.innerHTML = buildJSON() + buildBase64() + buildURL() + buildTS() + buildUUID() + buildHash() + buildColor() + buildRegex();

// Init color
colorFromPicker();
// Init timestamp with now
tsNow();
// Generate one UUID
genUUIDs(1);
</script>
</body>
</html>
