这是一个完全本地运行的 Markdown 编辑器，支持实时渲染 Mermaid 图表。

## 🌟 功能特点

- ✅ 纯前端实现，无需服务器，零数据上传
- 🎨 支持所有 Mermaid 图表类型
- 📝 完整的 Markdown 语法支持，代码高亮
- 📋 一键导出 Markdown、HTML、图片
- 💾 自动保存草稿，刷新不丢失内容

        // 更新统计信息
        function updateStats() {
            const lines = markdownInput.value.split('\n').length;
            const chars = markdownInput.value.length;
            editorStats.textContent = `${chars} 字符 | ${lines} 行`;
        }

        // 渲染 Markdown 和 Mermaid
        async function renderMarkdown() {
            const markdown = markdownInput.value;
            
            // 保存到 localStorage
            localStorage.setItem('markdown-draft', markdown);
            
            updateStats();

            // 处理 Mermaid 代码块
            const html = await processMermaidBlocks(markdown);
            previewArea.innerHTML = html;

            // 高亮代码块
            previewArea.querySelectorAll('pre code').forEach((block) => {
                if (!block.classList.contains('mermaid')) {
                    hljs.highlightElement(block);
                }
            });
        }

        // 处理 Mermaid 代码块
        async function processMermaidBlocks(markdown) {
            // 先用 marked 转成 HTML
            let html = marked.parse(markdown);
            
            // 找到所有 mermaid 代码块
            const mermaidRegex = /<pre><code class="language-mermaid">([\s\S]*?)<\/code><\/pre>/g;
            
            const mermaidBlocks = [];
            let match;
            
            // 提取所有 mermaid 块
            while ((match = mermaidRegex.exec(html)) !== null) {
                mermaidBlocks.push({
                    index: match.index,
                    length: match[0].length,
                    code: match[1]
                });
            }

            // 从后往前替换，避免索引错乱
            for (let i = mermaidBlocks.length - 1; i >= 0; i--) {
                const block = mermaidBlocks[i];
                try {
                    const { svg } = await mermaid.render(`mermaid-${i}`, block.code);
                    const svgWrapper = `<div class="mermaid-chart my-4 flex justify-center">${svg}</div>`;
                    html = html.slice(0, block.index) + svgWrapper + html.slice(block.index + block.length);
                } catch (error) {
                    console.error('Mermaid rendering error:', error);
                    const errorHtml = `<div class="bg-red-50 border border-red-200 text-red-700 p-4 rounded-lg my-4">
                        <p class="font-medium">Mermaid 渲染错误</p>
                        <p class="text-sm mt-1">${error.message}</p>
                    </div>`;
                    html = html.slice(0, block.index) + errorHtml + html.slice(block.index + block.length);
                }
            }

            return html;
        }

        // 插入模板
        function insertTemplate(type) {
            const template = templates[type];
            const cursorPos = markdownInput.selectionStart;
            const textBefore = markdownInput.value.substring(0, cursorPos);
            const textAfter = markdownInput.value.substring(cursorPos);
            
            // 如果光标不在行首，先换行
            const insertText = (cursorPos > 0 && textBefore[textBefore.length - 1] !== '\n' ? '\n\n' : '\n') + template + '\n';
            
            markdownInput.value = textBefore + insertText + textAfter;
            
            // 移动光标到插入内容后面
            markdownInput.selectionStart = markdownInput.selectionEnd = cursorPos + insertText.length;
            markdownInput.focus();
            
            renderMarkdown();
            templateModal.classList.add('hidden');
            showSuccess('模板已插入');
        }

        // 事件监听
        markdownInput.addEventListener('input', renderMarkdown);

        // 模板按钮
        templateBtn.addEventListener('click', () => {
            templateModal.classList.remove('hidden');
        });

        closeModal.addEventListener('click', () => {
            templateModal.classList.add('hidden');
        });

        // 点击模态框外部关闭
        templateModal.addEventListener('click', (e) => {
            if (e.target === templateModal) {
                templateModal.classList.add('hidden');
            }
        });

        // 模板项点击
        templateItems.forEach(item => {
            item.addEventListener('click', () => {
                const templateType = item.getAttribute('data-template');
                insertTemplate(templateType);
            });
        });

        // 清空按钮
        clearBtn.addEventListener('click', () => {
            if (confirm('确定要清空所有内容吗？')) {
                markdownInput.value = '';
                renderMarkdown();
                localStorage.removeItem('markdown-draft');
                showSuccess('已清空内容');
            }
        });

        // 复制 Markdown
        copyMarkdownBtn.addEventListener('click', () => {
            const markdown = markdownInput.value;
            if (!markdown.trim()) {
                showError('没有可复制的内容');
                return;
            }
            navigator.clipboard.writeText(markdown).then(() => {
                showSuccess('Markdown 已复制到剪贴板');
            }).catch(() => {
                showError('复制失败，请手动复制');
            });
        });

        // 复制 HTML
        copyHtmlBtn.addEventListener('click', async () => {
            const html = previewArea.innerHTML;
            if (!html.trim()) {
                showError('没有可复制的内容');
                return;
            }
            navigator.clipboard.writeText(html).then(() => {
                showSuccess('HTML 已复制到剪贴板');
            }).catch(() => {
                showError('复制失败，请手动复制');
            });
        });

        // 下载文件
        downloadBtn.addEventListener('click', () => {
            const markdown = markdownInput.value;
            if (!markdown.trim()) {
                showError('没有可下载的内容');
                return;
            }
            
            // 下载 Markdown 文件
            const blob = new Blob([markdown], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'document.md';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showSuccess('Markdown 文件已下载');
        });

        // 视图切换
        viewToggle.addEventListener('click', () => {
            isSplitView = !isSplitView;
            if (isSplitView) {
                editorContainer.classList.remove('grid-cols-1');
                editorContainer.classList.add('lg:grid-cols-2');
                viewToggle.innerHTML = '<i class="fa fa-columns mr-1"></i>并排视图';
                showSuccess('已切换到并排视图');
            } else {
                editorContainer.classList.remove('lg:grid-cols-2');
                editorContainer.classList.add('grid-cols-1');
                viewToggle.innerHTML = '<i class="fa fa-eye mr-1"></i>仅预览';
                showSuccess('已切换到仅预览模式');
            }
        });

        // 复制为图片
        copyImageBtn.addEventListener('click', async () => {
            try {
                // 使用 html2canvas 或者直接复制 SVG 内容
                showSuccess('图片复制功能开发中，暂时可以直接截图使用~');
            } catch (error) {
                showError('复制图片失败');
            }
        });

        // 加载草稿
        function loadDraft() {
            const draft = localStorage.getItem('markdown-draft');
            if (draft) {
                markdownInput.value = draft;
                renderMarkdown();
            }
        }

        // 快捷键支持
        markdownInput.addEventListener('keydown', (e) => {
            // Ctrl/Cmd + S 保存
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                showSuccess('内容已自动保存');
            }
            // Ctrl/Cmd + B 加粗
            if ((e.ctrlKey || e.metaKey) && e.key === 'b') {
                e.preventDefault();
                const selectedText = markdownInput.value.substring(markdownInput.selectionStart, markdownInput.selectionEnd);
                const newText = `**${selectedText}**`;
                document.execCommand('insertText', false, newText);
            }
            // Ctrl/Cmd + I 斜体
            if ((e.ctrlKey || e.metaKey) && e.key === 'i') {
                e.preventDefault();
                const selectedText = markdownInput.value.substring(markdownInput.selectionStart, markdownInput.selectionEnd);
                const newText = `*${selectedText}*`;
                document.execCommand('insertText', false, newText);
            }
        });

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadDraft();
            renderMarkdown();
        });
    </script>
</body>
</html>
