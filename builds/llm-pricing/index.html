<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM 价格计算器 | 旺仔</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;background:#0a0a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:1000px;margin:0 auto}
h1{text-align:center;font-size:1.6em;background:linear-gradient(135deg,#7c83ff,#4ade80);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.subtitle{text-align:center;color:#666;font-size:0.85em;margin-bottom:24px}
.calc-box{background:#12122a;border:1px solid #1e1e40;border-radius:12px;padding:24px;margin-bottom:20px}
.calc-box h2{color:#7c83ff;font-size:1.1em;margin-bottom:16px}
.input-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.input-group{display:flex;flex-direction:column;gap:4px}
.input-group label{color:#888;font-size:0.85em}
.input-group input,.input-group select{background:#0a0a1a;border:1px solid #2a2a4a;color:#fff;padding:10px;border-radius:8px;font-size:1em}
.input-group input:focus,.input-group select:focus{outline:none;border-color:#7c83ff}
.input-group .unit{color:#555;font-size:0.8em;margin-top:2px}
.results{margin-top:20px}
.result-table{width:100%;border-collapse:collapse;font-size:0.88em}
.result-table th{background:#0a0a1a;color:#7c83ff;padding:10px 8px;text-align:left;border-bottom:2px solid #2a2a4a;cursor:pointer;user-select:none}
.result-table th:hover{color:#fff}
.result-table td{padding:10px 8px;border-bottom:1px solid #1a1a3e}
.result-table tr:hover{background:#15152f}
.model-name{font-weight:600;white-space:nowrap}
.price-bar{position:relative;height:24px;background:#1a1a3e;border-radius:4px;overflow:hidden;min-width:100px}
.price-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding:0 8px;font-size:0.8em;font-weight:600;color:#fff;transition:width 0.5s}
.cheapest{color:#4ade80;font-weight:700}
.expensive{color:#f87171}
.savings{color:#4ade80;font-size:0.85em}
.tag{display:inline-block;padding:1px 6px;border-radius:6px;font-size:0.7em;margin-left:4px}
.tag-cn{background:#1e3a5f;color:#60a5fa}
.tag-os{background:#1f3b2d;color:#4ade80}
.tag-us{background:#3b1f1f;color:#f87171}
.summary-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin:16px 0}
.s-card{background:#0a0a1a;border:1px solid #2a2a4a;border-radius:8px;padding:14px;text-align:center}
.s-card .num{font-size:1.5em;font-weight:700}
.s-card .label{font-size:0.8em;color:#888;margin-top:2px}
.s-card.best .num{color:#4ade80}
.s-card.worst .num{color:#f87171}
.s-card.avg .num{color:#fbbf24}
.presets{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
.preset-btn{background:#1a1a3e;border:1px solid #2a2a4a;color:#aaa;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:0.85em}
.preset-btn:hover{border-color:#7c83ff;color:#fff}
.preset-btn.active{background:#7c83ff;color:#fff;border-color:#7c83ff}
.footer{text-align:center;color:#444;font-size:0.8em;padding:24px 0}
.note{color:#555;font-size:0.8em;margin-top:8px}
@media(max-width:640px){.input-grid{grid-template-columns:1fr}.summary-cards{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="container">
<h1>💰 LLM API 价格计算器</h1>
<div class="subtitle">输入用量，一键对比各模型成本 · 旺仔出品</div>

<div class="calc-box">
  <h2>📊 用量设置</h2>
  <div class="presets">
    <span style="color:#888;font-size:0.85em;line-height:32px">快捷场景：</span>
    <button class="preset-btn" onclick="setPreset(1000,500,100)">💬 轻度聊天</button>
    <button class="preset-btn" onclick="setPreset(5000,2000,500)">📝 日常编码</button>
    <button class="preset-btn" onclick="setPreset(20000,5000,1000)">🔧 重度开发</button>
    <button class="preset-btn" onclick="setPreset(50000,10000,2000)">🏢 企业级</button>
    <button class="preset-btn" onclick="setPreset(100000,20000,5000)">🚀 大规模Agent</button>
  </div>
  <div class="input-grid">
    <div class="input-group">
      <label>平均输入 Tokens / 次</label>
      <input type="number" id="input-tokens" value="5000" min="1" onchange="calculate()">
      <div class="unit">prompt tokens per request</div>
    </div>
    <div class="input-group">
      <label>平均输出 Tokens / 次</label>
      <input type="number" id="output-tokens" value="2000" min="1" onchange="calculate()">
      <div class="unit">completion tokens per request</div>
    </div>
    <div class="input-group">
      <label>每日请求次数</label>
      <input type="number" id="daily-requests" value="500" min="1" onchange="calculate()">
      <div class="unit">requests per day</div>
    </div>
  </div>
</div>

<div class="calc-box">
  <h2>📈 成本对比</h2>
  <div class="summary-cards" id="summary-cards"></div>
  <div class="results">
    <table class="result-table">
      <thead>
        <tr>
          <th>模型</th>
          <th>输入价格<br><span style="font-weight:normal;font-size:0.8em">$/1M tokens</span></th>
          <th>输出价格<br><span style="font-weight:normal;font-size:0.8em">$/1M tokens</span></th>
          <th>单次成本</th>
          <th>日成本</th>
          <th>月成本 (30天)</th>
          <th>月成本可视化</th>
        </tr>
      </thead>
      <tbody id="result-body"></tbody>
    </table>
  </div>
  <div class="note">* 价格数据截至 2026-02-14，实际价格可能有变动。推理模型(o3等)的思考token另计。</div>
</div>

<div class="footer">🥛 旺仔 LLM 价格计算器 · Build #5</div>
</div>

<script>
const MODELS = [
  // 国产开源
  {name:"DeepSeek V3", input:0.27, output:1.10, tags:["cn","os"], color:"#a78bfa"},
  {name:"DeepSeek R1", input:0.55, output:2.19, tags:["cn","os"], color:"#a78bfa"},
  {name:"Kimi K2", input:0.60, output:2.00, tags:["cn","os"], color:"#7c83ff"},
  {name:"Qwen3-235B", input:0.80, output:2.40, tags:["cn","os"], color:"#f472b6"},
  {name:"Qwen3 Max Thinking", input:1.20, output:6.00, tags:["cn"], color:"#f472b6"},
  {name:"GLM-5", input:0.80, output:2.56, tags:["cn","os"], color:"#34d399"},
  {name:"MiniMax M2.5", input:0.30, output:1.20, tags:["cn","os"], color:"#fb923c"},
  {name:"Seed 2.0 (ByteDance)", input:0.50, output:2.00, tags:["cn"], color:"#38bdf8"},
  // 海外 - OpenAI
  {name:"GPT-5.2", input:1.75, output:14.00, tags:["us"], color:"#f87171"},
  {name:"GPT-5.2 Pro", input:21.00, output:168.00, tags:["us"], color:"#f87171"},
  {name:"GPT-5 mini", input:0.25, output:2.00, tags:["us"], color:"#f87171"},
  {name:"GPT-4.1", input:2.00, output:8.00, tags:["us"], color:"#f87171"},
  {name:"GPT-4.1 mini", input:0.40, output:1.60, tags:["us"], color:"#f87171"},
  {name:"o3 (medium)", input:10.00, output:40.00, tags:["us"], color:"#f87171"},
  {name:"Codex (GPT-5 系)", input:1.75, output:14.00, tags:["us"], color:"#f87171"},
  // 海外 - Anthropic
  {name:"Claude Opus 4", input:15.00, output:75.00, tags:["us"], color:"#fbbf24"},
  {name:"Claude Sonnet 4", input:3.00, output:15.00, tags:["us"], color:"#fbbf24"},
  {name:"Claude Haiku 4", input:0.80, output:4.00, tags:["us"], color:"#fbbf24"},
  // 海外 - Google
  {name:"Gemini 2.5 Pro", input:1.25, output:10.00, tags:["us"], color:"#67e8f9"},
  {name:"Gemini 2.5 Flash", input:0.15, output:0.60, tags:["us"], color:"#67e8f9"},
  // 海外 - xAI
  {name:"Grok 4", input:3.00, output:15.00, tags:["us"], color:"#9ca3af"},
];

function tagHtml(tags) {
  return tags.map(t => {
    if (t === "cn") return '<span class="tag tag-cn">国产</span>';
    if (t === "os") return '<span class="tag tag-os">开源</span>';
    if (t === "us") return '<span class="tag tag-us">海外</span>';
    return '';
  }).join('');
}

function setPreset(inp, out, req) {
  document.getElementById("input-tokens").value = inp;
  document.getElementById("output-tokens").value = out;
  document.getElementById("daily-requests").value = req;
  document.querySelectorAll(".preset-btn").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
  calculate();
}

function calculate() {
  const inputTokens = parseInt(document.getElementById("input-tokens").value) || 0;
  const outputTokens = parseInt(document.getElementById("output-tokens").value) || 0;
  const dailyReqs = parseInt(document.getElementById("daily-requests").value) || 0;

  const results = MODELS.map(m => {
    const perReq = (inputTokens * m.input + outputTokens * m.output) / 1e6;
    const daily = perReq * dailyReqs;
    const monthly = daily * 30;
    return {...m, perReq, daily, monthly};
  }).sort((a, b) => a.monthly - b.monthly);

  const maxMonthly = Math.max(...results.map(r => r.monthly));
  const minMonthly = Math.min(...results.map(r => r.monthly));
  const avgMonthly = results.reduce((s, r) => s + r.monthly, 0) / results.length;

  document.getElementById("summary-cards").innerHTML = `
    <div class="s-card best"><div class="num">$${minMonthly.toFixed(2)}</div><div class="label">最便宜 (${results[0].name})</div></div>
    <div class="s-card avg"><div class="num">$${avgMonthly.toFixed(2)}</div><div class="label">平均月成本</div></div>
    <div class="s-card worst"><div class="num">$${maxMonthly.toFixed(2)}</div><div class="label">最贵 (${results[results.length-1].name})</div></div>
    <div class="s-card"><div class="num">${(maxMonthly/minMonthly).toFixed(0)}x</div><div class="label">最大价差</div></div>
  `;

  let html = '';
  results.forEach((r, i) => {
    const pct = maxMonthly > 0 ? (r.monthly / maxMonthly * 100) : 0;
    const cls = i === 0 ? 'cheapest' : (i >= results.length - 2 ? 'expensive' : '');
    const savingsText = i === 0 ? '' : `<span class="savings">比最贵省 ${((1 - r.monthly/maxMonthly)*100).toFixed(0)}%</span>`;
    html += `<tr>
      <td class="model-name"><span style="color:${r.color}">●</span> ${r.name} ${tagHtml(r.tags)}</td>
      <td>$${r.input}</td>
      <td>$${r.output}</td>
      <td class="${cls}">$${r.perReq.toFixed(4)}</td>
      <td class="${cls}">$${r.daily.toFixed(2)}</td>
      <td class="${cls}">$${r.monthly.toFixed(2)} ${savingsText}</td>
      <td><div class="price-bar"><div class="price-fill" style="width:${pct}%;background:${r.color}">${pct > 15 ? '$'+r.monthly.toFixed(0) : ''}</div></div></td>
    </tr>`;
  });
  document.getElementById("result-body").innerHTML = html;
}

calculate();
</script>
</body>
</html>
