        // DOM Elements
        const searchInput = document.getElementById('searchInput');
        const categoryFilter = document.getElementById('categoryFilter');
        const toolsGrid = document.getElementById('toolsGrid');
        const noResults = document.getElementById('noResults');
        const toolModal = document.getElementById('toolModal');
        const closeModal = document.getElementById('closeModal');
        const downloadToolBtn = document.getElementById('downloadToolBtn');
        const totalCount = document.getElementById('totalCount');

        // Current tool for download
        let currentTool = null;

        // Render tools
        function renderTools(filtered = tools) {
            toolsGrid.innerHTML = '';
            
            if (filtered.length === 0) {
                noResults.classList.remove('hidden');
                return;
            }
            
            noResults.classList.add('hidden');
            totalCount.textContent = filtered.length;
            
            filtered.forEach(tool => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-2xl shadow-lg overflow-hidden card-hover cursor-pointer';
                card.innerHTML = `
                    <div class="p-6">
                        <div class="flex items-start justify-between mb-4">
                            <div>
                                <div class="tool-icon text-4xl mb-2">${tool.icon}</div>
                                <h3 class="text-xl font-bold text-gray-900 mb-1">${tool.name}</h3>
                                <div class="flex items-center gap-2 mb-2">
                                    <span class="tag bg-blue-100 text-blue-800 px-2 py-1 rounded-full text-xs">${tool.category}</span>
                                    <span class="tag bg-gray-100 text-gray-700 px-2 py-1 rounded-full text-xs">${tool.build}</span>
                                </div>
                                <p class="text-gray-600 text-sm">${tool.tagline}</p>
                            </div>
                        </div>
                        <div class="mt-4 flex items-center justify-between text-sm">
                            <span class="text-yellow-500 font-medium">${tool.value.split(' ')[0]}</span>
                            <span class="text-primary font-medium flex items-center gap-1">
                                <i class="fa fa-arrow-right"></i> 查看详情
                            </span>
                        </div>
                    </div>
                `;
                
                card.addEventListener('click', () => openModal(tool));
                toolsGrid.appendChild(card);
            });
        }

        // Open modal
        function openModal(tool) {
            currentTool = tool;
            
            document.getElementById('modalIcon').textContent = tool.icon;
            document.getElementById('modalTitle').textContent = tool.name;
            document.getElementById('modalTagline').textContent = tool.tagline;
            document.getElementById('modalCategory').textContent = tool.category;
            document.getElementById('modalBuild').textContent = tool.build;
            document.getElementById('modalDescription').textContent = tool.description;
            document.getElementById('modalValue').textContent = tool.value;

            // Features
            const featuresList = document.getElementById('modalFeatures');
            featuresList.innerHTML = '';
            tool.features.forEach(f => {
                const li = document.createElement('li');
                li.className = 'flex items-start gap-2';
                li.innerHTML = `<i class="fa fa-check-circle text-green-500 mt-1 flex-shrink-0"></i><span>${f}</span>`;
                featuresList.appendChild(li);
            });

            // Tech stack
            const techStackDiv = document.getElementById('modalTechStack');
            techStackDiv.innerHTML = '';
            tool.techStack.forEach(t => {
                const span = document.createElement('span');
                span.className = 'px-3 py-1 bg-blue-100 text-blue-800 rounded-full text-sm font-medium';
                span.textContent = t;
                techStackDiv.appendChild(span);
            });

            toolModal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        // Close modal
        closeModal.addEventListener('click', () => {
            toolModal.classList.add('hidden');
            document.body.style.overflow = 'auto';
            currentTool = null;
        });

        // Close modal on outside click
        toolModal.addEventListener('click', (e) => {
            if (e.target === toolModal) {
                toolModal.classList.add('hidden');
                document.body.style.overflow = 'auto';
                currentTool = null;
            }
        });

        // Download tool
        downloadToolBtn.addEventListener('click', async () => {
            if (!currentTool) return;
            
            try {
                // Fetch the file content
                const response = await fetch(`../builds/${currentTool.filePath}`);
                const content = await response.text();
                
                // Create download
                const blob = new Blob([content], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = currentTool.filename;
                a.click();
                URL.revokeObjectURL(url);

                // Show success
                const originalText = downloadToolBtn.innerHTML;
                downloadToolBtn.innerHTML = '<i class="fa fa-check"></i> <span>下载成功！</span>';
                downloadToolBtn.classList.add('bg-green-600');
                setTimeout(() => {
                    downloadToolBtn.innerHTML = originalText;
                    downloadToolBtn.classList.remove('bg-green-600');
                }, 2000);
            } catch (error) {
                alert('下载失败，请稍后重试');
            }
        });

        // Filter tools
        function filterTools() {
            const searchTerm = searchInput.value.toLowerCase();
            const category = categoryFilter.value;

            const filtered = tools.filter(tool => {
                const matchesSearch = 
                    tool.name.toLowerCase().includes(searchTerm) ||
                    tool.tagline.toLowerCase().includes(searchTerm) ||
                    tool.description.toLowerCase().includes(searchTerm) ||
                    tool.category.toLowerCase().includes(searchTerm) ||
                    tool.features.some(f => f.toLowerCase().includes(searchTerm));
                
                const matchesCategory = category === 'all' || tool.category === category;

                return matchesSearch && matchesCategory;
            });

            renderTools(filtered);
        }

        // Event listeners
        searchInput.addEventListener('input', filterTools);
        categoryFilter.addEventListener('change', filterTools);

        // Initial render
        renderTools();
    </script>
