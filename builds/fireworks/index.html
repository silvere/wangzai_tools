<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎆 2026 蛇年大吉 · 除夕烟花</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;overflow:hidden;font-family:'PingFang SC','Microsoft YaHei',system-ui,sans-serif;cursor:crosshair}
canvas{display:block}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:10}
.greeting{font-size:clamp(2em,8vw,5em);font-weight:900;background:linear-gradient(135deg,#ff6b6b,#ffd93d,#ff6b6b,#ffd93d);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 3s ease infinite;text-shadow:0 0 40px rgba(255,107,107,.3);letter-spacing:8px;margin-bottom:10px}
@keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.sub{color:#ffd93d;font-size:clamp(.9em,3vw,1.4em);opacity:.9;text-shadow:0 0 20px rgba(255,217,61,.4);letter-spacing:4px}
.year{font-size:clamp(1.2em,4vw,2em);color:#ff6b6b;margin-top:16px;letter-spacing:6px;opacity:.8}
.couplet{position:fixed;top:50%;transform:translateY(-50%);writing-mode:vertical-rl;font-size:clamp(1em,2.5vw,1.6em);color:#ffd93d;letter-spacing:12px;text-shadow:0 0 15px rgba(255,217,61,.3);opacity:.7;padding:20px 8px;background:linear-gradient(180deg,rgba(180,30,30,.3),rgba(180,30,30,.15));border-radius:8px}
.couplet-l{left:clamp(8px,3vw,30px)}
.couplet-r{right:clamp(8px,3vw,30px)}
.hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.3);font-size:.8em;pointer-events:none;z-index:10}
.lantern{position:fixed;top:-10px;font-size:clamp(2em,5vw,3.5em);animation:sway 3s ease-in-out infinite;z-index:5}
.lantern:nth-child(1){left:15%;animation-delay:0s}
.lantern:nth-child(2){right:15%;animation-delay:1.5s}
@keyframes sway{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
.snake{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);font-size:3em;animation:bounce 2s ease-in-out infinite;z-index:5;pointer-events:none}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-15px)}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="overlay">
<div class="greeting">蛇年大吉</div>
<div class="sub">万事如意 · 阖家团圆</div>
<div class="year">✦ 2026 丙午蛇年 ✦</div>
</div>
<div class="couplet couplet-l">金蛇献瑞迎新岁</div>
<div class="couplet couplet-r">紫气东来贺丰年</div>
<div class="lantern">🏮</div>
<div class="lantern">🏮</div>
<div class="snake">🐍</div>
<div class="hint">✨ 点击屏幕放烟花 ✨</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
resize();
addEventListener('resize',resize);

// Firework colors - festive red/gold theme
const COLORS=[
  ['#ff6b6b','#ee5a24','#f9ca24'],
  ['#ffd93d','#f0932b','#eb4d4b'],
  ['#ff4757','#ffa502','#ff6348'],
  ['#e74c3c','#f39c12','#e67e22'],
  ['#ff6b81','#ffd32a','#ff5252'],
  ['#c0392b','#d35400','#f1c40f'],
  ['#ff4444','#ffbb33','#ff8800'],
  ['#e91e63','#ff9800','#ffc107']
];

class Particle{
  constructor(x,y,color,vx,vy,life,size,trail){
    this.x=x;this.y=y;this.color=color;
    this.vx=vx;this.vy=vy;
    this.life=life;this.maxLife=life;
    this.size=size;this.trail=trail||false;
    this.history=[];
  }
  update(){
    if(this.trail&&this.life>this.maxLife*.3){
      this.history.push({x:this.x,y:this.y,a:this.life/this.maxLife});
      if(this.history.length>8)this.history.shift();
    }
    this.x+=this.vx;this.y+=this.vy;
    this.vy+=.03;this.vx*=.99;this.vy*=.99;
    this.life--;
  }
  draw(){
    const a=this.life/this.maxLife;
    // Trail
    for(let i=0;i<this.history.length;i++){
      const h=this.history[i];
      const ta=h.a*a*(i/this.history.length)*.4;
      ctx.beginPath();
      ctx.arc(h.x,h.y,this.size*.5,0,Math.PI*2);
      ctx.fillStyle=this.color.replace(')',`,${ta})`).replace('rgb','rgba');
      ctx.fill();
    }
    // Main particle
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size*a,0,Math.PI*2);
    ctx.fillStyle=this.color.replace(')',`,${a})`).replace('rgb','rgba');
    ctx.fill();
    // Glow
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size*a*3,0,Math.PI*2);
    ctx.fillStyle=this.color.replace(')',`,${a*.15})`).replace('rgb','rgba');
    ctx.fill();
  }
}

let particles=[];

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return`rgb(${r},${g},${b})`;
}

function explode(x,y){
  const palette=COLORS[Math.random()*COLORS.length|0];
  const count=60+Math.random()*40;
  const type=Math.random();
  
  for(let i=0;i<count;i++){
    const color=hexToRgb(palette[Math.random()*palette.length|0]);
    let vx,vy;
    
    if(type<.3){
      // Circle burst
      const angle=Math.PI*2*i/count;
      const speed=2+Math.random()*3;
      vx=Math.cos(angle)*speed;
      vy=Math.sin(angle)*speed;
    }else if(type<.6){
      // Random burst
      const angle=Math.random()*Math.PI*2;
      const speed=1+Math.random()*4;
      vx=Math.cos(angle)*speed;
      vy=Math.sin(angle)*speed;
    }else{
      // Double ring
      const ring=i<count/2?1:2;
      const angle=Math.PI*2*(i%(count/2))/(count/2);
      const speed=ring*2+Math.random();
      vx=Math.cos(angle)*speed;
      vy=Math.sin(angle)*speed;
    }
    
    particles.push(new Particle(x,y,color,vx,vy,60+Math.random()*40,1.5+Math.random()*1.5,true));
  }
  
  // Sparkle center
  for(let i=0;i<15;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=.5+Math.random()*1.5;
    particles.push(new Particle(x,y,hexToRgb('#ffd93d'),Math.cos(angle)*speed,Math.sin(angle)*speed,30+Math.random()*20,1,false));
  }
}

function launchRocket(tx,ty){
  const sx=W*.2+Math.random()*W*.6;
  const sy=H;
  const steps=40+Math.random()*20;
  const vx=(tx-sx)/steps;
  const vy=(ty-sy)/steps;
  
  // Rising trail
  let step=0;
  const rise=setInterval(()=>{
    const x=sx+vx*step;
    const y=sy+vy*step;
    particles.push(new Particle(x,y,hexToRgb('#ffd93d'),Math.random()-.5,-Math.random(),15,1,false));
    step++;
    if(step>=steps){
      clearInterval(rise);
      explode(tx,ty);
    }
  },16);
}

// Auto fireworks
function autoLaunch(){
  const x=W*.15+Math.random()*W*.7;
  const y=H*.1+Math.random()*H*.35;
  launchRocket(x,y);
}

setInterval(autoLaunch,1200+Math.random()*1500);
setTimeout(()=>setInterval(autoLaunch,2000+Math.random()*2000),600);

// Click to launch
canvas.addEventListener('click',e=>{
  launchRocket(e.clientX,e.clientY);
});
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.touches[0];
  launchRocket(t.clientX,t.clientY);
},{passive:false});

// Animation loop
function animate(){
  ctx.fillStyle='rgba(10,10,26,.15)';
  ctx.fillRect(0,0,W,H);
  
  for(let i=particles.length-1;i>=0;i--){
    particles[i].update();
    particles[i].draw();
    if(particles[i].life<=0)particles.splice(i,1);
  }
  
  // Limit particles
  if(particles.length>3000)particles.splice(0,particles.length-3000);
  
  requestAnimationFrame(animate);
}
animate();

// Stars background
function drawStars(){
  for(let i=0;i<100;i++){
    const x=Math.random()*W;
    const y=Math.random()*H;
    const s=Math.random()*1.5;
    ctx.beginPath();
    ctx.arc(x,y,s,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${.1+Math.random()*.3})`;
    ctx.fill();
  }
}
drawStars();
</script>
</body>
</html>
