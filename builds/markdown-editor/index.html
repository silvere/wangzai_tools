<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Editor 编辑器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--surface:#1e293b;--surface2:#334155;--border:#475569;--text:#e2e8f0;--text2:#94a3b8;--accent:#3b82f6;--green:#22c55e;--orange:#f59e0b;--purple:#a78bfa}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
.header{padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.toolbar{display:flex;gap:8px;align-items:center}
.btn{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;font-size:12px;transition:all .15s;display:flex;align-items:center;gap:4px}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.main{display:flex;height:calc(100vh - 50px)}
.editor-pane,.preview-pane{flex:1;overflow:auto;padding:20px}
.editor-pane{background:var(--bg);border-right:1px solid var(--border)}
.editor-pane textarea{width:100%;height:100%;background:transparent;border:none;color:var(--text);font-family:'SF Mono',Monaco,'Cascadia Code',Consolas,monospace;font-size:14px;line-height:1.8;resize:none;outline:none}
.editor-pane textarea::placeholder{color:var(--text2)}
.preview-pane{background:var(--surface);padding:40px}
.preview-content{max-width:800px;margin:0 auto}
.preview-content h1{font-size:32px;margin:24px 0 16px;line-height:1.3;font-weight:700}
.preview-content h2{font-size:26px;margin:20px 0 12px;line-height:1.3;font-weight:600}
.preview-content h3{font-size:22px;margin:18px 0 10px;line-height:1.3;font-weight:600}
.preview-content h4{font-size:18px;margin:16px 0 8px;line-height:1.3;font-weight:600}
.preview-content p{margin:12px 0;line-height:1.8;font-size:15px}
.preview-content ul,.preview-content ol{margin:12px 0 12px 24px;line-height:1.8}
.preview-content li{margin:6px 0}
.preview-content code{background:var(--surface2);padding:2px 6px;border-radius:4px;font-size:13px;font-family:'SF Mono',Monaco,Consolas,monospace;color:var(--purple)}
.preview-content pre{background:var(--surface2);padding:16px;border-radius:8px;overflow-x:auto;margin:16px 0}
.preview-content pre code{background:none;padding:0;color:var(--text)}
.preview-content blockquote{border-left:4px solid var(--accent);padding-left:16px;margin:16px 0;color:var(--text2);font-style:italic}
.preview-content a{color:var(--accent);text-decoration:none}
.preview-content a:hover{text-decoration:underline}
.preview-content img{max-width:100%;border-radius:8px;margin:16px 0}
.preview-content table{width:100%;border-collapse:collapse;margin:16px 0}
.preview-content th,.preview-content td{border:1px solid var(--border);padding:8px 12px;text-align:left}
.preview-content th{background:var(--surface2);font-weight:600}
.preview-content hr{border:none;border-top:1px solid var(--border);margin:24px 0}
.stats{position:fixed;bottom:16px;right:16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--text2);display:flex;gap:12px}
.toast{position:fixed;bottom:60px;right:16px;background:var(--accent);color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:1000}
.toast.show{opacity:1}
.mode-toggle{display:flex;gap:2px;background:var(--surface2);border-radius:6px;padding:2px}
.mode-toggle button{padding:4px 10px;border-radius:4px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:11px;transition:all .15s}
.mode-toggle button.active{background:var(--accent);color:#fff}
@media(max-width:768px){.main{flex-direction:column}.editor-pane,.preview-pane{flex:none;height:50vh}.editor-pane{border-right:none;border-bottom:1px solid var(--border)}}
</style>
</head>
<body>
<div class="header">
<h1>📝 Markdown Editor</h1>
<div class="toolbar">
<div class="mode-toggle">
<button class="active" onclick="setMode('split')">分屏</button>
<button onclick="setMode('edit')">编辑</button>
<button onclick="setMode('preview')">预览</button>
</div>
<button class="btn" onclick="loadTemplate('article')">📄 文章</button>
<button class="btn" onclick="loadTemplate('readme')">📋 README</button>
<button class="btn" onclick="loadTemplate('doc')">📚 文档</button>
<button class="btn" onclick="downloadMd()">💾 下载</button>
<button class="btn" onclick="copyMd()">📋 复制</button>
</div>
</div>
<div class="main" id="main">
<div class="editor-pane" id="editorPane">
<textarea id="editor" placeholder="# 开始写作...

支持标准 Markdown 语法：
- 标题：# H1, ## H2, ### H3
- 粗体：**粗体**
- 斜体：*斜体*
- 代码：\`code\`
- 链接：[文字](url)
- 图片：![alt](url)
- 列表：- 项目
- 引用：> 引用文字"></textarea>
</div>
<div class="preview-pane" id="previewPane">
<div class="preview-content" id="preview"></div>
</div>
</div>
<div class="stats" id="stats">
<span id="charCount">0 字符</span>
<span id="wordCount">0 词</span>
<span id="lineCount">0 行</span>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const editor=document.getElementById('editor');
const preview=document.getElementById('preview');
let currentMode='split';

// Configure marked
marked.setOptions({
  breaks:true,
  gfm:true,
  headerIds:true,
  mangle:false
});

function updatePreview(){
  const md=editor.value;
  const html=marked.parse(md);
  preview.innerHTML=html;
  updateStats(md);
}

function updateStats(text){
  const chars=text.length;
  const words=(text.match(/[\u4e00-\u9fa5]|[a-zA-Z]+/g)||[]).length;
  const lines=text.split('\n').length;
  document.getElementById('charCount').textContent=`${chars.toLocaleString()} 字符`;
  document.getElementById('wordCount').textContent=`${words.toLocaleString()} 词`;
  document.getElementById('lineCount').textContent=`${lines.toLocaleString()} 行`;
}

function setMode(mode){
  currentMode=mode;
  const main=document.getElementById('main');
  const editorPane=document.getElementById('editorPane');
  const previewPane=document.getElementById('previewPane');
  
  document.querySelectorAll('.mode-toggle button').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  
  if(mode==='split'){
    editorPane.style.display='block';
    previewPane.style.display='block';
  }else if(mode==='edit'){
    editorPane.style.display='block';
    previewPane.style.display='none';
  }else{
    editorPane.style.display='none';
    previewPane.style.display='block';
  }
}

const templates={
  article:`# 文章标题

> 一句话概括文章主题

## 引言

在这里写引言，介绍背景和动机...

## 总结

---

*作者：XXX | 日期：${new Date().toLocaleDateString('zh-CN')}*`,

  readme:`# 项目名称

简短描述项目的功能和特点。

  doc:`# 技术文档

};

function loadTemplate(name){
  editor.value=templates[name];
  updatePreview();
  showToast(`✅ 已加载${name}模板`);
}

function downloadMd(){
  const text=editor.value;
  if(!text){showToast('内容为空');return}
  const blob=new Blob([text],{type:'text/markdown'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='document.md';
  a.click();
  showToast('✅ 已下载');
}

function copyMd(){
  const text=editor.value;
  if(!text){showToast('内容为空');return}
  navigator.clipboard.writeText(text).then(()=>{
    showToast('✅ 已复制到剪贴板');
  });
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// Auto-update preview
editor.addEventListener('input',updatePreview);

// Keyboard shortcuts
editor.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){
    e.preventDefault();
    downloadMd();
  }
  if((e.ctrlKey||e.metaKey)&&e.key==='b'){
    e.preventDefault();
    insertMarkdown('**','**');
  }
  if((e.ctrlKey||e.metaKey)&&e.key==='i'){
    e.preventDefault();
    insertMarkdown('*','*');
  }
  if(e.key==='Tab'){
    e.preventDefault();
    insertText('  ');
  }
});

function insertMarkdown(before,after){
  const start=editor.selectionStart;
  const end=editor.selectionEnd;
  const text=editor.value;
  const selected=text.substring(start,end);
  editor.value=text.substring(0,start)+before+selected+after+text.substring(end);
  editor.selectionStart=start+before.length;
  editor.selectionEnd=end+before.length;
  editor.focus();
  updatePreview();
}

function insertText(text){
  const start=editor.selectionStart;
  const val=editor.value;
  editor.value=val.substring(0,start)+text+val.substring(start);
  editor.selectionStart=editor.selectionEnd=start+text.length;
  editor.focus();
  updatePreview();
}

// Initialize
updatePreview();
</script>
</body>
</html>
