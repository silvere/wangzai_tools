                score: "⭐⭐⭐⭐⭐",
                highlights: [

                ],
                techStack: ["Python", "FastAPI", "React", "Celery 任务调度", "可视化库"],

                month1: "支持更多模型和基准，优化可视化功能，发布正式版本",
                longTerm: "成为行业标准的评测工具，提供评测服务，对接模型供应商"
            }
        ];

        // DOM Elements
        const categorySelect = document.getElementById('category');
        const techSelect = document.getElementById('tech');
        const difficultySelect = document.getElementById('difficulty');
        const generateBtn = document.getElementById('generateBtn');
        const regenerateBtn = document.getElementById('regenerateBtn');
        const copyBtn = document.getElementById('copyBtn');
        const saveBtn = document.getElementById('saveBtn');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        const savedSection = document.getElementById('savedSection');
        const savedGrid = document.getElementById('savedGrid');
        const generatedCount = document.getElementById('generatedCount');

        // State
        let currentIdea = null;
        let savedIdeas = JSON.parse(localStorage.getItem('savedIdeas') || '[]');
        let count = parseInt(localStorage.getItem('generatedCount') || '0');

        // Update count display
        generatedCount.textContent = count;

        // Generate idea
        function generateIdea() {
            const category = categorySelect.value;
            const tech = techSelect.value;
            const difficulty = difficultySelect.value;

            // Filter ideas
            let filtered = ideas.filter(idea => {
                const matchCategory = category === 'all' || idea.category === category;
                const matchTech = tech === 'any' || idea.tech === tech;
                const matchDifficulty = difficulty === 'any' || idea.difficulty === difficulty;
                return matchCategory && matchTech && matchDifficulty;
            });

            if (filtered.length === 0) {
                filtered = ideas; // Fallback to all if no matches
            }

            // Random select
            currentIdea = filtered[Math.floor(Math.random() * filtered.length)];

            // Show loading
            loading.classList.remove('hidden');
            result.classList.add('hidden');

            // Simulate processing
            setTimeout(() => {
                loading.classList.add('hidden');
                displayIdea(currentIdea);
                result.classList.remove('hidden');
                count++;
                generatedCount.textContent = count;
                localStorage.setItem('generatedCount', count.toString());

                // Smooth scroll to result
                result.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 1500);
        }

        // Display idea
        function displayIdea(idea) {
            document.getElementById('ideaTitle').textContent = idea.title;
            document.getElementById('ideaTagline').textContent = idea.tagline;
            document.getElementById('ideaCategory').textContent = getCategoryName(idea.category);
            document.getElementById('ideaDifficulty').textContent = getDifficultyName(idea.difficulty);
            document.getElementById('ideaTech').textContent = getTechName(idea.tech);
            document.getElementById('ideaScore').textContent = idea.score;

            // Highlights
            const highlightsList = document.getElementById('ideaHighlights');
            highlightsList.innerHTML = '';
            idea.highlights.forEach(h => {
                const li = document.createElement('li');
                li.className = 'flex items-start gap-2';
                li.innerHTML = `<i class="fa fa-check-circle text-green-500 mt-1 flex-shrink-0"></i><span>${h}</span>`;
                highlightsList.appendChild(li);
            });

            // Features
            const featuresList = document.getElementById('ideaFeatures');
            featuresList.innerHTML = '';
            idea.features.forEach(f => {
                const li = document.createElement('li');
                li.className = 'flex items-start gap-2';
                li.innerHTML = `<i class="fa fa-star text-yellow-500 mt-1 flex-shrink-0"></i><span>${f}</span>`;
                featuresList.appendChild(li);
            });

            // Tech stack
            const techStackDiv = document.getElementById('ideaTechStack');
            techStackDiv.innerHTML = '';
            idea.techStack.forEach(t => {
                const span = document.createElement('span');
                span.className = 'tag bg-blue-100 text-blue-800';
                span.textContent = t;
                techStackDiv.appendChild(span);
            });

            // Monetization
            document.getElementById('ideaMonetization').textContent = idea.monetization;

            // Roadmap
            document.getElementById('ideaWeek1').textContent = idea.week1;
            document.getElementById('ideaMonth1').textContent = idea.month1;
            document.getElementById('ideaLongTerm').textContent = idea.longTerm;

            // Update save button state
            updateSaveButton();
        }

        // Get category display name
        function getCategoryName(category) {
            const names = {
                'ai': 'AI 相关',
                'saas': 'SaaS 工具',
                'opensource': '开源项目',
                'side': '副业赚钱',
                'automation': '自动化工具',
                'content': '内容创作',
                'productivity': '生产力工具'
            };
            return names[category] || category;
        }

        // Get difficulty display name
        function getDifficultyName(difficulty) {
            const names = {
                'easy': '简单',
                'medium': '中等',
                'hard': '复杂'
            };
            return names[difficulty] || difficulty;
        }

        // Get tech display name
        function getTechName(tech) {
            const names = {
                'any': '任意技术栈',
                'python': 'Python',
                'web': 'Web 开发',
                'fullstack': '全栈开发',
                'mobile': '移动端开发',
                'lowcode': '低代码'
            };
            return names[tech] || tech;
        }

        // Update save button
        function updateSaveButton() {
            const isSaved = savedIdeas.some(i => i.id === currentIdea.id);
            if (isSaved) {
                saveBtn.innerHTML = '<i class="fa fa-check"></i> <span>已保存</span>';
                saveBtn.classList.add('bg-gray-500');
                saveBtn.classList.remove('bg-green-600', 'hover:bg-green-700');
                saveBtn.disabled = true;
            } else {
                saveBtn.innerHTML = '<i class="fa fa-heart"></i> <span>保存灵感</span>';
                saveBtn.classList.remove('bg-gray-500');
                saveBtn.classList.add('bg-green-600', 'hover:bg-green-700');
                saveBtn.disabled = false;
            }
        }

        // Save idea
        function saveIdea() {
            if (!savedIdeas.some(i => i.id === currentIdea.id)) {
                savedIdeas.push(currentIdea);
                localStorage.setItem('savedIdeas', JSON.stringify(savedIdeas));
                updateSaveButton();
                renderSavedIdeas();
                savedSection.classList.remove('hidden');

                // Show success
                const originalText = saveBtn.innerHTML;
                saveBtn.innerHTML = '<i class="fa fa-check"></i> <span>保存成功！</span>';
                setTimeout(() => {
                    updateSaveButton();
                }, 2000);
            }
        }

        // Render saved ideas
        function renderSavedIdeas() {
            savedGrid.innerHTML = '';
            savedIdeas.forEach(idea => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-xl shadow-lg p-4 card-hover';
                card.innerHTML = `
                    <div class="flex items-start justify-between mb-3">
                        <div>
                            <h3 class="font-bold text-lg text-gray-900">${idea.title}</h3>
                            <p class="text-sm text-gray-500">${idea.tagline}</p>
                        </div>
                        <button class="delete-saved text-gray-400 hover:text-red-500 transition-all" data-id="${idea.id}">
                            <i class="fa fa-trash"></i>
                        </button>
                    </div>
                    <div class="flex flex-wrap gap-1 mb-3">
                        <span class="tag bg-blue-100 text-blue-800 text-xs">${getCategoryName(idea.category)}</span>
                        <span class="tag bg-orange-100 text-orange-800 text-xs">${getDifficultyName(idea.difficulty)}</span>
                        <span class="tag bg-green-100 text-green-800 text-xs">${idea.score}</span>
                    </div>
                    <p class="text-sm text-gray-600 line-clamp-2">${idea.highlights[0]}</p>
                `;
                savedGrid.appendChild(card);
            });

            // Add delete event listeners
            document.querySelectorAll('.delete-saved').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = parseInt(e.currentTarget.dataset.id);
                    savedIdeas = savedIdeas.filter(i => i.id !== id);
                    localStorage.setItem('savedIdeas', JSON.stringify(savedIdeas));
                    renderSavedIdeas();
                    updateSaveButton();
                    if (savedIdeas.length === 0) {
                        savedSection.classList.add('hidden');
                    }
                });
            });
        }

        // Copy idea
        function copyIdea() {
            const content = `# ${currentIdea.title}
${currentIdea.tagline}

## 基本信息
- **分类**: ${getCategoryName(currentIdea.category)}
- **难度**: ${getDifficultyName(currentIdea.difficulty)}
- **技术栈**: ${getTechName(currentIdea.tech)}
- **商业价值**: ${currentIdea.score}

## 项目亮点
${currentIdea.highlights.map(h => `- ${h}`).join('\n')}

## 核心功能
${currentIdea.features.map(f => `- ${f}`).join('\n')}

## 技术栈建议
${currentIdea.techStack.join(', ')}

## 商业化潜力
${currentIdea.monetization}

## 实施路线图
### 第一周
${currentIdea.week1}

### 第一个月
${currentIdea.month1}

### 长期规划
${currentIdea.longTerm}
`;

            navigator.clipboard.writeText(content).then(() => {
                const originalText = copyBtn.innerHTML;
                copyBtn.innerHTML = '<i class="fa fa-check"></i> <span>复制成功！</span>';
                copyBtn.classList.add('bg-green-600');
                setTimeout(() => {
                    copyBtn.innerHTML = originalText;
                    copyBtn.classList.remove('bg-green-600');
                }, 2000);
            });
        }

        // Event listeners
        generateBtn.addEventListener('click', generateIdea);
        regenerateBtn.addEventListener('click', generateIdea);
        copyBtn.addEventListener('click', copyIdea);
        saveBtn.addEventListener('click', saveIdea);

        // Initial render of saved ideas
        if (savedIdeas.length > 0) {
            savedSection.classList.remove('hidden');
            renderSavedIdeas();
        }
    </script>
</body>
</html>
