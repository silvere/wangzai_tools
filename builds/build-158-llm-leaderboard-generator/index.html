<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大模型评测榜单生成器 📊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">大模型评测榜单生成器 📊</h1>
            <p class="text-gray-600">一键生成漂亮的评测榜单表格和雷达图，写报告直接用！</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- 输入区 -->
            <div class="lg:col-span-1">
                <div class="bg-white rounded-lg shadow p-6">
                    <h2 class="text-xl font-semibold mb-4 text-gray-800">配置输入</h2>

                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Benchmarks (一行一个，格式: 名称)</label>
                        <textarea id="benchmarksInput" rows="6" placeholder="MMLU\nGSM8K\nHumanEval\nIFEval\nMathVista" class="w-full px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">模型 (格式: 名称,得分[逗号分隔])</label>
                        <textarea id="modelsInput" rows="10" placeholder="GPT-4,89.0,78.5,80.0,85.0,72.0\nClaude 3 Opus,88.5,76.0,79.5,84.0,74.0\nQwen 2 72B,82.0,72.0,73.0,78.0,68.0\nLlama 3 70B,79.0,68.0,70.0,75.0,65.0" class="w-full px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">图表标题</label>
                        <input type="text" id="chartTitle" placeholder="大模型综合能力对比" value="大模型综合能力对比" class="w-full px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>

                    <button onclick="generate()" class="w-full bg-blue-600 text-white py-3 px-4 rounded-lg hover:bg-blue-700 transition font-semibold">
                        🎨 生成榜单和图表
                    </button>

                    <button onclick="exportMarkdown()" class="w-full mt-2 bg-green-600 text-white py-2 px-4 rounded-lg hover:bg-green-700 transition">
                        📋 复制 Markdown
                    </button>

                    <button onclick="resetForm()" class="w-full mt-2 bg-gray-600 text-white py-2 px-4 rounded-lg hover:bg-gray-700 transition">
                        🔄 重置
                    </button>
                </div>
            </div>

            <!-- 输出区 -->
            <div class="lg:col-span-2">
                <!-- Markdown表格 -->
                <div class="bg-white rounded-lg shadow p-6 mb-6">
                    <h2 class="text-xl font-semibold mb-4 text-gray-800">📋 Markdown 表格</h2>
                    <div id="markdownOutput" class="bg-gray-50 rounded p-4 text-sm overflow-x-auto">
                        <p class="text-gray-500">点击"生成榜单"后显示结果...</p>
                    </div>
                </div>

                <!-- 雷达图 -->
                <div class="bg-white rounded-lg shadow p-6">
                    <h2 class="text-xl font-semibold mb-4 text-gray-800">📊 能力雷达图</h2>
                    <div class="w-full h-[400px]">
                        <canvas id="radarChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <footer class="text-center text-gray-500 text-sm mt-12">
            <p>完全浏览器本地运行，数据不会上传服务器 | 旺仔构建 🥛</p>
        </footer>
    </div>

    <script>
        let radarChart = null;

        function parseInput() {
            const benchmarksText = document.getElementById('benchmarksInput').value.trim();
            const modelsText = document.getElementById('modelsInput').value.trim();
            const title = document.getElementById('chartTitle').value.trim() || '大模型综合能力对比';

            if (!benchmarksText || !modelsText) {
                alert('请填写Benchmarks和模型信息！');
                return null;
            }

            const benchmarks = benchmarksText.split('\n').map(line => line.trim()).filter(line => line);

            const models = [];
            for (const line of modelsText.split('\n')) {
                const trimmed = line.trim();
                if (!trimmed) continue;
                const parts = trimmed.split(',');
                const name = parts[0].trim();
                const scores = parts.slice(1).map(s => parseFloat(s.trim())).filter(s => !isNaN(s));

                if (scores.length !== benchmarks.length) {
                    alert(`模型 "${name}" 的分数数量和 Benchmarks 数量不匹配！需要 ${benchmarks.length} 个分数，得到 ${scores.length} 个`);
                    return null;
                }

                models.push({ name, scores });
            }

            return { benchmarks, models, title };
        }

        function generateMarkdown(data) {
            const { benchmarks, models } = data;
            let md = '| 模型 | ' + benchmarks.join(' | ') + ' |\n';
            md += '|------|' + benchmarks.map(() => '------').join('|') + ' |\n';

            for (const model of models) {
                md += `| **${model.name}** | ` + model.scores.map(s => s.toFixed(1)).join(' | ') + ' |\n';
            }

            return md;
        }

        function generate() {
            const data = parseInput();
            if (!data) return;

            // 生成Markdown
            const md = generateMarkdown(data);
            const output = document.getElementById('markdownOutput');
            output.innerHTML = '<pre class="whitespace-pre-wrap">' + md + '</pre>';

            // 生成雷达图
            generateRadarChart(data);

            // 保存到clipboard
            window.lastMarkdown = md;
        }

        function generateRadarChart(data) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            const { benchmarks, models, title } = data;

            // 颜色循环
            const colors = [
                'rgb(54, 162, 235)',
                'rgb(255, 99, 132)',
                'rgb(75, 192, 192)',
                'rgb(255, 159, 64)',
                'rgb(153, 102, 255)',
                'rgb(255, 205, 86)',
            ];

            const datasets = data.models.map((model, i) => ({
                label: model.name,
                data: model.scores,
                borderColor: colors[i % colors.length],
                backgroundColor: colors[i % colors.length].replace('rgb', 'rgba').replace(')', ', 0.2)'),
                pointBackgroundColor: colors[i % colors.length],
                pointBorderColor: '#fff',
                pointHoverBackgroundColor: '#fff',
                pointHoverBorderColor: colors[i % colors.length]
            }));

            if (radarChart) {
                radarChart.destroy();
            }

            radarChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: benchmarks,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            angleLines: {
                                display: true
                            },
                            suggestedMin: 0,
                            suggestedMax: 100,
                            ticks: {
                                stepSize: 20
                            }
                        }
                    },
                    plugins: {
                        title: {
                            display: true,
                            text: title,
                            font: {
                                size: 16
                            }
                        },
                        legend: {
                            display: true,
                            position: 'bottom'
                        }
                    }
                }
            });
        }

        function exportMarkdown() {
            if (!window.lastMarkdown) {
                alert('请先生成榜单！');
                return;
            }
            navigator.clipboard.writeText(window.lastMarkdown).then(() => {
                alert('✅ Markdown 已复制到剪贴板！');
            }).catch(() => {
                alert('复制失败，请手动复制下面的内容:\n\n' + window.lastMarkdown);
            });
        }

        function resetForm() {
            document.getElementById('benchmarksInput').value = '';
            document.getElementById('modelsInput').value = '';
            document.getElementById('chartTitle').value = '大模型综合能力对比';
            document.getElementById('markdownOutput').innerHTML = '<p class="text-gray-500">点击"生成榜单"后显示结果...</p>';
            if (radarChart) {
                radarChart.destroy();
                radarChart = null;
            }
            window.lastMarkdown = null;
        }

        // 填入示例数据
        document.getElementById('benchmarksInput').value = `MMLU
GSM8K
HumanEval
IFEval
MathVista`;
        document.getElementById('modelsInput').value = `GPT-4,89.0,78.5,80.0,85.0,72.0
Claude 3 Opus,88.5,76.0,79.5,84.0,74.0
Qwen 2 72B,82.0,72.0,73.0,78.0,68.0
Llama 3 70B,79.0,68.0,70.0,75.0,65.0`;
    </script>
</body>
</html>
