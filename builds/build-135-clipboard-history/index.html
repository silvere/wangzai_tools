<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>剪贴板历史管理器 📋 | 旺仔工具百宝箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .clipboard-item {
            transition: all 0.2s ease;
        }
        
        .clipboard-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        
        .copy-success {
            animation: pulse 0.5s ease;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .text-truncate {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-50 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- Header -->
        <header class="text-center mb-8">
            <div class="flex items-center justify-center gap-3 mb-2">
                <i class="fa fa-clipboard text-4xl text-indigo-600"></i>
                <h1 class="text-4xl font-bold text-gray-800">剪贴板历史管理器</h1>
            </div>
            <p class="text-gray-600 text-lg">本地离线存储，永不丢失你的复制内容，一键回溯历史记录</p>
        </header>

        <!-- Control Panel -->
        <div class="bg-white rounded-2xl shadow-xl p-6 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="flex flex-col gap-2">
                    <label class="text-sm font-semibold text-gray-700">自动监控</label>
                    <div class="flex items-center gap-3">
                        <button id="monitorToggle" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded-lg transition-all">
                            <i class="fa fa-play mr-2"></i>启动监控
                        </button>
                        <span id="monitorStatus" class="text-sm text-gray-500">
                            <i class="fa fa-circle text-red-500 mr-1"></i>未运行
                        </span>
                    </div>
                </div>
                
                <div class="flex flex-col gap-2">
                    <label class="text-sm font-semibold text-gray-700">存储限制</label>
                    <select id="maxItems" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                        <option value="50">最多保存 50 条</option>
                        <option value="100" selected>最多保存 100 条</option>
                        <option value="200">最多保存 200 条</option>
                        <option value="500">最多保存 500 条</option>
                        <option value="1000">最多保存 1000 条</option>
                    </select>
                </div>
                
                <div class="flex flex-col gap-2">
                    <label class="text-sm font-semibold text-gray-700">操作</label>
                    <div class="flex gap-2">
                        <button id="exportBtn" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-4 rounded-lg transition-all">
                            <i class="fa fa-download mr-2"></i>导出
                        </button>
                        <button id="clearBtn" class="flex-1 bg-red-600 hover:bg-red-700 text-white font-medium py-2 px-4 rounded-lg transition-all">
                            <i class="fa fa-trash mr-2"></i>清空
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="mt-6">
                <div class="relative">
                    <i class="fa fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    <input 
                        id="searchInput" 
                        type="text" 
                        placeholder="搜索剪贴板历史...（支持关键词、时间范围筛选）"
                        class="w-full pl-12 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                    >
                </div>
            </div>
            
            <div class="mt-4 flex flex-wrap gap-2">
                <span class="text-sm font-medium text-gray-700">快速筛选：</span>
                <button class="filter-btn px-3 py-1 bg-gray-100 hover:bg-gray-200 rounded-full text-sm text-gray-700 transition-all" data-filter="all">全部</button>
                <button class="filter-btn px-3 py-1 bg-gray-100 hover:bg-gray-200 rounded-full text-sm text-gray-700 transition-all" data-filter="today">今天</button>
                <button class="filter-btn px-3 py-1 bg-gray-100 hover:bg-gray-200 rounded-full text-sm text-gray-700 transition-all" data-filter="yesterday">昨天</button>
                <button class="filter-btn px-3 py-1 bg-gray-100 hover:bg-gray-200 rounded-full text-sm text-gray-700 transition-all" data-filter="week">本周</button>
                <button class="filter-btn px-3 py-1 bg-gray-100 hover:bg-gray-200 rounded-full text-sm text-gray-700 transition-all" data-filter="text">纯文本</button>
                <button class="filter-btn px-3 py-1 bg-gray-100 hover:bg-gray-200 rounded-full text-sm text-gray-700 transition-all" data-filter="url">链接</button>
                <button class="filter-btn px-3 py-1 bg-gray-100 hover:bg-gray-200 rounded-full text-sm text-gray-700 transition-all" data-filter="code">代码</button>
            </div>
        </div>

        <!-- Statistics -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white rounded-xl shadow-lg p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500 font-medium">总记录数</p>
                        <p id="totalCount" class="text-3xl font-bold text-gray-800">0</p>
                    </div>
                    <div class="w-12 h-12 bg-indigo-100 rounded-full flex items-center justify-center">
                        <i class="fa fa-list text-indigo-600 text-xl"></i>
                    </div>
                </div>
            </div>
            
            <div class="bg-white rounded-xl shadow-lg p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500 font-medium">今日复制</p>
                        <p id="todayCount" class="text-3xl font-bold text-gray-800">0</p>
                    </div>
                    <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                        <i class="fa fa-calendar text-blue-600 text-xl"></i>
                    </div>
                </div>
            </div>
            
            <div class="bg-white rounded-xl shadow-lg p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500 font-medium">最常复制</p>
                        <p id="mostCopied" class="text-3xl font-bold text-gray-800">-</p>
                    </div>
                    <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
                        <i class="fa fa-star text-green-600 text-xl"></i>
                    </div>
                </div>
            </div>
            
            <div class="bg-white rounded-xl shadow-lg p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500 font-medium">已用存储</p>
                        <p id="storageUsed" class="text-3xl font-bold text-gray-800">0 KB</p>
                    </div>
                    <div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center">
                        <i class="fa fa-database text-purple-600 text-xl"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Clipboard History List -->
        <div class="bg-white rounded-2xl shadow-xl p-6">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-bold text-gray-800">历史记录</h2>
                <div class="flex items-center gap-2">
                    <span class="text-sm text-gray-500">排序：</span>
                    <select id="sortBy" class="border border-gray-300 rounded-lg px-3 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                        <option value="newest">最新优先</option>
                        <option value="oldest">最早优先</option>
                        <option value="mostUsed">最常使用</option>
                    </select>
                </div>
            </div>
            
            <div id="clipboardList" class="space-y-4 max-h-[600px] overflow-y-auto scrollbar-hide">
                <div class="text-center py-16 text-gray-500">
                    <i class="fa fa-clipboard text-6xl mb-4 text-gray-300"></i>
                    <p class="text-lg">暂无剪贴板历史记录</p>
                    <p class="text-sm mt-2">点击上方"启动监控"按钮开始记录复制内容</p>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="text-center mt-12 text-gray-500 text-sm">
            <p>💾 所有数据完全存储在浏览器本地，绝不会上传到任何服务器，安全可靠</p>
            <p class="mt-2">⭐ 旺仔工具百宝箱 | 纯前端离线工具，开箱即用</p>
        </footer>
    </div>

    <script>
        let clipboardHistory = [];
        let isMonitoring = false;
        let monitorInterval = null;
        let lastClipboardText = '';
        let currentFilter = 'all';
        let currentSort = 'newest';
        let searchQuery = '';

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadHistory();
            updateStatistics();
            renderHistory();
            setupEventListeners();
        });

        // 设置事件监听
        function setupEventListeners() {
            // 监控切换
            document.getElementById('monitorToggle').addEventListener('click', toggleMonitor);
            
            // 最大条目变化
            document.getElementById('maxItems').addEventListener('change', (e) => {
                const maxItems = parseInt(e.target.value);
                while (clipboardHistory.length > maxItems) {
                    clipboardHistory.pop();
                }
                saveHistory();
                renderHistory();
            });
            
            // 搜索
            document.getElementById('searchInput').addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase();
                renderHistory();
            });
            
            // 筛选按钮
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('bg-indigo-600', 'text-white'));
                    e.target.classList.add('bg-indigo-600', 'text-white');
                    currentFilter = e.target.dataset.filter;
                    renderHistory();
                });
            });
            
            // 排序
            document.getElementById('sortBy').addEventListener('change', (e) => {
                currentSort = e.target.value;
                renderHistory();
            });
            
            // 导出
            document.getElementById('exportBtn').addEventListener('click', exportHistory);
            
            // 清空
            document.getElementById('clearBtn').addEventListener('click', clearHistory);
        }

        // 切换监控
        function toggleMonitor() {
            isMonitoring = !isMonitoring;
            const btn = document.getElementById('monitorToggle');
            const status = document.getElementById('monitorStatus');
            
            if (isMonitoring) {
                btn.innerHTML = '<i class="fa fa-pause mr-2"></i>停止监控';
                btn.classList.remove('bg-indigo-600', 'hover:bg-indigo-700');
                btn.classList.add('bg-red-600', 'hover:bg-red-700');
                status.innerHTML = '<i class="fa fa-circle text-green-500 mr-1"></i>运行中';
                
                // 启动监控
                monitorInterval = setInterval(checkClipboard, 1000);
                checkClipboard(); // 立即检查一次
            } else {
                btn.innerHTML = '<i class="fa fa-play mr-2"></i>启动监控';
                btn.classList.remove('bg-red-600', 'hover:bg-red-700');
                btn.classList.add('bg-indigo-600', 'hover:bg-indigo-700');
                status.innerHTML = '<i class="fa fa-circle text-red-500 mr-1"></i>未运行';
                
                // 停止监控
                clearInterval(monitorInterval);
                monitorInterval = null;
            }
        }

        // 检查剪贴板
        async function checkClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                if (text && text !== lastClipboardText && text.trim().length > 0) {
                    lastClipboardText = text;
                    addToHistory(text);
                }
            } catch (err) {
                console.error('无法读取剪贴板:', err);
            }
        }

        // 添加到历史
        function addToHistory(text) {
            // 检查是否已存在相同内容
            const existingIndex = clipboardHistory.findIndex(item => item.text === text);
            
            if (existingIndex !== -1) {
                // 已存在，更新计数和时间
                clipboardHistory[existingIndex].count++;
                clipboardHistory[existingIndex].lastUsed = new Date().toISOString();
                // 移到最前面
                const item = clipboardHistory.splice(existingIndex, 1)[0];
                clipboardHistory.unshift(item);
            } else {
                // 新条目
                const item = {
                    id: Date.now(),
                    text: text,
                    timestamp: new Date().toISOString(),
                    lastUsed: new Date().toISOString(),
                    count: 1,
                    type: detectContentType(text)
                };
                clipboardHistory.unshift(item);
                
                // 限制数量
                const maxItems = parseInt(document.getElementById('maxItems').value);
                if (clipboardHistory.length > maxItems) {
                    clipboardHistory.pop();
                }
            }
            
            saveHistory();
            updateStatistics();
            renderHistory();
            
            // 复制成功提示
            showToast('已保存到剪贴板历史', 'success');
        }

        // 检测内容类型
        function detectContentType(text) {
            // URL检测
            const urlRegex = /^(https?:\/\/)?([\da-z.-]+)\.([a-z.]{2,6})([\/\w.-]*)*\/?$/;
            if (urlRegex.test(text)) return 'url';
            
            // 代码检测（包含常见代码关键字）
            const codeKeywords = ['function', 'const', 'let', 'var', 'class', 'import', 'export', 'def', 'if ', 'else ', 'for ', 'while ', 'return', '//', '/*', '*/', '#include', '<?php', '{%', '{{'];
            if (codeKeywords.some(keyword => text.includes(keyword)) || text.includes('{') && text.includes('}') || text.includes(';')) {
                return 'code';
            }
            
            return 'text';
        }

        // 加载历史
        function loadHistory() {
            const saved = localStorage.getItem('clipboardHistory');
            if (saved) {
                clipboardHistory = JSON.parse(saved);
            }
        }

        // 保存历史
        function saveHistory() {
            localStorage.setItem('clipboardHistory', JSON.stringify(clipboardHistory));
        }

        // 更新统计
        function updateStatistics() {
            document.getElementById('totalCount').textContent = clipboardHistory.length;
            
            // 今日计数
            const today = new Date().toDateString();
            const todayItems = clipboardHistory.filter(item => 
                new Date(item.timestamp).toDateString() === today
            );
            document.getElementById('todayCount').textContent = todayItems.length;
            
            // 最常复制
            if (clipboardHistory.length > 0) {
                const mostUsed = [...clipboardHistory].sort((a, b) => b.count - a.count)[0];
                document.getElementById('mostCopied').textContent = mostUsed.count + ' 次';
            } else {
                document.getElementById('mostCopied').textContent = '-';
            }
            
            // 存储使用
            const size = new Blob([JSON.stringify(clipboardHistory)]).size;
            const kbSize = Math.round(size / 1024 * 100) / 100;
            document.getElementById('storageUsed').textContent = kbSize + ' KB';
        }

        // 渲染历史
        function renderHistory() {
            const list = document.getElementById('clipboardList');
            
            // 筛选
            let filtered = [...clipboardHistory];
            
            // 搜索筛选
            if (searchQuery) {
                filtered = filtered.filter(item => 
                    item.text.toLowerCase().includes(searchQuery)
                );
            }
            
            // 类型/时间筛选
            if (currentFilter === 'today') {
                const today = new Date().toDateString();
                filtered = filtered.filter(item => 
                    new Date(item.timestamp).toDateString() === today
                );
            } else if (currentFilter === 'yesterday') {
                const yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                const yesterdayStr = yesterday.toDateString();
                filtered = filtered.filter(item => 
                    new Date(item.timestamp).toDateString() === yesterdayStr
                );
            } else if (currentFilter === 'week') {
                const weekAgo = new Date();
                weekAgo.setDate(weekAgo.getDate() - 7);
                filtered = filtered.filter(item => 
                    new Date(item.timestamp) >= weekAgo
                );
            } else if (currentFilter !== 'all') {
                filtered = filtered.filter(item => item.type === currentFilter);
            }
            
            // 排序
            if (currentSort === 'newest') {
                filtered.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            } else if (currentSort === 'oldest') {
                filtered.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
            } else if (currentSort === 'mostUsed') {
                filtered.sort((a, b) => b.count - a.count);
            }
            
            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-16 text-gray-500">
                        <i class="fa fa-search text-6xl mb-4 text-gray-300"></i>
                        <p class="text-lg">没有找到匹配的记录</p>
                        <p class="text-sm mt-2">尝试调整搜索关键词或筛选条件</p>
                    </div>
                `;
                return;
            }
            
            list.innerHTML = filtered.map(item => {
                const date = new Date(item.timestamp);
                const timeStr = date.toLocaleString('zh-CN', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                });
                
                const typeLabels = {
                    'text': '📝 文本',
                    'url': '🔗 链接',
                    'code': '💻 代码'
                };
                
                const typeColors = {
                    'text': 'bg-gray-100 text-gray-700',
                    'url': 'bg-blue-100 text-blue-700',
                    'code': 'bg-green-100 text-green-700'
                };
                
                return `
                    <div class="clipboard-item bg-white border border-gray-200 rounded-xl p-4 hover:border-indigo-300">
                        <div class="flex items-start justify-between gap-4">
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-2 mb-2">
                                    <span class="px-2 py-0.5 rounded text-xs font-medium ${typeColors[item.type]}">
                                        ${typeLabels[item.type]}
                                    </span>
                                    <span class="text-xs text-gray-500">${timeStr}</span>
                                    <span class="text-xs text-gray-500">复制 ${item.count} 次</span>
                                </div>
                                <p class="text-gray-800 text-truncate leading-relaxed whitespace-pre-wrap">${escapeHtml(item.text)}</p>
                            </div>
                            <div class="flex flex-col gap-2">
                                <button onclick="copyItem(${item.id})" class="w-10 h-10 bg-indigo-100 hover:bg-indigo-200 rounded-lg flex items-center justify-center text-indigo-600 transition-all" title="复制">
                                    <i class="fa fa-copy"></i>
                                </button>
                                <button onclick="viewItem(${item.id})" class="w-10 h-10 bg-blue-100 hover:bg-blue-200 rounded-lg flex items-center justify-center text-blue-600 transition-all" title="查看完整内容">
                                    <i class="fa fa-eye"></i>
                                </button>
                                <button onclick="deleteItem(${item.id})" class="w-10 h-10 bg-red-100 hover:bg-red-200 rounded-lg flex items-center justify-center text-red-600 transition-all" title="删除">
                                    <i class="fa fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 复制条目
        async function copyItem(id) {
            const item = clipboardHistory.find(i => i.id === id);
            if (!item) return;
            
            try {
                await navigator.clipboard.writeText(item.text);
                // 更新计数
                item.count++;
                item.lastUsed = new Date().toISOString();
                saveHistory();
                updateStatistics();
                
                // 成功动画
                showToast('复制成功！', 'success');
            } catch (err) {
                showToast('复制失败，请手动复制', 'error');
            }
        }

        // 查看条目
        function viewItem(id) {
            const item = clipboardHistory.find(i => i.id === id);
            if (!item) return;
            
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4';
            modal.innerHTML = `
                <div class="bg-white rounded-2xl max-w-4xl w-full max-h-[80vh] overflow-hidden">
                    <div class="p-6 border-b border-gray-200 flex items-center justify-between">
                        <h3 class="text-xl font-bold text-gray-800">完整内容</h3>
                        <button onclick="this.parentElement.parentElement.parentElement.remove()" class="text-gray-500 hover:text-gray-700">
                            <i class="fa fa-times text-xl"></i>
                        </button>
                    </div>
                    <div class="p-6 overflow-y-auto max-h-[calc(80vh-140px)]">
                        <pre class="whitespace-pre-wrap text-gray-800 font-mono text-sm bg-gray-50 p-4 rounded-lg">${escapeHtml(item.text)}</pre>
                    </div>
                    <div class="p-6 border-t border-gray-200 flex justify-end gap-3">
                        <button onclick="copyItem(${id}); this.parentElement.parentElement.parentElement.remove()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-6 rounded-lg transition-all">
                            <i class="fa fa-copy mr-2"></i>复制内容
                        </button>
                        <button onclick="this.parentElement.parentElement.parentElement.remove()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2 px-6 rounded-lg transition-all">
                            关闭
                        </button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }

        // 删除条目
        function deleteItem(id) {
            if (confirm('确定要删除这条记录吗？')) {
                clipboardHistory = clipboardHistory.filter(item => item.id !== id);
                saveHistory();
                updateStatistics();
                renderHistory();
                showToast('已删除', 'success');
            }
        }

        // 导出历史
        function exportHistory() {
            const data = JSON.stringify(clipboardHistory, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `clipboard-history-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('导出成功', 'success');
        }

        // 清空历史
        function clearHistory() {
            if (confirm('确定要清空所有剪贴板历史吗？此操作不可恢复！')) {
                clipboardHistory = [];
                saveHistory();
                updateStatistics();
                renderHistory();
                showToast('已清空所有历史记录', 'success');
            }
        }

        // 显示提示
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-4 right-4 px-6 py-3 rounded-lg shadow-lg text-white font-medium z-50 transition-all transform translate-y-0 opacity-100 ${
                type === 'success' ? 'bg-green-500' : 'bg-red-500'
            }`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-4');
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, 2000);
        }

        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
