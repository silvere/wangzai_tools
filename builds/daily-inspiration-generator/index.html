<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日灵感语录 | 成长/哲学/挣钱/冥想</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+ Serif+ SC:wght@400;700&display=swap');
        body {
            font-family: 'Noto Serif SC', serif;
        }
        .quote-card {
            animation: fadeIn 0.8s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .category-tag {
            transition: all 0.2s;
        }
        .category-tag:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-purple-50 via-blue-50 to-indigo-100">
    <div class="container mx-auto px-4 py-12 max-w-4xl">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-5xl font-bold text-gray-800 mb-3">💡 每日灵感语录</h1>
            <p class="text-gray-600 text-lg">点击刷新，获取成长 / 哲学 / 挣钱 / 冥想 / 人生 灵感</p>
        </div>

        <!-- Category Filters -->
        <div class="flex flex-wrap justify-center gap-3 mb-8">
            <button class="category-tag px-4 py-2 bg-blue-600 text-white rounded-full font-medium" data-category="all">全部</button>
            <button class="category-tag px-4 py-2 bg-white text-gray-700 rounded-full font-medium hover:bg-blue-100" data-category="growth">成长</button>
            <button class="category-tag px-4 py-2 bg-white text-gray-700 rounded-full font-medium hover:bg-blue-100" data-category="philosophy">哲学</button>
            <button class="category-tag px-4 py-2 bg-white text-gray-700 rounded-full font-medium hover:bg-blue-100" data-category="money">挣钱</button>
            <button class="category-tag px-4 py-2 bg-white text-gray-700 rounded-full font-medium hover:bg-blue-100" data-category="meditation">冥想</button>
            <button class="category-tag px-4 py-2 bg-white text-gray-700 rounded-full font-medium hover:bg-blue-100" data-category="ai">大模型</button>
            <button class="category-tag px-4 py-2 bg-white text-gray-700 rounded-full font-medium hover:bg-blue-100" data-category="life">人生</button>
        </div>

        <!-- Quote Card -->
        <div class="bg-white rounded-2xl shadow-xl p-8 md:p-12 mb-8 quote-card" id="quote-card">
            <blockquote id="quote-text" class="text-2xl md:text-3xl text-gray-800 font-serif leading-relaxed mb-6">
                真正的成长，是敢于从零开始。
            </blockquote>
            <div class="flex items-center justify-between">
                <div>
                    <p id="quote-author" class="text-gray-600 text-lg">—— 旺仔</p>
                    <span id="quote-category" class="inline-block mt-2 px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-sm">成长</span>
                </div>
                <button id="refresh-btn" class="px-6 py-3 bg-gradient-to-r from-blue-600 to-indigo-600 text-white rounded-lg font-semibold hover:from-blue-700 hover:to-indigo-700 transition">
                    🔄 换一句
                </button>
            </div>
        </div>

        <!-- Share & Copy -->
        <div class="text-center">
            <button id="copy-btn" class="px-6 py-3 bg-white border border-gray-300 text-gray-700 rounded-lg font-medium hover:bg-gray-50 transition">
                📋 复制这句话
            </button>
            <p class="mt-6 text-gray-500">
                每天打开一次，获取新的灵感 ✨
            </p>
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center py-8 text-gray-500 text-sm">
        <p>Built with ❤️ by 旺仔 · 每次刷新随机获得一句灵感</p>
    </footer>

    <script>
        const quotes = [
            // 成长
            { text: "真正的成长，发生在舒适区之外。", author: "成长格言", category: "growth" },
            { text: "慢慢来，比较快。日拱一卒，功不唐捐。", author: "成长格言", category: "growth" },
            { text: "每天进步百分之一，一年后你会惊掉下巴。", author: "复利法则", category: "growth" },
            { text: "大多数人高估了一年能做的事，低估了十年能做的事。", author: "李嘉诚", category: "growth" },
            { text: "种一棵树最好的时间是十年前，其次是现在。", author: "卡耐基", category: "growth" },
            { text: "完成比完美更重要。", author: "敏捷格言", category: "growth" },
            { text: "持续小赢，积累改变。", author: "成长法则", category: "growth" },
            { text: "最怕你一生碌碌无为，还安慰自己平凡可贵。", author: "扎心语录", category: "growth" },

            // 哲学
            { text: "世界上只有一种真正的英雄主义，那就是在认清生活的真相后依然热爱生活。", author: "罗曼·罗兰", category: "philosophy" },
            { text: "我思故我在。", author: "笛卡尔", category: "philosophy" },
            { text: "存在先于本质。", author: "萨特", category: "philosophy" },
            { text: "人不能两次踏进同一条河流。", author: "赫拉克利特", category: "philosophy" },
            { text: "知识就是力量。", author: "培根", category: "philosophy" },
            { text: "当你凝望深渊的时候，深渊也在凝望你。", author: "尼采", category: "philosophy" },
            { text: "幸福不是美德的报酬，而是美德本身。", author: "斯宾诺莎", category: "philosophy" },
            { text: "自由不是想做什么就做什么，而是不想做什么就可以不做什么。", author: "康德", category: "philosophy" },

            // 挣钱
            { text: "不要用你的爱好去挑战别人吃饭的本事。", author: "江湖格言", category: "money" },
            { text: "赚钱是结果，不是目标，目标是更好的生活。", author: "商业认知", category: "money" },
            { text: "人永远赚不到超出认知范围之外的钱，除非靠运气。", author: "查理·芒格", category: "money" },
            { text: "你永远赚不到，超出你认知范围外的钱。除非你靠运气，但是靠运气赚到的钱，最后往往又会靠实力亏掉。", author: "赚钱认知", category: "money" },
            { text: "专业的人赚钱，业余的人凑热闹。", author: "商业格言", category: "money" },
            { text: "信息差赚钱，认知差赚钱，执行力差赚钱。", author: "赚钱三板斧", category: "money" },
            { text: "商业模式对了，赚钱不累。", author: "商业认知", category: "money" },
            { text: "低成本试错，规模化复制。", author: "创业格言", category: "money" },

            // 冥想
            { text: "慢慢来，静心，感受呼吸。", author: "冥想格言", category: "meditation" },
            { text: "活在当下，就是最好的生活。", author: "正念格言", category: "meditation" },
            { text: "呼吸，放松，放空，接受一切。", author: "冥想指引", category: "meditation" },
            { text: "心静，自然凉。", author: "古人智慧", category: "meditation" },
            { text:"你的注意力在哪里，你的能量就在哪里。", author: "正念法则", category: "meditation" },
            { text: "停下来，才能听见内心的声音。", author: "冥想智慧", category: "meditation" },

            // 大模型
            { text: "Prompt 工程决定上限。", author: "大模型格言", category: "ai" },
            { text: "不要迷信大参数，小模型也能做事。", author: "LLM 认知", category: "ai" },
            { text: "数据比模型重要，数据清洗比炼丹重要。", author: "AI 工程格言", category: "ai" },
            { text: "评测比训练更重要。", author: "评测人箴言", category: "ai" },
            { text: "AGI 不是一天建成的。", author: "AI 格言", category: "ai" },
            { text: "先能用，再好用。", author: "AI 产品格言", category: "ai" },
            { text: "大模型改变生活，改变工作，不改变你。", author: "AI 思考", category: "ai" },

            // 人生
            { text: "健康是1，其他都是后面的0。", author: "人生格言", category: "life" },
            { text:"健康的乞丐比有病的国王幸福。", author: "叔本华", category: "life" },
            { text: "人生就像一盒巧克力，你永远不知道下一颗是什么味道。", author: "阿甘正传", category: "life" },
            { text: "做你想做的人，这件事，没有时间限制，只要你想，随时都可以开始。", author: "搏击俱乐部", category: "life" },
            { text: "种瓜得瓜，种豆得豆，不忘初心，方得始终。", author: "古人格言", category: "life" },
            { text: "接受自己的普通，然后全力以赴的出众。", author: "人生智慧", category: "life" },
            { text: "凡是过往，皆为序章。", author: "莎士比亚", category: "life" },
            { text: "既往不恋，当下不杂，未来不迎。", author: "曾国藩", category: "life" }
        ];

        let currentCategory = 'all';

        function getRandomQuote() {
            let filtered = quotes.filter(q => currentCategory === 'all' || q.category === currentCategory);
            const random = Math.floor(Math.random() * filtered.length);
            return filtered[random];
        }

        function displayQuote() {
            const q = getRandomQuote();
            const card = document.getElementById('quote-card');
            // Force reflow to trigger animation
            card.style.opacity = '0';
            setTimeout(() => {
                document.getElementById('quote-text').textContent = q.text;
                document.getElementById('quote-author').textContent = '—— ' + q.author;
                document.getElementById('quote-category').textContent = getCategoryName(q.category);
                card.style.opacity = '1';
            }, 200);
        }

        function getCategoryName(cat) {
            const map = {
                'growth': '成长',
                'philosophy': '哲学',
                'money': '挣钱',
                'meditation': '冥想',
                'ai': '大模型',
                'life': '人生'
            };
            return map[cat] || cat;
        }

        // Category filter buttons
        document.querySelectorAll('.category-tag').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.category-tag').forEach(b => {
                    b.classList.remove('bg-blue-600', 'text-white');
                    b.classList.add('bg-white', 'text-gray-700');
                });
                btn.classList.remove('bg-white', 'text-gray-700');
                btn.classList.add('bg-blue-60', 'text-white');
                currentCategory = btn.dataset.category;
                displayQuote();
            });
        });

        // Refresh button
        document.getElementById('refresh-btn').addEventListener('click', displayQuote);

        // Copy button
        document.getElementById('copy-btn').addEventListener('click', () => {
            const text = document.getElementById('quote-text').textContent + '\n' + document.getElementById('quote-author').textContent;
            navigator.clipboard.writeText(text).then(() => {
                const original = document.getElementById('copy-btn').textContent;
                document.getElementById('copy-btn').textContent = '✅ 已复制';
                setTimeout(() => {
                    document.getElementById('copy-btn').textContent = '📋 复制这句话';
                }, 2000);
            });
        });

        // Initial display
        displayQuote();
    </script>
</body>
</html>
