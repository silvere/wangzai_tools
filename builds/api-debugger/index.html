<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Response Debugger - LLM API 响应调试器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .panel {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .panel-title {
            font-size: 1.3em;
            font-weight: 600;
            color: #333;
        }

        .panel-number {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
        }

        textarea {
            width: 100%;
            height: 300px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .metrics {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .metric-row:last-child {
            border-bottom: none;
        }

        .metric-label {
            font-weight: 600;
            color: #666;
        }

        .metric-value {
            color: #333;
            font-family: 'Courier New', monospace;
        }

        .metric-value.success {
            color: #10b981;
            font-weight: 600;
        }

        .metric-value.error {
            color: #ef4444;
            font-weight: 600;
        }

        .metric-value.warning {
            color: #f59e0b;
            font-weight: 600;
        }

        .json-display {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 15px;
        }

        .json-key {
            color: #9cdcfe;
        }

        .json-string {
            color: #ce9178;
        }

        .json-number {
            color: #b5cea8;
        }

        .json-boolean {
            color: #569cd6;
        }

        .json-null {
            color: #569cd6;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        .comparison {
            grid-column: 1 / -1;
        }

        .comparison-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .comparison-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            border-left: 4px solid #667eea;
        }

        .comparison-title {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 10px;
        }

        .diff-highlight {
            background: #fef3c7;
            padding: 2px 4px;
            border-radius: 3px;
        }

        .examples {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .example-btn {
            padding: 8px 16px;
            background: #f3f4f6;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s;
        }

        .example-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .status-success {
            background: #d1fae5;
            color: #065f46;
        }

        .status-error {
            background: #fee2e2;
            color: #991b1b;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 API Response Debugger</h1>
            <p class="subtitle">LLM API 响应调试与对比分析工具</p>
        </header>

        <div class="main-content">
            <!-- Response 1 -->
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">Response 1</span>
                    <span class="panel-number" id="status1">待输入</span>
                </div>
                
                <div class="examples">
                    <button class="example-btn" onclick="loadExample(1, 'openai')">OpenAI</button>
                    <button class="example-btn" onclick="loadExample(1, 'anthropic')">Anthropic</button>
                    <button class="example-btn" onclick="loadExample(1, 'error')">错误示例</button>
                </div>

                <textarea id="input1" placeholder="粘贴 API 响应 JSON..."></textarea>
                
                <div class="buttons">
                    <button class="btn-primary" onclick="analyzeResponse(1)">分析</button>
                    <button class="btn-secondary" onclick="clearResponse(1)">清空</button>
                </div>

                <div id="metrics1"></div>
                <div id="json1"></div>
            </div>

            <!-- Response 2 -->
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">Response 2</span>
                    <span class="panel-number" id="status2">待输入</span>
                </div>
                
                <div class="examples">
                    <button class="example-btn" onclick="loadExample(2, 'openai')">OpenAI</button>
                    <button class="example-btn" onclick="loadExample(2, 'anthropic')">Anthropic</button>
                    <button class="example-btn" onclick="loadExample(2, 'qwen')">通义千问</button>
                </div>

                <textarea id="input2" placeholder="粘贴第二个 API 响应进行对比..."></textarea>
                
                <div class="buttons">
                    <button class="btn-primary" onclick="analyzeResponse(2)">分析</button>
                    <button class="btn-secondary" onclick="clearResponse(2)">清空</button>
                </div>

                <div id="metrics2"></div>
                <div id="json2"></div>
            </div>

            <!-- Comparison -->
            <div class="panel comparison">
                <div class="panel-header">
                    <span class="panel-title">📊 对比分析</span>
                    <button class="btn-primary" onclick="compareResponses()" style="flex: none; padding: 8px 20px;">生成对比</button>
                </div>
                <div id="comparison-result"></div>
            </div>
        </div>
    </div>

    <script>
        const examples = {
            openai: {
                "id": "chatcmpl-123",
                "object": "chat.completion",
                "created": 1677652288,
                "model": "gpt-4o",
                "choices": [{
                    "index": 0,
                    "message": {
                        "role": "assistant",
                        "content": "你好！我是 GPT-4o，很高兴为你服务。"
                    },
                    "finish_reason": "stop"
                }],
                "usage": {
                    "prompt_tokens": 12,
                    "completion_tokens": 18,
                    "total_tokens": 30
                }
            },
            anthropic: {
                "id": "msg_01XFDUDYJgAACzvnptvVoYEL",
                "type": "message",
                "role": "assistant",
                "content": [{
                    "type": "text",
                    "text": "你好！我是 Claude，Anthropic 开发的 AI 助手。"
                }],
                "model": "claude-3-5-sonnet-20241022",
                "stop_reason": "end_turn",
                "usage": {
                    "input_tokens": 10,
                    "output_tokens": 22
                }
            },
            qwen: {
                "output": {
                    "text": "你好！我是通义千问，阿里云开发的大语言模型。",
                    "finish_reason": "stop"
                },
                "usage": {
                    "input_tokens": 8,
                    "output_tokens": 20,
                    "total_tokens": 28
                },
                "request_id": "fb53c4ec-1c3e-9676-b4c3-1d5e8b2d0f8e"
            },
            error: {
                "error": {
                    "message": "Rate limit exceeded. Please try again later.",
                    "type": "rate_limit_error",
                    "code": "rate_limit_exceeded"
                }
            }
        };

        const responses = {};

        function loadExample(num, type) {
            document.getElementById(`input${num}`).value = JSON.stringify(examples[type], null, 2);
            analyzeResponse(num);
        }

        function clearResponse(num) {
            document.getElementById(`input${num}`).value = '';
            document.getElementById(`metrics${num}`).innerHTML = '';
            document.getElementById(`json${num}`).innerHTML = '';
            document.getElementById(`status${num}`).textContent = '待输入';
            document.getElementById(`status${num}`).style.background = 'linear-gradient(135deg, #667eea, #764ba2)';
            delete responses[num];
        }

        function analyzeResponse(num) {
            const input = document.getElementById(`input${num}`).value.trim();
            
            if (!input) {
                alert('请先输入 API 响应 JSON');
                return;
            }

            try {
                const data = JSON.parse(input);
                responses[num] = data;
                
                // 检测是否有错误
                const hasError = data.error !== undefined;
                
                // 更新状态
                const statusEl = document.getElementById(`status${num}`);
                if (hasError) {
                    statusEl.textContent = '❌ 错误';
                    statusEl.style.background = '#ef4444';
                } else {
                    statusEl.textContent = '✅ 正常';
                    statusEl.style.background = '#10b981';
                }

                // 提取指标
                const metrics = extractMetrics(data);
                displayMetrics(num, metrics, hasError);
                
                // 显示美化的 JSON
                displayJSON(num, data);

            } catch (e) {
                alert('JSON 解析失败：' + e.message);
            }
        }

        function extractMetrics(data) {
            const metrics = {};

            // 检测 API 类型和提取指标
            if (data.error) {
                // 错误响应
                metrics.type = '错误响应';
                metrics.error_type = data.error.type || 'unknown';
                metrics.error_message = data.error.message || 'No message';
                metrics.error_code = data.error.code || 'N/A';
            } else if (data.object === 'chat.completion') {
                // OpenAI 格式
                metrics.type = 'OpenAI';
                metrics.model = data.model;
                metrics.finish_reason = data.choices?.[0]?.finish_reason || 'N/A';
                metrics.prompt_tokens = data.usage?.prompt_tokens || 0;
                metrics.completion_tokens = data.usage?.completion_tokens || 0;
                metrics.total_tokens = data.usage?.total_tokens || 0;
                metrics.content_length = data.choices?.[0]?.message?.content?.length || 0;
                
                // 估算成本 (GPT-4o 价格)
                const inputCost = (metrics.prompt_tokens / 1000000) * 2.5;
                const outputCost = (metrics.completion_tokens / 1000000) * 10;
                metrics.estimated_cost = `$${(inputCost + outputCost).toFixed(6)}`;
            } else if (data.type === 'message') {
                // Anthropic 格式
                metrics.type = 'Anthropic';
                metrics.model = data.model;
                metrics.stop_reason = data.stop_reason || 'N/A';
                metrics.prompt_tokens = data.usage?.input_tokens || 0;
                metrics.completion_tokens = data.usage?.output_tokens || 0;
                metrics.total_tokens = metrics.prompt_tokens + metrics.completion_tokens;
                metrics.content_length = data.content?.[0]?.text?.length || 0;
                
                // 估算成本 (Claude 3.5 Sonnet 价格)
                const inputCost = (metrics.prompt_tokens / 1000000) * 3;
                const outputCost = (metrics.completion_tokens / 1000000) * 15;
                metrics.estimated_cost = `$${(inputCost + outputCost).toFixed(6)}`;
            } else if (data.output) {
                // 通义千问等国产模型格式
                metrics.type = '国产模型';
                metrics.finish_reason = data.output?.finish_reason || 'N/A';
                metrics.prompt_tokens = data.usage?.input_tokens || 0;
                metrics.completion_tokens = data.usage?.output_tokens || 0;
                metrics.total_tokens = data.usage?.total_tokens || 0;
                metrics.content_length = data.output?.text?.length || 0;
                metrics.request_id = data.request_id || 'N/A';
            } else {
                metrics.type = '未知格式';
            }

            return metrics;
        }

        function displayMetrics(num, metrics, hasError) {
            const container = document.getElementById(`metrics${num}`);
            
            if (hasError) {
                container.innerHTML = `
                    <div class="metrics">
                        <div class="metric-row">
                            <span class="metric-label">错误类型</span>
                            <span class="metric-value error">${metrics.error_type}</span>
                        </div>
                        <div class="metric-row">
                            <span class="metric-label">错误代码</span>
                            <span class="metric-value error">${metrics.error_code}</span>
                        </div>
                        <div class="metric-row">
                            <span class="metric-label">错误信息</span>
                            <span class="metric-value error">${metrics.error_message}</span>
                        </div>
                    </div>
                `;
                return;
            }

            let html = '<div class="metrics">';
            html += `<div class="metric-row">
                <span class="metric-label">API 类型</span>
                <span class="metric-value">${metrics.type}</span>
            </div>`;

            if (metrics.model) {
                html += `<div class="metric-row">
                    <span class="metric-label">模型</span>
                    <span class="metric-value">${metrics.model}</span>
                </div>`;
            }

            if (metrics.finish_reason || metrics.stop_reason) {
                const reason = metrics.finish_reason || metrics.stop_reason;
                const statusClass = reason === 'stop' || reason === 'end_turn' ? 'success' : 'warning';
                html += `<div class="metric-row">
                    <span class="metric-label">结束原因</span>
                    <span class="metric-value ${statusClass}">${reason}</span>
                </div>`;
            }

            if (metrics.prompt_tokens !== undefined) {
                html += `<div class="metric-row">
                    <span class="metric-label">输入 Tokens</span>
                    <span class="metric-value">${metrics.prompt_tokens.toLocaleString()}</span>
                </div>`;
            }

            if (metrics.completion_tokens !== undefined) {
                html += `<div class="metric-row">
                    <span class="metric-label">输出 Tokens</span>
                    <span class="metric-value">${metrics.completion_tokens.toLocaleString()}</span>
                </div>`;
            }

            if (metrics.total_tokens !== undefined) {
                html += `<div class="metric-row">
                    <span class="metric-label">总 Tokens</span>
                    <span class="metric-value">${metrics.total_tokens.toLocaleString()}</span>
                </div>`;
            }

            if (metrics.content_length !== undefined) {
                html += `<div class="metric-row">
                    <span class="metric-label">内容长度</span>
                    <span class="metric-value">${metrics.content_length} 字符</span>
                </div>`;
            }

            if (metrics.estimated_cost) {
                html += `<div class="metric-row">
                    <span class="metric-label">估算成本</span>
                    <span class="metric-value">${metrics.estimated_cost}</span>
                </div>`;
            }

            if (metrics.request_id) {
                html += `<div class="metric-row">
                    <span class="metric-label">请求 ID</span>
                    <span class="metric-value" style="font-size: 0.85em;">${metrics.request_id}</span>
                </div>`;
            }

            html += '</div>';
            container.innerHTML = html;
        }

        function displayJSON(num, data) {
            const container = document.getElementById(`json${num}`);
            const formatted = syntaxHighlight(JSON.stringify(data, null, 2));
            container.innerHTML = `<div class="json-display">${formatted}</div>`;
        }

        function syntaxHighlight(json) {
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                let cls = 'json-number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'json-key';
                    } else {
                        cls = 'json-string';
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'json-boolean';
                } else if (/null/.test(match)) {
                    cls = 'json-null';
                }
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }

        function compareResponses() {
            if (!responses[1] || !responses[2]) {
                alert('请先分析两个响应');
                return;
            }

            const metrics1 = extractMetrics(responses[1]);
            const metrics2 = extractMetrics(responses[2]);

            let html = '<div class="comparison-grid">';

            // Token 对比
            if (metrics1.total_tokens && metrics2.total_tokens) {
                const diff = metrics2.total_tokens - metrics1.total_tokens;
                const diffPercent = ((diff / metrics1.total_tokens) * 100).toFixed(1);
                html += `
                    <div class="comparison-card">
                        <div class="comparison-title">Token 使用对比</div>
                        <div class="metric-row">
                            <span>Response 1</span>
                            <span>${metrics1.total_tokens.toLocaleString()}</span>
                        </div>
                        <div class="metric-row">
                            <span>Response 2</span>
                            <span>${metrics2.total_tokens.toLocaleString()}</span>
                        </div>
                        <div class="metric-row">
                            <span>差异</span>
                            <span class="${diff > 0 ? 'metric-value error' : 'metric-value success'}">
                                ${diff > 0 ? '+' : ''}${diff} (${diffPercent}%)
                            </span>
                        </div>
                    </div>
                `;
            }

            // 成本对比
            if (metrics1.estimated_cost && metrics2.estimated_cost) {
                const cost1 = parseFloat(metrics1.estimated_cost.replace('$', ''));
                const cost2 = parseFloat(metrics2.estimated_cost.replace('$', ''));
                const costDiff = cost2 - cost1;
                html += `
                    <div class="comparison-card">
                        <div class="comparison-title">成本对比</div>
                        <div class="metric-row">
                            <span>Response 1</span>
                            <span>${metrics1.estimated_cost}</span>
                        </div>
                        <div class="metric-row">
                            <span>Response 2</span>
                            <span>${metrics2.estimated_cost}</span>
                        </div>
                        <div class="metric-row">
                            <span>差异</span>
                            <span class="${costDiff > 0 ? 'metric-value error' : 'metric-value success'}">
                                ${costDiff > 0 ? '+' : ''}$${costDiff.toFixed(6)}
                            </span>
                        </div>
                    </div>
                `;
            }

            // 内容长度对比
            if (metrics1.content_length !== undefined && metrics2.content_length !== undefined) {
                const lengthDiff = metrics2.content_length - metrics1.content_length;
                html += `
                    <div class="comparison-card">
                        <div class="comparison-title">内容长度对比</div>
                        <div class="metric-row">
                            <span>Response 1</span>
                            <span>${metrics1.content_length} 字符</span>
                        </div>
                        <div class="metric-row">
                            <span>Response 2</span>
                            <span>${metrics2.content_length} 字符</span>
                        </div>
                        <div class="metric-row">
                            <span>差异</span>
                            <span>${lengthDiff > 0 ? '+' : ''}${lengthDiff} 字符</span>
                        </div>
                    </div>
                `;
            }

            // 模型信息对比
            html += `
                <div class="comparison-card">
                    <div class="comparison-title">模型信息</div>
                    <div class="metric-row">
                        <span>API 类型</span>
                        <span>${metrics1.type} vs ${metrics2.type}</span>
                    </div>
                    ${metrics1.model && metrics2.model ? `
                    <div class="metric-row">
                        <span>模型</span>
                        <span style="font-size: 0.85em;">${metrics1.model}<br>vs<br>${metrics2.model}</span>
                    </div>` : ''}
                </div>
            `;

            html += '</div>';

            // 添加总结
            html += '<div style="margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px;">';
            html += '<strong>💡 分析总结：</strong><br>';
            
            if (metrics1.total_tokens && metrics2.total_tokens) {
                const cheaper = metrics1.estimated_cost && metrics2.estimated_cost && 
                    parseFloat(metrics1.estimated_cost.replace('$', '')) < parseFloat(metrics2.estimated_cost.replace('$', '')) ? 
                    'Response 1' : 'Response 2';
                html += `• ${cheaper} 成本更低<br>`;
            }
            
            if (metrics1.content_length && metrics2.content_length) {
                const longer = metrics1.content_length > metrics2.content_length ? 'Response 1' : 'Response 2';
                html += `• ${longer} 生成内容更长<br>`;
            }

            html += '</div>';

            document.getElementById('comparison-result').innerHTML = html;
        }
    </script>
</body>
</html>
