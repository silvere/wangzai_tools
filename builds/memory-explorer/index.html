            border-color: #667eea;
        }
        
        .keywords {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        
        .keywords h3 {
            margin-bottom: 15px;
            color: #333;
        }
        
        .keyword-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .keyword {
            padding: 6px 12px;
            background: #f0f0f0;
            border-radius: 20px;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .keyword:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }
        
        .keyword .count {
            color: #999;
            font-size: 0.8em;
            margin-left: 5px;
        }
        
        .timeline {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .timeline h3 {
            margin-bottom: 20px;
            color: #333;
        }

            padding: 15px;
            border-left: 3px solid #667eea;
            margin-bottom: 15px;
            background: #f9f9f9;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .memory-item:hover {
            background: #f0f0f0;
            transform: translateX(5px);
        }
        
        .memory-item.hidden {
            display: none;
        }
        
        .memory-date {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 8px;
            font-size: 1.1em;
        }
        
        .memory-preview {
            color: #666;
            line-height: 1.6;
            white-space: pre-wrap;
            font-size: 0.9em;
        }
        
        .memory-meta {
            margin-top: 10px;
            color: #999;
            font-size: 0.85em;
        }
        
        .no-results {
            text-align: center;
            padding: 40px;
            color: #999;
            display: none;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }
        
        .modal-content {
            background: white;
            max-width: 800px;
            margin: 40px auto;
            padding: 30px;
            border-radius: 12px;
            position: relative;
        }
        
        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 1.5em;
            cursor: pointer;
            color: #999;
            width: 30px;
            height: 30px;

            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s;
        }
        
        .modal-close:hover {
            background: #f0f0f0;
            color: #333;
        }
        
        .modal-title {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #667eea;
        }
        
        .modal-body {
            line-height: 1.8;
            color: #333;
            white-space: pre-wrap;

            }

            }
        }

            });
        }
        
        // 渲染时间线
        function renderTimeline() {
            const timeline = document.getElementById('timelineContent');
            memories.forEach((mem, index) => {
                const item = document.createElement('div');
                item.className = 'memory-item';
                item.dataset.index = index;
                item.innerHTML = `
                    <div class="memory-date">${mem.date}</div>
                    <div class="memory-preview">${mem.preview}</div>
                    <div class="memory-meta">📝 ${mem.word_count} 字 ${mem.has_more ? '· 点击查看完整内容' : ''}</div>
                `;
                item.onclick = () => showMemory(index);
                timeline.appendChild(item);
            });
        }
        
        // 搜索过滤
        function filterMemories() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const items = document.querySelectorAll('.memory-item');
            let visibleCount = 0;
            
            items.forEach(item => {
                const index = item.dataset.index;
                const mem = memories[index];
                const text = (mem.date + mem.preview).toLowerCase();
                
                if (text.includes(query)) {
                    item.classList.remove('hidden');
                    visibleCount++;
                } else {
                    item.classList.add('hidden');
                }
            });
            
            document.getElementById('noResults').style.display = visibleCount === 0 ? 'block' : 'none';
        }
        
        // 显示完整记忆
        function showMemory(index) {
            const mem = memories[index];
            if (!mem.has_more) return;
            
            document.getElementById('modalTitle').textContent = mem.date;
            document.getElementById('modalBody').textContent = '⚠️ 完整内容需要从原始文件读取\n\n文件路径: memory/' + mem.filename + '\n\n预览:\n' + mem.preview;
            document.getElementById('modal').style.display = 'block';
        }
        
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
        
        // 初始化
        renderKeywords();
        renderTimeline();
        
        // 搜索事件
        document.getElementById('searchInput').addEventListener('input', filterMemories);
        
        // 点击模态框外部关闭
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });
        
        // ESC键关闭模态框
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
