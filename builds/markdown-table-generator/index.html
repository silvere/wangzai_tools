<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Table Generator - 表格生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        label {
            font-weight: 600;
            color: #333;
        }

        input[type="number"] {
            width: 80px;
            padding: 8px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .templates {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .template-btn {
            padding: 8px 16px;
            background: #f0f0f0;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .template-btn:hover {
            background: #667eea;
            color: white;
        }

        .editor-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .editor-panel {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 20px;
        }

        .panel-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
        }

        .table-editor {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            min-width: 100px;
        }

        th {
            background: #667eea;
            color: white;
            font-weight: 600;
        }

        input[type="text"] {
            width: 100%;
            padding: 6px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 14px;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .output-area {
            position: relative;
        }

        textarea {
            width: 100%;
            min-height: 300px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .copy-btn:hover {
            background: #5568d3;
        }

        .preview-section {
            margin-top: 20px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 10px;
        }

        .preview-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        .preview-table th,
        .preview-table td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        .preview-table th {
            background: #667eea;
            color: white;
        }

        .preview-table tr:nth-child(even) {
            background: #f9f9f9;
        }

        .alignment-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .align-btn {
            padding: 6px 12px;
            background: #f0f0f0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .align-btn.active {
            background: #667eea;
            color: white;
        }

        @media (max-width: 1024px) {
            .editor-section {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Markdown Table Generator</h1>
            <p class="subtitle">快速生成 Markdown 表格，评测数据整理必备</p>
        </header>

        <div class="main-content">
            <div class="controls">
                <div class="control-group">
                    <label>行数:</label>
                    <input type="number" id="rows" value="3" min="1" max="20">
                </div>
                <div class="control-group">
                    <label>列数:</label>
                    <input type="number" id="cols" value="4" min="1" max="10">
                </div>
                <button class="btn btn-primary" onclick="generateTable()">生成表格</button>
                <button class="btn btn-secondary" onclick="clearTable()">清空</button>
            </div>

            <h3 style="margin-bottom: 10px;">快速模板</h3>
            <div class="templates">
                <button class="template-btn" onclick="loadTemplate('model-comparison')">模型对比</button>
                <button class="template-btn" onclick="loadTemplate('benchmark-scores')">Benchmark评分</button>
                <button class="template-btn" onclick="loadTemplate('api-pricing')">API定价</button>
                <button class="template-btn" onclick="loadTemplate('feature-matrix')">功能矩阵</button>
                <button class="template-btn" onclick="loadTemplate('performance')">性能对比</button>
            </div>

            <div class="alignment-controls">
                <span style="font-weight: 600; margin-right: 10px;">对齐方式:</span>
                <button class="align-btn active" data-align="left" onclick="setAlignment('left')">← 左对齐</button>
                <button class="align-btn" data-align="center" onclick="setAlignment('center')">↔ 居中</button>
                <button class="align-btn" data-align="right" onclick="setAlignment('right')">→ 右对齐</button>
            </div>

            <div class="editor-section">
                <div class="editor-panel">
                    <div class="panel-title">📝 编辑表格</div>
                    <div class="table-editor" id="tableEditor"></div>
                </div>

                <div class="editor-panel">
                    <div class="panel-title">📋 Markdown 输出</div>
                    <div class="output-area">
                        <button class="copy-btn" onclick="copyMarkdown()">复制</button>
                        <textarea id="markdownOutput" readonly></textarea>
                    </div>
                </div>
            </div>

            <div class="preview-section">
                <div class="panel-title">👁️ 预览效果</div>
                <div id="preview"></div>
            </div>
        </div>
    </div>

    <script>
        let currentAlignment = 'left';
        let tableData = [];

        const templates = {
            'model-comparison': {
                rows: 4,
                cols: 5,
                headers: ['模型', 'MMLU', 'GSM8K', 'HumanEval', '价格'],
                data: [
                    ['GPT-4o', '88.7', '95.3', '90.2', '$5/$15'],
                    ['Claude 3.5', '88.3', '96.4', '92.0', '$3/$15'],
                    ['Gemini 1.5 Pro', '85.9', '90.8', '84.1', '$1.25/$5']
                ]
            },
            'benchmark-scores': {
                rows: 5,
                cols: 4,
                headers: ['Benchmark', '测试内容', '题目数', '难度'],
                data: [
                    ['MMLU', '多学科知识', '14,042', '中等'],
                    ['GSM8K', '小学数学', '8,500', '简单'],
                    ['MATH', '竞赛数学', '12,500', '困难'],
                    ['HumanEval', '代码生成', '164', '中等']
                ]
            },
            'api-pricing': {
                rows: 4,
                cols: 4,
                headers: ['服务商', '模型', '输入价格', '输出价格'],
                data: [
                    ['OpenAI', 'GPT-4o', '$2.5/M', '$10/M'],
                    ['Anthropic', 'Claude 3.5', '$3/M', '$15/M'],
                    ['Google', 'Gemini 1.5 Pro', '$1.25/M', '$5/M']
                ]
            },
            'feature-matrix': {
                rows: 4,
                cols: 5,
                headers: ['功能', 'GPT-4o', 'Claude 3.5', 'Gemini 1.5', 'DeepSeek V3'],
                data: [
                    ['多模态', '✅', '✅', '✅', '❌'],
                    ['长上下文', '128K', '200K', '2M', '128K'],
                    ['工具调用', '✅', '✅', '✅', '✅']
                ]
            },
            'performance': {
                rows: 4,
                cols: 4,
                headers: ['指标', 'GPT-4o', 'Claude 3.5', 'Gemini 1.5'],
                data: [
                    ['响应速度', '快', '中等', '快'],
                    ['准确率', '95%', '96%', '92%'],
                    ['成本效益', '中', '低', '高']
                ]
            }
        };

        function generateTable() {
            const rows = parseInt(document.getElementById('rows').value);
            const cols = parseInt(document.getElementById('cols').value);
            
            tableData = [];
            for (let i = 0; i < rows + 1; i++) {
                tableData[i] = [];
                for (let j = 0; j < cols; j++) {
                    tableData[i][j] = i === 0 ? `列${j + 1}` : '';
                }
            }
            
            renderTable();
            updateMarkdown();
        }

        function renderTable() {
            const editor = document.getElementById('tableEditor');
            let html = '<table><thead><tr>';
            
            // 表头
            for (let j = 0; j < tableData[0].length; j++) {
                html += `<th><input type="text" value="${tableData[0][j]}" onchange="updateCell(0, ${j}, this.value)"></th>`;
            }
            html += '</tr></thead><tbody>';
            
            // 数据行
            for (let i = 1; i < tableData.length; i++) {
                html += '<tr>';
                for (let j = 0; j < tableData[i].length; j++) {
                    html += `<td><input type="text" value="${tableData[i][j]}" onchange="updateCell(${i}, ${j}, this.value)"></td>`;
                }
                html += '</tr>';
            }
            
            html += '</tbody></table>';
            editor.innerHTML = html;
        }

        function updateCell(row, col, value) {
            tableData[row][col] = value;
            updateMarkdown();
        }

        function updateMarkdown() {
            if (tableData.length === 0) return;
            
            let markdown = '';
            
            // 表头
            markdown += '| ' + tableData[0].join(' | ') + ' |\n';
            
            // 分隔线
            const separator = tableData[0].map(() => {
                if (currentAlignment === 'center') return ':---:';
                if (currentAlignment === 'right') return '---:';
                return '---';
            });
            markdown += '| ' + separator.join(' | ') + ' |\n';
            
            // 数据行
            for (let i = 1; i < tableData.length; i++) {
                markdown += '| ' + tableData[i].join(' | ') + ' |\n';
            }
            
            document.getElementById('markdownOutput').value = markdown;
            renderPreview(markdown);
        }

        function renderPreview(markdown) {
            const lines = markdown.trim().split('\n');
            if (lines.length < 2) return;
            
            let html = '<table class="preview-table"><thead><tr>';
            
            // 表头
            const headers = lines[0].split('|').filter(s => s.trim());
            headers.forEach(h => {
                html += `<th>${h.trim()}</th>`;
            });
            html += '</tr></thead><tbody>';
            
            // 数据行
            for (let i = 2; i < lines.length; i++) {
                const cells = lines[i].split('|').filter(s => s.trim());
                html += '<tr>';
                cells.forEach(c => {
                    html += `<td>${c.trim()}</td>`;
                });
                html += '</tr>';
            }
            
            html += '</tbody></table>';
            document.getElementById('preview').innerHTML = html;
        }

        function setAlignment(align) {
            currentAlignment = align;
            document.querySelectorAll('.align-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.align === align);
            });
            updateMarkdown();
        }

        function loadTemplate(name) {
            const template = templates[name];
            document.getElementById('rows').value = template.rows;
            document.getElementById('cols').value = template.cols;
            
            tableData = [template.headers, ...template.data];
            renderTable();
            updateMarkdown();
        }

        function clearTable() {
            tableData = [];
            document.getElementById('tableEditor').innerHTML = '';
            document.getElementById('markdownOutput').value = '';
            document.getElementById('preview').innerHTML = '';
        }

        function copyMarkdown() {
            const textarea = document.getElementById('markdownOutput');
            textarea.select();
            document.execCommand('copy');
            
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = '✅ 已复制';
            setTimeout(() => {
                btn.textContent = originalText;
            }, 2000);
        }

        // 初始化
        generateTable();
    </script>
</body>
</html>
