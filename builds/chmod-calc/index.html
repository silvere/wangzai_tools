<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chmod 计算器 | Permission Calculator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f1a;--card:#1a1a2e;--border:#2a2a4a;--text:#e8e8f0;--text2:#8888aa;--accent:#6c63ff;--green:#4ade80;--orange:#fb923c;--red:#f87171;--blue:#60a5fa}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',monospace;background:var(--bg);color:var(--text);min-height:100vh;padding:20px}
.container{max-width:640px;margin:0 auto}
h1{font-size:24px;text-align:center;margin-bottom:4px}
.subtitle{text-align:center;color:var(--text2);font-size:13px;margin-bottom:24px}
.result-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center;margin-bottom:20px}
.octal{font-size:48px;font-weight:700;font-family:'Courier New',monospace;letter-spacing:4px}
.octal .o{color:var(--green)}.octal .g{color:var(--orange)}.octal .ot{color:var(--blue)}
.symbolic{font-size:20px;color:var(--text2);margin-top:8px;font-family:'Courier New',monospace;letter-spacing:2px}
.symbolic .r{color:var(--green)}.symbolic .w{color:var(--orange)}.symbolic .x{color:var(--red)}.symbolic .d{color:var(--text2)}
.cmd-line{margin-top:12px;display:flex;align-items:center;justify-content:center;gap:8px}
.cmd{background:var(--bg);padding:8px 16px;border-radius:8px;font-size:14px;font-family:'Courier New',monospace;color:var(--accent);border:1px solid var(--border)}
.copy-btn{background:var(--border);border:none;color:var(--text2);padding:8px 12px;border-radius:8px;cursor:pointer;font-size:12px}
.copy-btn:hover{background:var(--accent);color:#fff}
.perm-grid{display:grid;grid-template-columns:100px repeat(3,1fr);gap:0;margin-bottom:20px;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.perm-header{padding:12px;text-align:center;font-size:13px;font-weight:600;background:var(--border);border-bottom:1px solid var(--border)}
.perm-label{padding:12px 16px;font-size:14px;font-weight:600;display:flex;align-items:center;border-bottom:1px solid var(--border)}
.perm-cell{padding:12px;text-align:center;border-bottom:1px solid var(--border);border-left:1px solid var(--border)}
.perm-grid>:nth-last-child(-n+4){border-bottom:none}
.toggle{width:44px;height:24px;border-radius:12px;border:none;cursor:pointer;position:relative;transition:background .2s;background:var(--border)}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform .2s}
.toggle.on::after{transform:translateX(20px)}
.presets{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.preset{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:12px;font-family:'Courier New',monospace;transition:all .15s}
.preset:hover{border-color:var(--accent);color:var(--accent)}
.preset.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.input-row{display:flex;gap:8px;margin-bottom:20px;align-items:center}
.input-row label{color:var(--text2);font-size:13px;white-space:nowrap}
.input-row input{flex:1;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:16px;font-family:'Courier New',monospace;outline:none;text-align:center;letter-spacing:4px}
.input-row input:focus{border-color:var(--accent)}
.desc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px}
.desc h3{font-size:14px;color:var(--accent);margin-bottom:8px}
.desc-list{font-size:13px;color:var(--text2);line-height:1.8}
.desc-list .who{color:var(--text);font-weight:600}
.footer{text-align:center;color:var(--text2);font-size:11px;margin-top:20px;padding:12px}
</style>
</head>
<body>
<div class="container">
<h1>🔐 Chmod 计算器</h1>
<p class="subtitle">可视化文件权限设置，点击切换或直接输入数字</p>

<div class="result-box">
<div class="octal" id="octalDisplay">0755</div>
<div class="symbolic" id="symbolicDisplay">-rwxr-xr-x</div>
<div class="cmd-line">
<span class="cmd" id="cmdDisplay">chmod 755 filename</span>
<button class="copy-btn" onclick="copyCmd()">📋 复制</button>
</div>
</div>

<div class="input-row">
<label>直接输入：</label>
<input id="octalInput" maxlength="4" value="0755" oninput="fromInput()" placeholder="0755" />
</div>

<div class="presets">
<button class="preset" onclick="setOctal(755)">755 常用目录</button>
<button class="preset" onclick="setOctal(644)">644 常用文件</button>
<button class="preset" onclick="setOctal(777)">777 全部权限</button>
<button class="preset" onclick="setOctal(700)">700 仅所有者</button>
<button class="preset" onclick="setOctal(600)">600 私密文件</button>
<button class="preset" onclick="setOctal(444)">444 只读</button>
<button class="preset" onclick="setOctal(666)">666 读写无执行</button>
<button class="preset" onclick="setOctal(750)">750 组可读执行</button>
<button class="preset" onclick="setOctal(400)">400 SSH密钥</button>
</div>

<div class="perm-grid">
<div class="perm-header"></div>
<div class="perm-header" style="color:var(--green)">读 (r=4)</div>
<div class="perm-header" style="color:var(--orange)">写 (w=2)</div>
<div class="perm-header" style="color:var(--red)">执行 (x=1)</div>

<div class="perm-label" style="color:var(--green)">👤 所有者</div>
<div class="perm-cell"><button class="toggle" id="t-o-r" onclick="toggle('o','r')"></button></div>
<div class="perm-cell"><button class="toggle" id="t-o-w" onclick="toggle('o','w')"></button></div>
<div class="perm-cell"><button class="toggle" id="t-o-x" onclick="toggle('o','x')"></button></div>

<div class="perm-label" style="color:var(--orange)">👥 用户组</div>
<div class="perm-cell"><button class="toggle" id="t-g-r" onclick="toggle('g','r')"></button></div>
<div class="perm-cell"><button class="toggle" id="t-g-w" onclick="toggle('g','w')"></button></div>
<div class="perm-cell"><button class="toggle" id="t-g-x" onclick="toggle('g','x')"></button></div>

<div class="perm-label" style="color:var(--blue)">🌍 其他人</div>
<div class="perm-cell"><button class="toggle" id="t-t-r" onclick="toggle('t','r')"></button></div>
<div class="perm-cell"><button class="toggle" id="t-t-w" onclick="toggle('t','w')"></button></div>
<div class="perm-cell"><button class="toggle" id="t-t-x" onclick="toggle('t','x')"></button></div>
</div>

<div class="desc" id="descBox">
<h3>📋 权限说明</h3>
<div class="desc-list" id="descList"></div>
</div>
</div>

<div class="footer">🔐 Chmod 计算器 · 为 Linux/macOS 开发者打造 · 零外部依赖</div>

<script>
let perms={o:{r:1,w:1,x:1},g:{r:1,w:0,x:1},t:{r:1,w:0,x:1}};

function toggle(who,what){
perms[who][what]=perms[who][what]?0:1;
update();
}

function calcOctal(){
const o=perms.o.r*4+perms.o.w*2+perms.o.x;
const g=perms.g.r*4+perms.g.w*2+perms.g.x;
const t=perms.t.r*4+perms.t.w*2+perms.t.x;
return ''+o+g+t;
}

function calcSymbolic(){
const s=(who)=>(perms[who].r?'r':'-')+(perms[who].w?'w':'-')+(perms[who].x?'x':'-');
return '-'+s('o')+s('g')+s('t');
}

function setOctal(n){
const s=String(n).padStart(3,'0');
const digits=s.split('').map(Number);
['o','g','t'].forEach((who,i)=>{
perms[who].r=(digits[i]&4)?1:0;
perms[who].w=(digits[i]&2)?1:0;
perms[who].x=(digits[i]&1)?1:0;
});
update();
}

function fromInput(){
let v=document.getElementById('octalInput').value.replace(/[^0-7]/g,'');
if(v.startsWith('0')&&v.length>3)v=v.slice(1);
if(v.length>=3){
const last3=v.slice(-3);
setOctal(parseInt(last3));
}
}

function update(){
const oct=calcOctal();
const sym=calcSymbolic();
document.getElementById('octalDisplay').innerHTML=
`0<span class="o">${oct[0]}</span><span class="g">${oct[1]}</span><span class="ot">${oct[2]}</span>`;
document.getElementById('symbolicDisplay').innerHTML=
sym.split('').map((c,i)=>{
if(c==='-')return `<span class="d">-</span>`;
if(c==='r')return `<span class="r">r</span>`;
if(c==='w')return `<span class="w">w</span>`;
if(c==='x')return `<span class="x">x</span>`;
return c;
}).join('');
document.getElementById('cmdDisplay').textContent=`chmod ${oct} filename`;
document.getElementById('octalInput').value='0'+oct;

['o','g','t'].forEach(who=>{
['r','w','x'].forEach(what=>{
const el=document.getElementById(`t-${who}-${what}`);
el.className='toggle'+(perms[who][what]?' on':'');
});
});

// Update presets
document.querySelectorAll('.preset').forEach(el=>{
const m=el.textContent.match(/^(\d+)/);
if(m)el.className='preset'+(m[1]===oct?' active':'');
});

// Description
const names={o:'所有者 (Owner)',g:'用户组 (Group)',t:'其他人 (Others)'};
const descs=[];
['o','g','t'].forEach(who=>{
const ps=[];
if(perms[who].r)ps.push('读取');
if(perms[who].w)ps.push('写入');
if(perms[who].x)ps.push('执行');
descs.push(`<span class="who">${names[who]}</span>：${ps.length?ps.join('、'):'无权限'}`);
});
document.getElementById('descList').innerHTML=descs.join('<br>');
}

function copyCmd(){
navigator.clipboard.writeText(document.getElementById('cmdDisplay').textContent)
.then(()=>{const b=event.target;b.textContent='✅ 已复制';setTimeout(()=>b.textContent='📋 复制',1500)});
}

update();
</script>
</body>
</html>
