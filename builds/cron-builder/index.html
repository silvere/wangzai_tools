<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⏰ Cron 表达式生成器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--surface:#1e293b;--surface2:#334155;--border:#475569;--text:#e2e8f0;--text2:#94a3b8;--accent:#38bdf8;--green:#34d399;--red:#f87171;--yellow:#fbbf24;--purple:#a78bfa}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:20px}
.container{max-width:720px;margin:0 auto}
.header{text-align:center;margin-bottom:24px}
.header h1{font-size:22px;font-weight:700}
.header p{color:var(--text2);font-size:13px;margin-top:4px}
.expr-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center;margin-bottom:20px}
.expr{font-family:'SF Mono',Monaco,Consolas,monospace;font-size:32px;font-weight:700;color:var(--accent);letter-spacing:4px;margin-bottom:8px;cursor:pointer;transition:color .2s}
.expr:hover{color:#7dd3fc}
.human{color:var(--green);font-size:14px;min-height:20px}
.fields{display:grid;gap:12px;margin-bottom:20px}
.field{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px}
.field-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.field-name{font-size:13px;font-weight:600;color:var(--accent)}
.field-val{font-family:'SF Mono',Monaco,Consolas,monospace;font-size:13px;color:var(--yellow);background:var(--bg);padding:2px 8px;border-radius:4px}
.field-type{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.ftype{padding:4px 10px;border-radius:6px;background:var(--bg);border:1px solid var(--border);color:var(--text2);font-size:12px;cursor:pointer;transition:all .2s}
.ftype:hover{border-color:var(--accent)}
.ftype.active{background:rgba(56,189,248,.15);border-color:var(--accent);color:var(--accent)}
.field-input{display:none;margin-top:8px}
.field-input.show{display:block}
.field-input input,.field-input select{background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:6px 10px;font-size:13px;outline:none;width:100%}
.field-input input:focus{border-color:var(--accent)}
.grid-pick{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.grid-pick .gp{width:36px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:4px;background:var(--bg);border:1px solid var(--border);font-size:11px;cursor:pointer;transition:all .15s;color:var(--text2)}
.grid-pick .gp:hover{border-color:var(--accent);color:var(--accent)}
.grid-pick .gp.on{background:rgba(56,189,248,.2);border-color:var(--accent);color:var(--accent);font-weight:600}
.range-row{display:flex;gap:8px;align-items:center;margin-top:8px;font-size:13px}
.range-row input{width:60px}
.range-row span{color:var(--text2)}
.presets{margin-bottom:20px}
.presets h3{font-size:13px;color:var(--text2);margin-bottom:8px}
.preset-list{display:flex;gap:6px;flex-wrap:wrap}
.preset{padding:5px 12px;border-radius:8px;background:var(--surface);border:1px solid var(--border);color:var(--text2);font-size:12px;cursor:pointer;transition:all .2s}
.preset:hover{border-color:var(--accent);color:var(--accent)}
.next-runs{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:20px}
.next-runs h3{font-size:13px;color:var(--text2);margin-bottom:8px}
.run-item{font-family:'SF Mono',Monaco,Consolas,monospace;font-size:12px;color:var(--text);padding:4px 0;border-bottom:1px solid var(--bg)}
.run-item:last-child{border-bottom:none}
.run-item .dow{color:var(--purple);margin-right:8px}
.run-item .rel{color:var(--text2);font-size:11px;margin-left:8px}
.btn-row{display:flex;gap:8px;justify-content:center;margin-bottom:20px}
.btn{padding:8px 18px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;transition:all .2s}
.btn:hover{background:var(--surface2);border-color:var(--accent)}
.copied{color:var(--green);font-size:12px;margin-left:8px;opacity:0;transition:opacity .3s}
.copied.show{opacity:1}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>⏰ Cron 表达式生成器</h1>
<p>可视化构建 cron 表达式 — Build #53 by 旺仔</p>
</div>
<div class="expr-box">
<div class="expr" id="exprDisplay" onclick="copyExpr()" title="点击复制">* * * * *</div>
<div class="human" id="humanText">每分钟执行</div>
<span class="copied" id="copiedTip">✅ 已复制</span>
</div>
<div class="presets">
<h3>⚡ 常用预设</h3>
<div class="preset-list">
<span class="preset" data-cron="* * * * *">每分钟</span>
<span class="preset" data-cron="*/5 * * * *">每5分钟</span>
<span class="preset" data-cron="*/15 * * * *">每15分钟</span>
<span class="preset" data-cron="*/30 * * * *">每30分钟</span>
<span class="preset" data-cron="0 * * * *">每小时</span>
<span class="preset" data-cron="0 */2 * * *">每2小时</span>
<span class="preset" data-cron="0 */6 * * *">每6小时</span>
<span class="preset" data-cron="0 0 * * *">每天午夜</span>
<span class="preset" data-cron="0 9 * * *">每天9:00</span>
<span class="preset" data-cron="0 9 * * 1-5">工作日9:00</span>
<span class="preset" data-cron="0 0 * * 0">每周日午夜</span>
<span class="preset" data-cron="0 0 1 * *">每月1号</span>
<span class="preset" data-cron="0 0 1 1 *">每年1月1日</span>
<span class="preset" data-cron="30 3 * * *">每天3:30</span>
<span class="preset" data-cron="0 9,18 * * *">每天9:00和18:00</span>
</div>
</div>
<div class="fields" id="fields"></div>
<div class="next-runs">
<h3>📅 接下来 8 次执行时间</h3>
<div id="nextRuns"></div>
</div>
<div class="btn-row">
<button class="btn" onclick="copyExpr()">📋 复制表达式</button>
<button class="btn" onclick="resetAll()">🔄 重置</button>
</div>
</div>
<script>
const FIELDS=[
  {name:'分钟',key:'minute',min:0,max:59,label:'min'},
  {name:'小时',key:'hour',min:0,max:23,label:'hour'},
  {name:'日期',key:'dom',min:1,max:31,label:'day'},
  {name:'月份',key:'month',min:1,max:12,label:'month',names:['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月']},
  {name:'星期',key:'dow',min:0,max:6,label:'weekday',names:['日','一','二','三','四','五','六']}
];
const TYPES=[
  {id:'every',label:'每个'},
  {id:'range',label:'范围'},
  {id:'step',label:'间隔'},
  {id:'specific',label:'指定'}
];
let state={};
FIELDS.forEach(f=>{state[f.key]={type:'every',values:[],range:[f.min,f.max],step:1}});

function buildUI(){
  const container=document.getElementById('fields');
  container.innerHTML='';
  FIELDS.forEach((f,fi)=>{
    const div=document.createElement('div');
    div.className='field';
    const s=state[f.key];
    div.innerHTML=`
      <div class="field-header">
        <span class="field-name">${f.name} (${f.min}-${f.max})</span>
        <span class="field-val" id="fval_${f.key}">${getFieldExpr(f.key)}</span>
      </div>
      <div class="field-type" id="ftypes_${f.key}">
        ${TYPES.map(t=>`<span class="ftype${s.type===t.id?' active':''}" data-field="${f.key}" data-type="${t.id}">${t.label}</span>`).join('')}
      </div>
      <div class="field-input${s.type==='range'?' show':''}" id="finput_range_${f.key}">
        <div class="range-row">
          <span>从</span><input type="number" min="${f.min}" max="${f.max}" value="${s.range[0]}" data-field="${f.key}" data-range="0">
          <span>到</span><input type="number" min="${f.min}" max="${f.max}" value="${s.range[1]}" data-field="${f.key}" data-range="1">
        </div>
      </div>
      <div class="field-input${s.type==='step'?' show':''}" id="finput_step_${f.key}">
        <div class="range-row">
          <span>每隔</span><input type="number" min="1" max="${f.max}" value="${s.step}" data-field="${f.key}" data-step="1" style="width:50px">
          <span>${f.name}</span>
        </div>
      </div>
      <div class="field-input${s.type==='specific'?' show':''}" id="finput_specific_${f.key}">
        <div class="grid-pick" id="grid_${f.key}"></div>
      </div>
    `;
    container.appendChild(div);
    // Build grid
    const grid=div.querySelector(`#grid_${f.key}`);
    for(let i=f.min;i<=f.max;i++){
      const g=document.createElement('span');
      g.className='gp'+(s.values.includes(i)?' on':'');
      g.textContent=f.names?f.names[i-f.min]:i;
      g.dataset.val=i;
      g.dataset.field=f.key;
      g.onclick=()=>{
        g.classList.toggle('on');
        const vals=state[f.key].values;
        const v=parseInt(g.dataset.val);
        if(vals.includes(v))vals.splice(vals.indexOf(v),1);else vals.push(v);
        vals.sort((a,b)=>a-b);
        update();
      };
      grid.appendChild(g);
    }
  });
  // Bind type selectors
  document.querySelectorAll('.ftype').forEach(el=>{
    el.onclick=()=>{
      const field=el.dataset.field;
      state[field].type=el.dataset.type;
      // Toggle active
      el.parentElement.querySelectorAll('.ftype').forEach(x=>x.classList.remove('active'));
      el.classList.add('active');
      // Show/hide inputs
      ['range','step','specific'].forEach(t=>{
        const inp=document.getElementById(`finput_${t}_${field}`);
        if(inp)inp.classList.toggle('show',t===el.dataset.type);
      });
      update();
    };
  });
  // Bind range/step inputs
  document.querySelectorAll('.range-row input').forEach(el=>{
    el.oninput=()=>{
      const field=el.dataset.field;
      if(el.dataset.range!==undefined){
        state[field].range[parseInt(el.dataset.range)]=parseInt(el.value)||0;
      }
      if(el.dataset.step){
        state[field].step=parseInt(el.value)||1;
      }
      update();
    };
  });
}

function getFieldExpr(key){
  const s=state[key];
  const f=FIELDS.find(x=>x.key===key);
  if(s.type==='every')return'*';
  if(s.type==='range')return`${s.range[0]}-${s.range[1]}`;
  if(s.type==='step')return`*/${s.step}`;
  if(s.type==='specific'&&s.values.length>0)return s.values.join(',');
  return'*';
}

function getFullExpr(){
  return FIELDS.map(f=>getFieldExpr(f.key)).join(' ');
}

function humanReadable(expr){
  const p=expr.split(' ');
  const[min,hour,dom,month,dow]=p;
  let parts=[];
  // DOW
  const dowNames=['周日','周一','周二','周三','周四','周五','周六'];
  if(dow!=='*'){
    if(dow==='1-5')parts.push('工作日');
    else if(dow==='0,6')parts.push('周末');
    else if(dow.includes(','))parts.push(dow.split(',').map(d=>dowNames[parseInt(d)]||d).join('、'));
    else if(dow.includes('-')){const[a,b]=dow.split('-');parts.push(`${dowNames[a]}到${dowNames[b]}`);}
    else parts.push(dowNames[parseInt(dow)]||dow);
  }
  // Month
  if(month!=='*'){
    if(month.includes(','))parts.push(`${month}月`);
    else if(month.includes('-')){const[a,b]=month.split('-');parts.push(`${a}月到${b}月`);}
    else if(month.startsWith('*/'))parts.push(`每${month.slice(2)}个月`);
    else parts.push(`${month}月`);
  }
  // DOM
  if(dom!=='*'){
    if(dom.includes(','))parts.push(`${dom}号`);
    else if(dom.includes('-')){const[a,b]=dom.split('-');parts.push(`${a}号到${b}号`);}
    else if(dom.startsWith('*/'))parts.push(`每${dom.slice(2)}天`);
    else parts.push(`${dom}号`);
  }
  // Time
  if(hour==='*'&&min==='*')parts.push('每分钟');
  else if(hour==='*'&&min!=='*'){
    if(min.startsWith('*/'))parts.push(`每${min.slice(2)}分钟`);
    else if(min==='0')parts.push('每小时整点');
    else parts.push(`每小时的第${min}分钟`);
  }else if(hour!=='*'&&min!=='*'){
    let hStr='';
    if(hour.startsWith('*/'))hStr=`每${hour.slice(2)}小时`;
    else if(hour.includes(','))hStr=hour.split(',').map(h=>`${h}:${min==='0'?'00':min}`).join(' 和 ');
    else if(hour.includes('-')){const[a,b]=hour.split('-');hStr=`${a}点到${b}点`;}
    else hStr=`${hour}:${min==='0'?'00':min}`;
    if(hour.includes(',')||hour.includes('-'))parts.push(hStr);
    else if(hour.startsWith('*/'))parts.push(`${hStr}的第${min}分钟`);
    else parts.push(hStr);
  }else{
    if(hour.startsWith('*/'))parts.push(`每${hour.slice(2)}小时`);
    else parts.push(`${hour}点`);
  }
  if(parts.length===0)return'每分钟执行';
  return parts.join(' ')+'执行';
}

function getNextRuns(expr,count=8){
  const p=expr.split(' ');
  const runs=[];
  const now=new Date();
  let d=new Date(now);
  d.setSeconds(0);d.setMilliseconds(0);
  d.setMinutes(d.getMinutes()+1);
  const maxIter=525600;// 1 year of minutes
  for(let i=0;i<maxIter&&runs.length<count;i++){
    if(matchField(p[4],d.getDay(),0,6)&&matchField(p[3],d.getMonth()+1,1,12)&&matchField(p[2],d.getDate(),1,31)&&matchField(p[1],d.getHours(),0,23)&&matchField(p[0],d.getMinutes(),0,59)){
      runs.push(new Date(d));
    }
    d.setMinutes(d.getMinutes()+1);
  }
  return runs;
}

function matchField(expr,val,min,max){
  if(expr==='*')return true;
  const parts=expr.split(',');
  for(const part of parts){
    if(part.includes('/')){
      const[range,step]=part.split('/');
      const s=parseInt(step);
      let start=min;
      if(range!=='*'){const r=range.split('-');start=parseInt(r[0]);}
      if((val-start)%s===0&&val>=start)return true;
    }else if(part.includes('-')){
      const[a,b]=part.split('-').map(Number);
      if(val>=a&&val<=b)return true;
    }else{
      if(parseInt(part)===val)return true;
    }
  }
  return false;
}

function update(){
  const expr=getFullExpr();
  document.getElementById('exprDisplay').textContent=expr;
  document.getElementById('humanText').textContent=humanReadable(expr);
  FIELDS.forEach(f=>{
    const el=document.getElementById(`fval_${f.key}`);
    if(el)el.textContent=getFieldExpr(f.key);
  });
  // Next runs
  const runs=getNextRuns(expr);
  const dowNames=['周日','周一','周二','周三','周四','周五','周六'];
  const runsEl=document.getElementById('nextRuns');
  if(runs.length===0){
    runsEl.innerHTML='<div style="color:var(--text2);font-size:13px">未来一年内无匹配的执行时间</div>';
  }else{
    runsEl.innerHTML=runs.map(r=>{
      const dow=dowNames[r.getDay()];
      const ts=r.toLocaleString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false});
      const diff=r-new Date();
      let rel='';
      const mins=Math.round(diff/60000);
      if(mins<60)rel=`${mins}分钟后`;
      else if(mins<1440)rel=`${Math.round(mins/60)}小时后`;
      else rel=`${Math.round(mins/1440)}天后`;
      return`<div class="run-item"><span class="dow">${dow}</span>${ts}<span class="rel">${rel}</span></div>`;
    }).join('');
  }
}

function copyExpr(){
  const expr=getFullExpr();
  navigator.clipboard.writeText(expr).then(()=>{
    const tip=document.getElementById('copiedTip');
    tip.classList.add('show');
    setTimeout(()=>tip.classList.remove('show'),1500);
  });
}

function resetAll(){
  FIELDS.forEach(f=>{state[f.key]={type:'every',values:[],range:[f.min,f.max],step:1}});
  buildUI();update();
}

function applyCron(expr){
  const p=expr.split(' ');
  FIELDS.forEach((f,i)=>{
    const v=p[i]||'*';
    if(v==='*'){state[f.key]={type:'every',values:[],range:[f.min,f.max],step:1};}
    else if(v.startsWith('*/')){state[f.key]={type:'step',values:[],range:[f.min,f.max],step:parseInt(v.slice(2))};}
    else if(v.includes('-')&&!v.includes(',')){const[a,b]=v.split('-').map(Number);state[f.key]={type:'range',values:[],range:[a,b],step:1};}
    else{state[f.key]={type:'specific',values:v.split(',').map(Number),range:[f.min,f.max],step:1};}
  });
  buildUI();update();
}

// Presets
document.querySelectorAll('.preset').forEach(el=>{
  el.onclick=()=>applyCron(el.dataset.cron);
});

buildUI();update();
</script>
</body>
</html>
