<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt 模板库 📝</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }
        
        .controls {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .search-input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        .filter-btn:hover {
            border-color: #667eea;
        }
        
        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .prompts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
        }
        
        .prompt-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        
        .prompt-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        
        .prompt-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }
        
        .prompt-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
        }
        
        .prompt-category {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }
        
        .cat-evaluation { background: #e3f2fd; color: #1976d2; }
        .cat-translation { background: #e8f5e9; color: #388e3c; }
        .cat-coding { background: #fff3e0; color: #f57c00; }
        .cat-reasoning { background: #f3e5f5; color: #7b1fa2; }
        .cat-creative { background: #fce4ec; color: #c2185b; }
        .cat-analysis { background: #e0f2f1; color: #00796b; }
        
        .prompt-desc {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
            line-height: 1.6;
        }
        
        .prompt-content {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            color: #333;
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 15px;
        }
        
        .prompt-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        
        .tag {
            padding: 4px 10px;
            background: #f5f5f5;
            border-radius: 12px;
            font-size: 12px;
            color: #666;
        }
        
        .prompt-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-copy {
            background: #667eea;
            color: white;
            flex: 1;
        }
        
        .btn-copy:hover {
            background: #5568d3;
        }
        
        .btn-edit {
            background: #f5f5f5;
            color: #333;
        }
        
        .btn-edit:hover {
            background: #e0e0e0;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
            grid-column: 1 / -1;
        }
        
        @media (max-width: 768px) {
            .prompts-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 Prompt 模板库</h1>
            <p>精选评测与开发 Prompt 模板，一键复制即用</p>
        </div>
        
        <div class="controls">
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索模板...">
            </div>
            <div class="filters">
                <button class="filter-btn active" data-category="all">全部</button>
                <button class="filter-btn" data-category="evaluation">评测</button>
                <button class="filter-btn" data-category="translation">翻译</button>
                <button class="filter-btn" data-category="coding">编程</button>
                <button class="filter-btn" data-category="reasoning">推理</button>
                <button class="filter-btn" data-category="creative">创意</button>
                <button class="filter-btn" data-category="analysis">分析</button>
            </div>
        </div>
        
        <div class="prompts-grid" id="promptsGrid"></div>
    </div>
    
    <script>
        const prompts = [
            {
                title: '模型能力评测',
                category: 'evaluation',
                desc: '全面评估模型的知识、推理、代码能力',
                content: `请回答以下问题，展示你的能力：

1. 知识理解：解释量子纠缠的基本原理
2. 数学推理：如果一个数的平方等于它本身，这个数是多少？
3. 代码生成：用 Python 实现快速排序算法
4. 逻辑推理：所有的猫都是动物，有些动物是宠物，那么所有的猫都是宠物吗？
5. 常识判断：为什么冰会浮在水面上？

请逐一回答，并说明你的推理过程。`,
                tags: ['评测', '综合能力', '多任务']
            },
            {
                title: '翻译质量评测',
                category: 'translation',
                desc: '评估翻译的准确性、流畅性和文化适应性',
                content: `请将以下文本翻译成中文，并评估翻译质量：

原文：The quick brown fox jumps over the lazy dog.

要求：
1. 提供翻译结果
2. 评估准确性（1-10分）
3. 评估流畅性（1-10分）
4. 说明是否有文化适应性调整
5. 如果有更好的翻译，请提供并说明原因`,
                tags: ['翻译', '质量评估', '多语言']
            },
            {
                title: '代码审查 Prompt',
                category: 'coding',
                desc: '系统化审查代码质量、安全性和最佳实践',
                content: `请审查以下代码，从这些维度评估：

[在此粘贴代码]

评估维度：
1. 代码正确性：逻辑是否正确？
2. 性能：时间和空间复杂度如何？有优化空间吗？
3. 可读性：命名、注释、结构是否清晰？
4. 安全性：是否有安全漏洞？
5. 最佳实践：是否符合语言/框架的最佳实践？

请给出具体的改进建议和修改后的代码。`,
                tags: ['代码审查', '质量', '安全']
            },
            {
                title: '数学推理评测',
                category: 'reasoning',
                desc: '测试多步数学推理和问题分解能力',
                content: `请解决以下数学问题，展示完整的推理过程：

问题：一个水池有两个进水管和一个出水管。甲管单独注满需要6小时，乙管单独注满需要8小时，丙管单独排空需要12小时。如果三管同时开放，多久能注满水池？

要求：
1. 列出已知条件
2. 设定变量
3. 建立方程
4. 逐步求解
5. 验证答案
6. 说明解题思路`,
                tags: ['数学', '推理', '问题分解']
            },
            {
                title: '创意写作 Prompt',
                category: 'creative',
                desc: '激发创意，生成高质量的故事或文案',
                content: `请根据以下要素创作一个短故事（500字以内）：

设定：
- 时间：未来100年后
- 地点：火星殖民地
- 主角：一个AI机器人
- 冲突：发现了一个关于地球的秘密

要求：
1. 情节紧凑，有起承转合
2. 人物性格鲜明
3. 有意外转折
4. 结尾留有余味
5. 语言生动，富有画面感`,
                tags: ['创意', '写作', '故事']
            },
            {
                title: '文本分析 Prompt',
                category: 'analysis',
                desc: '深度分析文本的主题、情感和论证结构',
                content: `请分析以下文本：

[在此粘贴文本]

分析维度：
1. 主题：文本的核心主题是什么？
2. 论点：作者的主要观点是什么？
3. 论据：使用了哪些论据支持？
4. 逻辑：论证结构是否严密？
5. 情感：文本的情感倾向如何？
6. 受众：目标读者是谁？
7. 效果：文本的说服力如何？

请给出详细的分析报告。`,
                tags: ['文本分析', '批判性思维', '深度阅读']
            },
            {
                title: 'Few-shot 学习评测',
                category: 'evaluation',
                desc: '测试模型的少样本学习能力',
                content: `我会给你几个例子，然后请你完成类似的任务：

例子1：
输入：苹果
输出：水果

例子2：
输入：汽车
输出：交通工具

例子3：
输入：钢琴
输出：乐器

现在请完成：
输入：足球
输出：？

请说明你的推理过程。`,
                tags: ['Few-shot', '学习能力', '模式识别']
            },
            {
                title: 'Chain-of-Thought 推理',
                category: 'reasoning',
                desc: '引导模型展示逐步推理过程',
                content: `请使用思维链（Chain-of-Thought）方法解决以下问题：

问题：一个班级有40个学生，其中60%是女生。如果再加入10个男生，女生占比会变成多少？

请按以下格式回答：
1. 理解问题：[重述问题]
2. 已知信息：[列出已知]
3. 求解目标：[明确目标]
4. 推理步骤：
   步骤1：[...]
   步骤2：[...]
   步骤3：[...]
5. 最终答案：[...]
6. 验证：[检查答案是否合理]`,
                tags: ['CoT', '推理', '思维链']
            },
            {
                title: '代码生成评测',
                category: 'coding',
                desc: '评估代码生成的正确性和质量',
                content: `请根据以下需求生成代码：

需求：实现一个函数，判断一个字符串是否是回文

要求：
1. 语言：Python
2. 函数签名：def is_palindrome(s: str) -> bool
3. 忽略大小写和空格
4. 包含完整的文档字符串
5. 包含至少3个测试用例
6. 时间复杂度：O(n)
7. 空间复杂度：O(1)

请提供完整的代码和测试。`,
                tags: ['代码生成', 'Python', '算法']
            },
            {
                title: '对话能力评测',
                category: 'evaluation',
                desc: '测试多轮对话的连贯性和上下文理解',
                content: `我们来进行一个多轮对话测试：

第1轮：
我：你好，我想了解一下机器学习。
你：[请回答]

第2轮：
我：那深度学习和机器学习有什么区别？
你：[请回答]

第3轮：
我：你刚才提到的神经网络，能详细解释一下吗？
你：[请回答]

要求：
1. 保持上下文连贯
2. 回答准确且易懂
3. 适当引用前面的内容
4. 逐步深入话题`,
                tags: ['对话', '上下文', '多轮']
            },
            {
                title: '指令遵循评测',
                category: 'evaluation',
                desc: '测试模型遵循复杂指令的能力',
                content: `请严格按照以下指令完成任务：

任务：写一段关于春天的描述

指令：
1. 必须包含"樱花"、"微风"、"阳光"三个词
2. 使用比喻修辞手法至少2次
3. 总字数控制在100-150字之间
4. 第一句话必须是疑问句
5. 最后一句话必须是感叹句
6. 不能使用"美丽"、"漂亮"等直接形容词

完成后，请自我检查是否满足所有指令。`,
                tags: ['指令遵循', 'IFEval', '约束生成']
            },
            {
                title: '事实性评测',
                category: 'evaluation',
                desc: '测试模型回答的准确性和可靠性',
                content: `请回答以下问题，并标注你的确信度（1-10分）：

1. 地球的赤道周长是多少？
   答案：[...]
   确信度：[1-10]
   来源：[如果知道，请说明]

2. 第一个登上月球的人是谁？
   答案：[...]
   确信度：[1-10]
   来源：[如果知道，请说明]

3. Python 语言的创始人是谁？
   答案：[...]
   确信度：[1-10]
   来源：[如果知道，请说明]

如果不确定，请明确说明"不确定"，不要编造答案。`,
                tags: ['事实性', 'TruthfulQA', '可靠性']
            }
        ];
        
        let currentCategory = 'all';
        let searchTerm = '';
        
        function renderPrompts() {
            const grid = document.getElementById('promptsGrid');
            const filtered = prompts.filter(p => {
                const matchCategory = currentCategory === 'all' || p.category === currentCategory;
                const matchSearch = searchTerm === '' || 
                    p.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    p.desc.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    p.content.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    p.tags.some(t => t.toLowerCase().includes(searchTerm.toLowerCase()));
                return matchCategory && matchSearch;
            });
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty-state"><p>没有找到匹配的模板</p></div>';
                return;
            }
            
            grid.innerHTML = filtered.map((p, i) => `
                <div class="prompt-card">
                    <div class="prompt-header">
                        <div class="prompt-title">${p.title}</div>
                        <div class="prompt-category cat-${p.category}">${getCategoryName(p.category)}</div>
                    </div>
                    <div class="prompt-desc">${p.desc}</div>
                    <div class="prompt-content">${p.content.replace(/\n/g, '<br>')}</div>
                    <div class="prompt-tags">
                        ${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                    </div>
                    <div class="prompt-actions">
                        <button class="btn btn-copy" onclick="copyPrompt(${i})">📋 复制</button>
                    </div>
                </div>
            `).join('');
        }
        
        function getCategoryName(cat) {
            const names = {
                evaluation: '评测',
                translation: '翻译',
                coding: '编程',
                reasoning: '推理',
                creative: '创意',
                analysis: '分析'
            };
            return names[cat] || cat;
        }
        
        function copyPrompt(index) {
            const filtered = prompts.filter(p => {
                const matchCategory = currentCategory === 'all' || p.category === currentCategory;
                const matchSearch = searchTerm === '' || 
                    p.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    p.desc.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    p.content.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    p.tags.some(t => t.toLowerCase().includes(searchTerm.toLowerCase()));
                return matchCategory && matchSearch;
            });
            
            const prompt = filtered[index];
            navigator.clipboard.writeText(prompt.content).then(() => {
                alert('✅ Prompt 已复制到剪贴板！');
            });
        }
        
        // 搜索
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchTerm = e.target.value.trim();
            renderPrompts();
        });
        
        // 分类过滤
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                renderPrompts();
            });
        });
        
        // 初始渲染
        renderPrompts();
    </script>
</body>
</html>
