<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regex Tester Pro - 正则表达式测试工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .panel {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .panel-header {
            font-size: 1.3em;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .regex-input-group {
            margin-bottom: 15px;
        }

        .regex-input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .flags {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .flag-checkbox {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .flag-checkbox input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .flag-checkbox label {
            cursor: pointer;
            user-select: none;
        }

        textarea {
            width: 100%;
            min-height: 200px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .templates {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .template-btn {
            padding: 6px 12px;
            background: #f3f4f6;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.2s;
        }

        .template-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .result-area {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .match-highlight {
            background: #fef3c7;
            padding: 2px 4px;
            border-radius: 3px;
            font-weight: 600;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .matches-list {
            margin-top: 15px;
        }

        .match-item {
            background: white;
            border-left: 4px solid #667eea;
            padding: 10px 15px;
            margin-bottom: 10px;
            border-radius: 4px;
        }

        .match-index {
            color: #667eea;
            font-weight: 600;
            margin-right: 10px;
        }

        .match-text {
            color: #333;
            font-family: 'Courier New', monospace;
        }

        .groups {
            margin-top: 8px;
            padding-left: 20px;
            font-size: 0.9em;
            color: #666;
        }

        .group-item {
            margin-top: 4px;
        }

        .replace-section {
            margin-top: 15px;
        }

        .replace-input {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            margin-bottom: 10px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px 15px;
            border-radius: 8px;
            margin-top: 15px;
            border-left: 4px solid #ef4444;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 Regex Tester Pro</h1>
            <p class="subtitle">增强版正则表达式测试工具</p>
        </header>

        <div class="main-grid">
            <!-- 左侧：正则输入 -->
            <div class="panel">
                <div class="panel-header">正则表达式</div>
                
                <div class="templates">
                    <button class="template-btn" onclick="loadTemplate('email')">📧 邮箱</button>
                    <button class="template-btn" onclick="loadTemplate('url')">🔗 URL</button>
                    <button class="template-btn" onclick="loadTemplate('phone')">📱 手机号</button>
                    <button class="template-btn" onclick="loadTemplate('chinese')">🀄 中文</button>
                    <button class="template-btn" onclick="loadTemplate('number')">🔢 数字</button>
                    <button class="template-btn" onclick="loadTemplate('date')">📅 日期</button>
                    <button class="template-btn" onclick="loadTemplate('ip')">🌐 IP地址</button>
                    <button class="template-btn" onclick="loadTemplate('json')">📦 JSON提取</button>
                </div>

                <div class="regex-input-group">
                    <div class="regex-input-wrapper">
                        <span style="font-family: 'Courier New', monospace; font-size: 1.2em; color: #667eea;">/</span>
                        <input type="text" id="regex" placeholder="输入正则表达式..." value="\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Z|a-z]{2,}\b">
                        <span style="font-family: 'Courier New', monospace; font-size: 1.2em; color: #667eea;">/</span>
                    </div>
                    
                    <div class="flags">
                        <div class="flag-checkbox">
                            <input type="checkbox" id="flag-g" checked>
                            <label for="flag-g">g (全局)</label>
                        </div>
                        <div class="flag-checkbox">
                            <input type="checkbox" id="flag-i">
                            <label for="flag-i">i (忽略大小写)</label>
                        </div>
                        <div class="flag-checkbox">
                            <input type="checkbox" id="flag-m">
                            <label for="flag-m">m (多行)</label>
                        </div>
                    </div>
                </div>

                <div class="panel-header" style="margin-top: 20px;">测试文本</div>
                <textarea id="testText" placeholder="输入要测试的文本...">联系我们：support@example.com 或 sales@company.org
访问网站：https://www.example.com
电话：13812345678 或 +86-138-1234-5678</textarea>

                <button onclick="testRegex()" style="width: 100%; margin-top: 15px;">🔍 测试匹配</button>
            </div>

            <!-- 右侧：匹配结果 -->
            <div class="panel">
                <div class="panel-header">匹配结果</div>
                
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-value" id="matchCount">0</div>
                        <div class="stat-label">匹配数量</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="groupCount">0</div>
                        <div class="stat-label">捕获组</div>
                    </div>
                </div>

                <div id="error"></div>

                <div class="panel-header" style="margin-top: 20px;">高亮显示</div>
                <div class="result-area" id="highlightResult">等待测试...</div>

                <div class="panel-header" style="margin-top: 20px;">匹配详情</div>
                <div class="matches-list" id="matchesList"></div>
            </div>

            <!-- 底部：替换功能 -->
            <div class="panel full-width">
                <div class="panel-header">替换功能</div>
                
                <div class="replace-section">
                    <input type="text" class="replace-input" id="replaceText" placeholder="输入替换文本（支持 $1, $2 等捕获组引用）...">
                    <button onclick="testReplace()">🔄 预览替换</button>
                </div>

                <div class="panel-header" style="margin-top: 20px;">替换结果</div>
                <div class="result-area" id="replaceResult">等待替换...</div>
            </div>
        </div>
    </div>

    <script>
        const templates = {
            email: {
                regex: '\\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Z|a-z]{2,}\\b',
                text: '联系我们：support@example.com 或 sales@company.org\n客服邮箱：service@test.com',
                flags: { g: true, i: false, m: false }
            },
            url: {
                regex: 'https?:\\/\\/(www\\.)?[-a-zA-Z0-9@:%._\\+~#=]{1,256}\\.[a-zA-Z0-9()]{1,6}\\b([-a-zA-Z0-9()@:%_\\+.~#?&//=]*)',
                text: '访问：https://www.example.com\n或者：http://test.org/path?query=value',
                flags: { g: true, i: false, m: false }
            },
            phone: {
                regex: '1[3-9]\\d{9}',
                text: '联系电话：13812345678\n备用号码：15987654321\n座机：010-12345678',
                flags: { g: true, i: false, m: false }
            },
            chinese: {
                regex: '[\\u4e00-\\u9fa5]+',
                text: 'Hello 你好 World 世界\n这是一段中文测试文本 with English mixed in',
                flags: { g: true, i: false, m: false }
            },
            number: {
                regex: '-?\\d+(\\.\\d+)?',
                text: '价格：99.99元\n温度：-5.5°C\n数量：1000个',
                flags: { g: true, i: false, m: false }
            },
            date: {
                regex: '\\d{4}-\\d{2}-\\d{2}',
                text: '发布日期：2026-02-26\n截止时间：2026-12-31\n创建于：2025-01-01',
                flags: { g: true, i: false, m: false }
            },
            ip: {
                regex: '\\b(?:\\d{1,3}\\.){3}\\d{1,3}\\b',
                text: '服务器IP：192.168.1.1\n网关：10.0.0.1\n公网IP：8.8.8.8',
                flags: { g: true, i: false, m: false }
            },
            json: {
                regex: '"([^"]+)"\\s*:\\s*"([^"]+)"',
                text: '{"name": "John", "email": "john@example.com", "age": "30"}',
                flags: { g: true, i: false, m: false }
            }
        };

        function loadTemplate(type) {
            const template = templates[type];
            document.getElementById('regex').value = template.regex;
            document.getElementById('testText').value = template.text;
            document.getElementById('flag-g').checked = template.flags.g;
            document.getElementById('flag-i').checked = template.flags.i;
            document.getElementById('flag-m').checked = template.flags.m;
            testRegex();
        }

        function getFlags() {
            let flags = '';
            if (document.getElementById('flag-g').checked) flags += 'g';
            if (document.getElementById('flag-i').checked) flags += 'i';
            if (document.getElementById('flag-m').checked) flags += 'm';
            return flags;
        }

        function testRegex() {
            const regexStr = document.getElementById('regex').value;
            const text = document.getElementById('testText').value;
            const flags = getFlags();
            
            const errorDiv = document.getElementById('error');
            errorDiv.innerHTML = '';

            try {
                const regex = new RegExp(regexStr, flags);
                const matches = [...text.matchAll(regex)];

                // 更新统计
                document.getElementById('matchCount').textContent = matches.length;
                document.getElementById('groupCount').textContent = matches.length > 0 ? matches[0].length - 1 : 0;

                // 高亮显示
                let highlighted = text;
                if (matches.length > 0) {
                    // 从后往前替换，避免位置偏移
                    const replacements = matches.map(m => ({
                        start: m.index,
                        end: m.index + m[0].length,
                        text: m[0]
                    })).sort((a, b) => b.start - a.start);

                    replacements.forEach(r => {
                        highlighted = highlighted.slice(0, r.start) + 
                            '<span class="match-highlight">' + r.text + '</span>' + 
                            highlighted.slice(r.end);
                    });
                }
                document.getElementById('highlightResult').innerHTML = highlighted || '无匹配';

                // 匹配详情
                const matchesList = document.getElementById('matchesList');
                if (matches.length === 0) {
                    matchesList.innerHTML = '<div style="color: #999; text-align: center; padding: 20px;">无匹配结果</div>';
                } else {
                    matchesList.innerHTML = matches.map((match, i) => {
                        let html = `<div class="match-item">
                            <span class="match-index">#${i + 1}</span>
                            <span class="match-text">${escapeHtml(match[0])}</span>`;
                        
                        if (match.length > 1) {
                            html += '<div class="groups">';
                            for (let j = 1; j < match.length; j++) {
                                if (match[j] !== undefined) {
                                    html += `<div class="group-item">捕获组 $${j}: ${escapeHtml(match[j])}</div>`;
                                }
                            }
                            html += '</div>';
                        }
                        
                        html += '</div>';
                        return html;
                    }).join('');
                }

            } catch (e) {
                errorDiv.innerHTML = `<div class="error">❌ 正则表达式错误：${e.message}</div>`;
                document.getElementById('highlightResult').textContent = '错误';
                document.getElementById('matchesList').innerHTML = '';
                document.getElementById('matchCount').textContent = '0';
                document.getElementById('groupCount').textContent = '0';
            }
        }

        function testReplace() {
            const regexStr = document.getElementById('regex').value;
            const text = document.getElementById('testText').value;
            const replaceText = document.getElementById('replaceText').value;
            const flags = getFlags();

            try {
                const regex = new RegExp(regexStr, flags);
                const result = text.replace(regex, replaceText);
                document.getElementById('replaceResult').textContent = result;
            } catch (e) {
                document.getElementById('replaceResult').innerHTML = `<span style="color: #ef4444;">错误：${e.message}</span>`;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 自动测试
        document.getElementById('regex').addEventListener('input', testRegex);
        document.getElementById('testText').addEventListener('input', testRegex);
        document.getElementById('flag-g').addEventListener('change', testRegex);
        document.getElementById('flag-i').addEventListener('change', testRegex);
        document.getElementById('flag-m').addEventListener('change', testRegex);

        // 初始测试
        testRegex();
    </script>
</body>
</html>
