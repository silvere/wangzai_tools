<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>白噪音生成器 🎧</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0b12;--card:#141520;--border:#1e2030;--text:#e4e4e7;--dim:#5a5e78;--accent:#6c5ce7}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 20px}
h1{font-size:26px;margin-bottom:4px}
h1 span{color:var(--accent)}
.subtitle{color:var(--dim);font-size:13px;margin-bottom:28px}
.status{padding:4px 12px;border-radius:12px;font-size:11px;margin-bottom:16px;border:1px solid var(--border);color:var(--dim)}
.status.ok{color:#00b894;border-color:#00b89440}
.sounds-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;max-width:900px;width:100%;margin-bottom:28px}
.sound-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;text-align:center;cursor:pointer;transition:.3s;position:relative;overflow:hidden}
.sound-card.active{border-color:var(--accent);box-shadow:0 0 20px rgba(108,92,231,.15)}
.sound-card:hover{transform:translateY(-2px)}
.sound-icon{font-size:36px;margin-bottom:8px}
.sound-name{font-size:14px;font-weight:600;margin-bottom:4px}
.sound-desc{font-size:11px;color:var(--dim);margin-bottom:12px}
.vol-slider{width:100%;height:4px;-webkit-appearance:none;appearance:none;background:var(--border);border-radius:2px;outline:none}
.vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer}
.vol-slider::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;border:none}
.vol-label{font-size:11px;color:var(--dim);margin-top:6px}
.controls{display:flex;gap:12px;align-items:center;margin-bottom:20px;flex-wrap:wrap;justify-content:center}
.ctrl-btn{padding:10px 24px;border-radius:10px;border:none;font-size:14px;font-weight:500;cursor:pointer;transition:.2s}
.btn-play{background:var(--accent);color:#fff}.btn-play:hover{opacity:.85}
.btn-stop{background:#2a2d3a;color:var(--text)}.btn-stop:hover{background:#3a3d4a}
.master-vol{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 16px}
.master-vol label{font-size:12px;color:var(--dim)}
.master-vol input{width:100px}
.presets-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;justify-content:center}
.preset{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--dim);font-size:12px;cursor:pointer;transition:.2s}
.preset:hover,.preset.active{border-color:var(--accent);color:var(--text);background:rgba(108,92,231,.1)}
.footer{margin-top:20px;font-size:11px;color:var(--dim);text-align:center}
</style>
</head>
<body>
<h1>🎧 <span>白噪音生成器</span></h1>
<p class="subtitle">点击音效卡片开始播放 · 拖动滑块调节音量</p>
<div class="status" id="status">正在生成音频...</div>
<div class="presets-row">
  <button class="preset" onclick="applyPreset('focus')">🎯 专注模式</button>
  <button class="preset" onclick="applyPreset('sleep')">😴 助眠模式</button>
  <button class="preset" onclick="applyPreset('nature')">🌿 自然模式</button>
  <button class="preset" onclick="applyPreset('rain')">🌧️ 雨天模式</button>
  <button class="preset" onclick="applyPreset('silence')">🔇 全部静音</button>
</div>
<div class="controls">
  <div class="master-vol">
    <label>🔊 总音量</label>
    <input type="range" min="0" max="100" value="80" id="masterVol" oninput="setMaster(this.value)">
  </div>
</div>
<div class="sounds-grid" id="soundsGrid"></div>
<div id="audioContainer" style="display:none"></div>
<div class="footer">纯浏览器生成 · 零网络请求 · 零外部依赖</div>

<script>
var SOUNDS = [
  {id:'white',name:'白噪音',desc:'经典白噪音',icon:'⚪'},
  {id:'pink',name:'粉噪音',desc:'更柔和，低频丰富',icon:'🩷'},
  {id:'brown',name:'棕噪音',desc:'深沉低频',icon:'🟤'},
  {id:'rain',name:'雨声',desc:'淅淅沥沥的雨滴',icon:'🌧️'},
  {id:'wind',name:'风声',desc:'轻柔的微风',icon:'🌬️'},
  {id:'fire',name:'篝火',desc:'噼啪作响的火焰',icon:'🔥'},
  {id:'wave',name:'海浪',desc:'有节奏的潮汐',icon:'🌊'},
  {id:'cricket',name:'虫鸣',desc:'夏夜蟋蟀声',icon:'🦗'},
  {id:'hum',name:'低频嗡鸣',desc:'稳定的低频振动',icon:'〰️'}
];

var sampleRate = 44100;
var duration = 8; // seconds - longer for more natural looping
var numSamples = sampleRate * duration;
var masterVolume = 0.8;
var audioElements = {};
var volumes = {};
SOUNDS.forEach(function(s){ volumes[s.id] = 0; });

// Generate WAV blob from PCM data
function makeWav(samples) {
  var buffer = new ArrayBuffer(44 + samples.length * 2);
  var view = new DataView(buffer);
  // RIFF header
  writeString(view, 0, 'RIFF');
  view.setUint32(4, 36 + samples.length * 2, true);
  writeString(view, 8, 'WAVE');
  writeString(view, 12, 'fmt ');
  view.setUint32(16, 16, true); // chunk size
  view.setUint16(20, 1, true);  // PCM
  view.setUint16(22, 1, true);  // mono
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true); // byte rate
  view.setUint16(32, 2, true);  // block align
  view.setUint16(34, 16, true); // bits per sample
  writeString(view, 36, 'data');
  view.setUint32(40, samples.length * 2, true);
  for (var i = 0; i < samples.length; i++) {
    var s = Math.max(-1, Math.min(1, samples[i]));
    view.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }
  return new Blob([buffer], {type: 'audio/wav'});
}

function writeString(view, offset, str) {
  for (var i = 0; i < str.length; i++) {
    view.setUint8(offset + i, str.charCodeAt(i));
  }
}

// Noise generators - improved quality with crossfade looping
function crossfadeLoop(d) {
  // Crossfade first and last 0.5s for seamless loop
  var fade = Math.floor(sampleRate * 0.5);
  for (var i = 0; i < fade; i++) {
    var t = i / fade;
    d[i] = d[i] * t + d[numSamples - fade + i] * (1 - t);
  }
  return d;
}

function normalize(d, target) {
  target = target || 0.7;
  var max = 0;
  for (var i = 0; i < d.length; i++) if (Math.abs(d[i]) > max) max = Math.abs(d[i]);
  if (max > 0) for (var i = 0; i < d.length; i++) d[i] = d[i] / max * target;
  return d;
}

function genWhite() {
  var d = new Float32Array(numSamples);
  for (var i = 0; i < numSamples; i++) d[i] = (Math.random() * 2 - 1) * 0.5;
  return crossfadeLoop(d);
}

function genPink() {
  var d = new Float32Array(numSamples);
  var b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
  for (var i = 0; i < numSamples; i++) {
    var w = Math.random() * 2 - 1;
    b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759;
    b2=0.969*b2+w*0.153852; b3=0.8665*b3+w*0.3104856;
    b4=0.55*b4+w*0.5329522; b5=-0.7616*b5-w*0.016898;
    d[i] = (b0+b1+b2+b3+b4+b5+b6+w*0.5362) * 0.11;
    b6 = w * 0.115926;
  }
  return crossfadeLoop(d);
}

function genBrown() {
  var d = new Float32Array(numSamples);
  var last = 0;
  for (var i = 0; i < numSamples; i++) {
    var w = Math.random() * 2 - 1;
    d[i] = (last + 0.02 * w) / 1.02;
    last = d[i];
    d[i] *= 3.5;
  }
  return crossfadeLoop(d);
}

function genRain() {
  var d = new Float32Array(numSamples);
  // Layer 1: filtered noise base (steady rain)
  var b0=0,b1=0,b2=0;
  for (var i = 0; i < numSamples; i++) {
    var w = Math.random() * 2 - 1;
    // Bandpass around 2-6kHz for rain-like texture
    b0 = b0 * 0.95 + w * 0.05;
    b1 = b1 * 0.98 + b0 * 0.02;
    d[i] = (b0 - b1) * 8;
  }
  // Layer 2: random droplet impacts
  for (var i = 0; i < numSamples; i++) {
    if (Math.random() < 0.0008) {
      var amp = 0.2 + Math.random() * 0.4;
      var len = Math.floor(80 + Math.random() * 200);
      for (var j = 0; j < len && i+j < numSamples; j++) {
        var env = Math.exp(-j / (len * 0.2));
        d[i+j] += (Math.random() * 2 - 1) * amp * env;
      }
    }
  }
  // Layer 3: slow volume variation (rain intensity)
  for (var i = 0; i < numSamples; i++) {
    var mod = 0.6 + 0.4 * Math.sin(2 * Math.PI * 0.12 * i / sampleRate + Math.sin(2 * Math.PI * 0.03 * i / sampleRate) * 2);
    d[i] *= mod;
  }
  return crossfadeLoop(normalize(d, 0.6));
}

function genWind() {
  var d = new Float32Array(numSamples);
  var last = 0;
  // Brown noise base
  for (var i = 0; i < numSamples; i++) {
    last = (last + (Math.random() * 2 - 1) * 0.02) / 1.02;
    d[i] = last * 3;
  }
  // Multiple slow modulations for natural gusting
  for (var i = 0; i < numSamples; i++) {
    var m1 = 0.4 + 0.6 * Math.sin(2 * Math.PI * 0.08 * i / sampleRate);
    var m2 = 0.7 + 0.3 * Math.sin(2 * Math.PI * 0.23 * i / sampleRate + 1.5);
    var m3 = 0.8 + 0.2 * Math.sin(2 * Math.PI * 0.05 * i / sampleRate + 3.0);
    d[i] *= m1 * m2 * m3;
  }
  // Add occasional whistle (high freq sine bursts)
  for (var i = 0; i < numSamples; i++) {
    if (Math.random() < 0.00005) {
      var freq = 800 + Math.random() * 1200;
      var len = Math.floor(sampleRate * (0.3 + Math.random() * 0.5));
      for (var j = 0; j < len && i+j < numSamples; j++) {
        var env = Math.sin(Math.PI * j / len);
        d[i+j] += Math.sin(2 * Math.PI * freq * j / sampleRate) * env * 0.03;
      }
    }
  }
  return crossfadeLoop(normalize(d, 0.5));
}

function genFire() {
  var d = new Float32Array(numSamples);
  // Base: low rumble (brown noise)
  var last = 0;
  for (var i = 0; i < numSamples; i++) {
    last = (last + (Math.random() * 2 - 1) * 0.015) / 1.015;
    d[i] = last * 2;
  }
  // Crackle layer: random sharp bursts
  for (var i = 0; i < numSamples; i++) {
    if (Math.random() < 0.002) {
      var amp = 0.3 + Math.random() * 0.5;
      var len = Math.floor(20 + Math.random() * 100);
      for (var j = 0; j < len && i+j < numSamples; j++) {
        var env = Math.exp(-j / (len * 0.15));
        d[i+j] += (Math.random() * 2 - 1) * amp * env;
      }
    }
  }
  // Pop layer: occasional louder pops
  for (var i = 0; i < numSamples; i++) {
    if (Math.random() < 0.0003) {
      var amp = 0.5 + Math.random() * 0.3;
      var len = Math.floor(50 + Math.random() * 150);
      for (var j = 0; j < len && i+j < numSamples; j++) {
        var env = Math.exp(-j / (len * 0.1));
        d[i+j] += (Math.random() * 2 - 1) * amp * env;
      }
    }
  }
  return crossfadeLoop(normalize(d, 0.55));
}

function genWave() {
  var d = new Float32Array(numSamples);
  var last = 0;
  // Brown noise base
  for (var i = 0; i < numSamples; i++) {
    last = (last + (Math.random() * 2 - 1) * 0.02) / 1.02;
    d[i] = last * 3;
  }
  // Wave envelope: slow rise and fall like ocean waves
  for (var i = 0; i < numSamples; i++) {
    // Multiple wave frequencies for natural feel
    var w1 = Math.pow(Math.max(0, Math.sin(2 * Math.PI * 0.1 * i / sampleRate)), 3);
    var w2 = Math.pow(Math.max(0, Math.sin(2 * Math.PI * 0.07 * i / sampleRate + 2)), 2) * 0.5;
    var w3 = 0.15; // constant base
    d[i] *= (w1 + w2 + w3);
  }
  // Add foam/hiss on wave peaks
  for (var i = 0; i < numSamples; i++) {
    var peak = Math.pow(Math.max(0, Math.sin(2 * Math.PI * 0.1 * i / sampleRate)), 6);
    if (peak > 0.3) {
      d[i] += (Math.random() * 2 - 1) * peak * 0.15;
    }
  }
  return crossfadeLoop(normalize(d, 0.5));
}

function genCricket() {
  var d = new Float32Array(numSamples);
  // Multiple cricket chirps at slightly different frequencies
  var crickets = [
    {freq: 4200, rate: 6.5, phase: 0, amp: 0.25},
    {freq: 4800, rate: 7.2, phase: 1.5, amp: 0.15},
    {freq: 5100, rate: 5.8, phase: 3.0, amp: 0.1}
  ];
  for (var i = 0; i < numSamples; i++) {
    for (var c = 0; c < crickets.length; c++) {
      var cr = crickets[c];
      var carrier = Math.sin(2 * Math.PI * cr.freq * i / sampleRate);
      var env = Math.max(0, Math.sin(2 * Math.PI * cr.rate * i / sampleRate + cr.phase));
      env = Math.pow(env, 3); // sharper chirp envelope
      d[i] += carrier * env * cr.amp;
    }
  }
  // Add occasional pauses (natural cricket behavior)
  for (var i = 0; i < numSamples; i++) {
    var pauseMod = 0.5 + 0.5 * Math.sin(2 * Math.PI * 0.15 * i / sampleRate);
    d[i] *= pauseMod;
  }
  return crossfadeLoop(d);
}

function genHum() {
  var d = new Float32Array(numSamples);
  for (var i = 0; i < numSamples; i++) {
    // Fundamental + harmonics for richer hum
    d[i] = Math.sin(2 * Math.PI * 60 * i / sampleRate) * 0.4
         + Math.sin(2 * Math.PI * 120 * i / sampleRate) * 0.15
         + Math.sin(2 * Math.PI * 180 * i / sampleRate) * 0.05
         + Math.sin(2 * Math.PI * 240 * i / sampleRate) * 0.02;
    // Subtle wobble
    d[i] *= 0.9 + 0.1 * Math.sin(2 * Math.PI * 0.5 * i / sampleRate);
  }
  return crossfadeLoop(d);
}

var generators = {
  white: genWhite, pink: genPink, brown: genBrown,
  rain: genRain, wind: genWind, fire: genFire,
  wave: genWave, cricket: genCricket, hum: genHum
};

// Create audio elements
function initAudioElements() {
  var container = document.getElementById('audioContainer');
  var count = 0;
  SOUNDS.forEach(function(s) {
    var samples = generators[s.id]();
    var blob = makeWav(samples);
    var url = URL.createObjectURL(blob);
    var audio = document.createElement('audio');
    audio.loop = true;
    audio.volume = 0;
    audio.src = url;
    audio.preload = 'auto';
    container.appendChild(audio);
    audioElements[s.id] = audio;
    count++;
    if (count === SOUNDS.length) {
      document.getElementById('status').textContent = '✓ 音频就绪，点击卡片播放';
      document.getElementById('status').className = 'status ok';
    }
  });
}

function toggleSound(id) {
  if (volumes[id] > 0) {
    volumes[id] = 0;
    audioElements[id].volume = 0;
    audioElements[id].pause();
  } else {
    volumes[id] = 0.5;
    audioElements[id].volume = 0.5 * masterVolume;
    audioElements[id].play().catch(function(e){
      document.getElementById('status').textContent = '播放失败: ' + e.message;
      document.getElementById('status').className = 'status';
    });
  }
  renderCards();
}

function setVolume(id, val) {
  volumes[id] = val / 100;
  audioElements[id].volume = Math.min(1, (val / 100) * masterVolume);
  if (val > 0) {
    audioElements[id].play().catch(function(){});
  } else {
    audioElements[id].pause();
  }
  updateCards();
}

function setMaster(val) {
  masterVolume = val / 100;
  SOUNDS.forEach(function(s) {
    if (volumes[s.id] > 0) {
      audioElements[s.id].volume = Math.min(1, volumes[s.id] * masterVolume);
    }
  });
}

var PRESETS = {
  focus:  {white:0,pink:35,brown:0,rain:0,wind:0,fire:0,wave:0,cricket:0,hum:20},
  sleep:  {white:0,pink:0,brown:40,rain:25,wind:0,fire:0,wave:0,cricket:15,hum:0},
  nature: {white:0,pink:0,brown:0,rain:20,wind:30,fire:0,wave:0,cricket:25,hum:0},
  rain:   {white:0,pink:0,brown:10,rain:50,wind:15,fire:0,wave:0,cricket:0,hum:0},
  silence:{white:0,pink:0,brown:0,rain:0,wind:0,fire:0,wave:0,cricket:0,hum:0}
};

function applyPreset(name) {
  var cfg = PRESETS[name];
  document.querySelectorAll('.preset').forEach(function(p) {
    var match = name==='focus'?'专注':name==='sleep'?'助眠':name==='nature'?'自然':name==='rain'?'雨天':'静音';
    p.classList.toggle('active', p.textContent.indexOf(match) >= 0);
  });
  SOUNDS.forEach(function(s) {
    var v = cfg[s.id] || 0;
    volumes[s.id] = v / 100;
    audioElements[s.id].volume = Math.min(1, (v / 100) * masterVolume);
    if (v > 0) {
      audioElements[s.id].play().catch(function(){});
    } else {
      audioElements[s.id].pause();
    }
  });
  renderCards();
}

function renderCards() {
  var grid = document.getElementById('soundsGrid');
  grid.innerHTML = SOUNDS.map(function(s) {
    return '<div class="sound-card' + (volumes[s.id] > 0 ? ' active' : '') + '" id="card_' + s.id + '" onclick="toggleSound(\'' + s.id + '\')">'
      + '<div class="sound-icon">' + s.icon + '</div>'
      + '<div class="sound-name">' + s.name + '</div>'
      + '<div class="sound-desc">' + s.desc + '</div>'
      + '<input type="range" class="vol-slider" min="0" max="100" value="' + Math.round(volumes[s.id]*100) + '"'
      + ' oninput="setVolume(\'' + s.id + '\',this.value);event.stopPropagation()" onclick="event.stopPropagation()">'
      + '<div class="vol-label">' + Math.round(volumes[s.id]*100) + '%</div>'
      + '</div>';
  }).join('');
}

function updateCards() {
  SOUNDS.forEach(function(s) {
    var card = document.getElementById('card_' + s.id);
    if (card) card.classList.toggle('active', volumes[s.id] > 0);
    var label = card ? card.querySelector('.vol-label') : null;
    if (label) label.textContent = Math.round(volumes[s.id]*100) + '%';
  });
}

renderCards();
setTimeout(initAudioElements, 100);
</script>
</body>
</html>
