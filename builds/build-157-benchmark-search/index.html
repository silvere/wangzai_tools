    <style>

            </div>
            <div class="flex flex-wrap gap-2 mt-4">
                <div class="text-sm text-gray-600 mr-2">快速筛选:</div>
                <button onclick="quickFilter('代码能力')" class="px-3 py-1 bg-blue-100 text-blue-800 rounded-full text-sm hover:bg-blue-200 transition">代码能力</button>
                <button onclick="quickFilter('推理与数学')" class="px-3 py-1 bg-green-100 text-green-800 rounded-full text-sm hover:bg-green-200 transition">推理与数学</button>
                <button onclick="quickFilter('知识与理解')" class="px-3 py-1 bg-purple-100 text-purple-800 rounded-full text-sm hover:bg-purple-200 transition">知识与理解</button>
                <button onclick="quickFilter('多模态')" class="px-3 py-1 bg-orange-100 text-orange-800 rounded-full text-sm hover:bg-orange-200 transition">多模态</button>
                <button onclick="quickFilter('Agent')" class="px-3 py-1 bg-red-100 text-red-800 rounded-full text-sm hover:bg-red-200 transition">Agent</button>

                <button onclick="quickFilter('安全与鲁棒性')" class="px-3 py-1 bg-pink-100 text-pink-800 rounded-full text-sm hover:bg-pink-200 transition">安全与鲁棒性</button>

        </div>

        <!-- 统计信息 -->

            <div class="bg-white rounded-lg shadow p-4 text-center">
                <div id="totalCount" class="text-3xl font-bold text-blue-600">71</div>

            </div>
            <div class="bg-white rounded-lg shadow p-4 text-center">
                <div id="codeCount" class="text-1xl font-bold text-green-600">10</div>

            {"day": 66, "name": "StrategyQA", "category": "推理与数学", "source": "Allen AI", "description": "策略问答，需要多步推理隐式策略知识", "tags": ["推理", "问答", "多步"], "link": null},
            {"day": 67, "name": "Flickr30k-CN", "category": "多模态", "source": "THU", "description": "Flickr30k中文数据集，图像描述中文评测", "tags": ["多模态", "中文", "图像描述"], "link": null},
            {"day": 68, "name": "VQAv2", "category": "多模态", "source": "Georgia Tech", "description": "视觉问答基准，测试模型回答图像问题的能力", "tags": ["多模态", "视觉问答", "图像"], "link": null},
            {"day": 69, "name": "RealToxicityPrompts", "category": "安全与鲁棒性", "source": "Allen AI", "description": "真实毒性提示数据集，评估模型生成有毒内容的可能性", "tags": ["安全", "毒性", "评估"], "link": null},
            {"day": 70, "name": "ToxiGen", "category": "安全与鲁棒性", "source": "UW", "description": "毒性生成基准，包含大量有毒和良性生成示例", "tags": ["安全", "毒性", "生成"], "link": null},
            {"day": 71, "name": "MultiPL-E", "category": "代码能力", "source": "University of Copenhagen", "description": "大规模多语言代码生成评测，18种编程语言，评测模型在不同语言的能力", "tags": ["代码", "多语言", "18种语言"], "link": null},
        ];

        const categoryColors = {
            "代码能力": "bg-blue",
            "推理与数学": "bg-green",
            "知识与理解": "bg-purple",
            "指令遵循": "bg-indigo",
            "Agent": "bg-red",
            "多模态": "bg-orange",
            "长上下文": "bg-teal",
            "工具调用": "bg-yellow",
            "安全与鲁棒性": "bg-pink",
            "综合对话": "bg-gray"
        };

        const categoryTextColors = {
            "代码能力": "text-blue-800",
            "推理与数学": "text-green-800",
            "知识与理解": "text-purple-800",
            "指令遵循": "text-indigo-800",
            "Agent": "text-red-800",
            "多模态": "text-orange-800",
            "长上下文": "text-teal-800",
            "工具调用": "text-yellow-800",
            "安全与鲁棒性": "text-pink-800",
            "综合对话": "text-gray-800"
        };

        const categoryBgLight = {
            "代码能力": "bg-blue-100",
            "推理与数学": "bg-green-100",
            "知识与理解": "bg-purple-100",
            "指令遵循": "bg-indigo-100",
            "Agent": "bg-red-100",
            "多模态": "bg-orange-100",
            "长上下文": "bg-teal-100",
            "工具调用": "bg-yellow-100",
            "安全与鲁棒性": "bg-pink-100",
            "综合对话": "bg-gray-100"
        };

        function getCategoryCount(category) {
            return benchmarks.filter(b => b.category === category).length;
        }

        function updateStats(results) {
            document.getElementById('totalCount').textContent = benchmarks.length;
            document.getElementById('codeCount').textContent = getCategoryCount('代码能力');
            document.getElementById('reasoningCount').textContent = getCategoryCount('推理与数学');
            document.getElementById('shownCount').textContent = results.length;
        }

        function createBenchmarkCard(b) {
            const tagHtml = b.tags.map(tag => `<span class="inline-block px-2 py-1 ${categoryBgLight[b.category]} ${categoryTextColors[b.category]} rounded text-xs mr-1 mb-1">${tag}</span>`).join('');
            
            return `
                <div class="bg-white rounded-lg shadow p-5 card-hover" onclick="highlightCard(this)">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="text-xl font-bold text-gray-800">${b.day}. ${b.name}</h3>
                        <span class="px-2 py-1 rounded text-xs font-semibold ${categoryBgLight[b.category]} ${categoryTextColors[b.category]}">${b.category}</span>
                    </div>
                    <p class="text-sm text-gray-500 mb-3">来源: ${b.source}</p>
                    <p class="text-gray-700 mb-4">${b.description}</p>
                    <div class="flex flex-wrap">
                        ${tagHtml}
                    </div>
                </div>
            `;
        }

        function searchBenchmarks() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const results = benchmarks.filter(b => {
                const searchText = `${b.name} ${b.category} ${b.source} ${b.description} ${(b.tags || []).join(' ')}`.toLowerCase();
                return searchText.includes(query);
            });
            
            renderResults(results);
            updateStats(results);
        }

        function quickFilter(category) {
            document.getElementById('searchInput').value = category;
            searchBenchmarks();
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            searchBenchmarks();
        }

        function renderResults(results) {
            const container = document.getElementById('results');
            const noResults = document.getElementById('noResults');
            
            if (results.length === 0) {
                container.innerHTML = '';
                noResults.classList.remove('hidden');
                return;
            }
            
            noResults.classList.add('hidden');
            container.innerHTML = results.map(b => createBenchmarkCard(b)).join('');
        }

        function highlightCard(element) {
            // 简单高亮效果，点击可以聚焦
            element.classList.toggle('ring-2');
            element.classList.toggle('ring-blue-500');
            setTimeout(() => {
                element.classList.toggle('ring-2');
                element.classList.toggle('ring-blue-500');
            }, 500);
        }

        // 初始渲染
        updateStats(benchmarks);
        renderResults(benchmarks);
    </script>
</body>
</html>
