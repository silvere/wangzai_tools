<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTTP 状态码查询工具 🔍</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        info: '#3b82f6',
                        success: '#10b981',
                        redirect: '#f59e0b',
                        client: '#ef4444',
                        server: '#8b5cf6',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .card-hover {
                transition: all 0.3s ease;
            }
            .card-hover:hover {
                transform: translateY(-4px);
                box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            }
            .status-badge {
                @apply px-3 py-1 rounded-full text-sm font-medium;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50 min-h-screen">
    <!-- 顶部导航 -->
    <header class="bg-white shadow-sm border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="bg-gradient-to-r from-info to-server p-2 rounded-lg">
                        <i class="fa fa-exchange text-white text-xl"></i>
                    </div>
                    <h1 class="text-2xl font-bold text-slate-800">HTTP 状态码查询工具 🔍</h1>
                </div>
                <div class="flex items-center space-x-2">
                    <span class="text-sm text-slate-500 bg-slate-100 px-3 py-1 rounded-full">完全离线 · 快速查询</span>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- 搜索区域 -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-8">
            <div class="max-w-2xl mx-auto">
                <label class="block text-sm font-medium text-slate-700 mb-2">输入状态码或关键词搜索</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa fa-search text-slate-400"></i>
                    </div>
                    <input 
                        id="searchInput" 
                        type="text" 
                        class="block w-full pl-10 pr-3 py-3 border border-slate-300 rounded-lg leading-5 bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-info focus:border-info text-lg" 
                        placeholder="输入 404、Not Found、权限不足 等关键词..."
                        autocomplete="off"
                    >
                </div>
                <div class="flex flex-wrap gap-2 mt-4">
                    <span class="text-sm text-slate-500">快速搜索：</span>
                    <button class="quick-search px-2 py-1 bg-blue-50 text-info rounded text-sm hover:bg-blue-100 transition" data-search="404">404</button>
                    <button class="quick-search px-2 py-1 bg-blue-50 text-info rounded text-sm hover:bg-blue-100 transition" data-search="500">500</button>
                    <button class="quick-search px-2 py-1 bg-blue-50 text-info rounded text-sm hover:bg-blue-100 transition" data-search="403">403</button>
                    <button class="quick-search px-2 py-1 bg-blue-50 text-info rounded text-sm hover:bg-blue-100 transition" data-search="301">301</button>
                    <button class="quick-search px-2 py-1 bg-blue-50 text-info rounded text-sm hover:bg-blue-100 transition" data-search="200">200</button>
                    <button class="quick-search px-2 py-1 bg-blue-50 text-info rounded text-sm hover:bg-blue-100 transition" data-search="重定向">重定向</button>
                    <button class="quick-search px-2 py-1 bg-blue-50 text-info rounded text-sm hover:bg-blue-100 transition" data-search="服务器错误">服务器错误</button>
                </div>
            </div>
        </div>

        <!-- 分类标签 -->
        <div class="flex flex-wrap justify-center gap-3 mb-8">
            <button class="category-btn px-4 py-2 bg-info text-white rounded-lg font-medium active" data-category="all">
                <i class="fa fa-list mr-1"></i> 全部
            </button>
            <button class="category-btn px-4 py-2 bg-info/10 text-info rounded-lg font-medium" data-category="1xx">
                <i class="fa fa-info-circle mr-1"></i> 1xx 信息
            </button>
            <button class="category-btn px-4 py-2 bg-success/10 text-success rounded-lg font-medium" data-category="2xx">
                <i class="fa fa-check-circle mr-1"></i> 2xx 成功
            </button>
            <button class="category-btn px-4 py-2 bg-redirect/10 text-redirect rounded-lg font-medium" data-category="3xx">
                <i class="fa fa-exchange mr-1"></i> 3xx 重定向
            </button>
            <button class="category-btn px-4 py-2 bg-client/10 text-client rounded-lg font-medium" data-category="4xx">
                <i class="fa fa-exclamation-triangle mr-1"></i> 4xx 客户端错误
            </button>
            <button class="category-btn px-4 py-2 bg-server/10 text-server rounded-lg font-medium" data-category="5xx">
                <i class="fa fa-times-circle mr-1"></i> 5xx 服务器错误
            </button>
        </div>

        <!-- 状态码列表 -->
        <div id="statusCodes" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- 状态码卡片会通过JS动态生成 -->
        </div>

        <!-- 无结果提示 -->
        <div id="noResult" class="hidden text-center py-12">
            <div class="text-6xl mb-4">🔍</div>
            <h3 class="text-xl font-semibold text-slate-800 mb-2">未找到匹配的状态码</h3>
            <p class="text-slate-500">请尝试其他关键词或状态码</p>
        </div>
    </main>

    <footer class="bg-white border-t border-slate-200 mt-12 py-6">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-slate-500 text-sm">
            <p>💡 旺仔工具百宝箱 - HTTP 状态码查询工具 | 完全本地运行，无需网络</p>
            <p class="mt-2">包含 RFC 标准定义的所有 HTTP 状态码及详细说明，开发调试必备</p>
        </div>
    </footer>

    <script>
        // HTTP 状态码数据
        const statusCodes = [
            // 1xx - 信息响应
            {
                code: 100,
                category: '1xx',
                name: 'Continue',
                nameCN: '继续',
                description: '服务器已经收到请求头，并且客户端应当继续发送请求的剩余部分。',
                color: 'info'
            },
            {
                code: 101,

                color: 'info'
            },
            {
                code: 102,

            {
                code: 103,

                nameCN: '早期提示',

                color: 'info'
            },

            // 2xx - 成功响应
            {
                code: 200,
                category: '2xx',
                name: 'OK',
                nameCN: '成功',
                description: '请求已成功，请求所希望的响应头或数据体将随此响应返回。',
                color: 'success'
            },
            {
                code: 201,
                category: '2xx',

            {
                code: 202,

            },
            {

            {
                code: 206,
                category: '2xx',

                color: 'success'
            },
            {
                code: 207,

            },
            {

            {

            {

                category: '3xx',

            {

            },
            {

                category: '4xx',

                color: 'client'
            },
            {
                code: 403,
                category: '4xx',
                name: 'Forbidden',
                nameCN: '禁止访问',
                description: '服务器已经理解请求，但是拒绝执行它。',
                color: 'client'

            {

            {

            {
                code: 410,
                category: '4xx',

            {

                color: 'client'
            },
            {
                code: 414,
                category: '4xx',
                name: 'URI Too Long',
                nameCN: '请求URI过长',
                description: '请求的URI长度超过了服务器能够解释的长度，因此服务器拒绝对该请求提供服务。',

            },
            {

            {

                color: 'server'
            },
            {
                code: 506,
                category: '5xx',
                name: 'Variant Also Negotiates',
                nameCN: '变体也协商',
                description: '服务器存在内部配置错误，被请求的协商变体资源被配置为参与透明内容协商本身，因此不是一个合适的协商端点。',
                color: 'server'
            },
            {
                code: 507,
                category: '5xx',
                name: 'Insufficient Storage',
                nameCN: '存储空间不足',
                description: '服务器无法存储完成请求所必须的内容。',
                color: 'server'
            },
            {
                code: 508,
                category: '5xx',
                name: 'Loop Detected',
                nameCN: '检测到循环',
                description: '服务器在处理请求时检测到一个无限循环。',
                color: 'server'
            },
            {
                code: 510,
                category: '5xx',
                name: 'Not Extended',
                nameCN: '未扩展',
                description: '获取资源所需要的策略并没有被满足。',
                color: 'server'
            },
            {
                code: 511,
                category: '5xx',
                name: 'Network Authentication Required',
                nameCN: '需要网络认证',
                description: '客户端需要进行身份验证才能获得网络访问权限。',
                color: 'server'
            }
        ];

        // DOM 元素
        const searchInput = document.getElementById('searchInput');
        const statusCodesContainer = document.getElementById('statusCodes');
        const noResult = document.getElementById('noResult');
        const categoryBtns = document.querySelectorAll('.category-btn');
        const quickSearchBtns = document.querySelectorAll('.quick-search');

        // 当前选中的分类
        let currentCategory = 'all';

        // 渲染状态码列表
        function renderStatusCodes(filteredCodes = statusCodes) {
            if (filteredCodes.length === 0) {
                statusCodesContainer.innerHTML = '';
                noResult.classList.remove('hidden');
                return;
            }

            noResult.classList.add('hidden');
            statusCodesContainer.innerHTML = filteredCodes.map(code => `
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 card-hover">
                    <div class="flex items-start justify-between mb-4">
                        <div>
                            <span class="status-badge bg-${code.color}/10 text-${code.color}">${code.category}</span>
                            <h3 class="text-2xl font-bold text-slate-800 mt-2">${code.code}</h3>
                        </div>
                        <button class="copy-btn p-2 text-slate-400 hover:text-${code.color} transition" data-code="${code.code} ${code.name}">
                            <i class="fa fa-copy"></i>
                        </button>
                    </div>
                    <h4 class="font-semibold text-slate-800 mb-1">${code.name}</h4>
                    <p class="text-${code.color} font-medium text-sm mb-3">${code.nameCN}</p>
                    <p class="text-slate-600 text-sm leading-relaxed">${code.description}</p>
                </div>
            `).join('');

            // 绑定复制按钮事件
            document.querySelectorAll('.copy-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const text = btn.getAttribute('data-code');
                    navigator.clipboard.writeText(text).then(() => {
                        const originalIcon = btn.innerHTML;
                        btn.innerHTML = '<i class="fa fa-check"></i>';
                        btn.classList.remove('text-slate-400');
                        btn.classList.add('text-green-500');
                        setTimeout(() => {
                            btn.innerHTML = originalIcon;
                            btn.classList.remove('text-green-500');
                            btn.classList.add('text-slate-400');
                        }, 2000);
                    });
                });
            });
        }

        // 过滤状态码
        function filterStatusCodes() {
            const searchTerm = searchInput.value.toLowerCase().trim();
            let filtered = statusCodes;

            // 分类过滤
            if (currentCategory !== 'all') {
                filtered = filtered.filter(code => code.category === currentCategory);
            }

            // 搜索过滤
            if (searchTerm) {
                filtered = filtered.filter(code => 
                    code.code.toString().includes(searchTerm) ||
                    code.name.toLowerCase().includes(searchTerm) ||
                    code.nameCN.includes(searchTerm) ||
                    code.description.includes(searchTerm)
                );
            }

            renderStatusCodes(filtered);
        }

        // 分类按钮事件
        categoryBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // 更新选中状态
                categoryBtns.forEach(b => {
                    b.classList.remove('bg-info', 'text-white');
                    const category = b.getAttribute('data-category');
                    if (category === '1xx') {
                        b.classList.add('bg-info/10', 'text-info');
                    } else if (category === '2xx') {
                        b.classList.add('bg-success/10', 'text-success');
                    } else if (category === '3xx') {
                        b.classList.add('bg-redirect/10', 'text-redirect');
                    } else if (category === '4xx') {
                        b.classList.add('bg-client/10', 'text-client');
                    } else if (category === '5xx') {
                        b.classList.add('bg-server/10', 'text-server');
                    } else {
                        b.classList.add('bg-info/10', 'text-info');
                    }
                });

                btn.classList.remove('bg-info/10', 'bg-success/10', 'bg-redirect/10', 'bg-client/10', 'bg-server/10');
                btn.classList.remove('text-info', 'text-success', 'text-redirect', 'text-client', 'text-server');
                btn.classList.add('bg-info', 'text-white');

                currentCategory = btn.getAttribute('data-category');
                filterStatusCodes();
            });
        });

        // 快速搜索按钮事件
        quickSearchBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const searchTerm = btn.getAttribute('data-search');
                searchInput.value = searchTerm;
                filterStatusCodes();
            });
        });

        // 搜索输入事件
        searchInput.addEventListener('input', filterStatusCodes);

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderStatusCodes();
        });
    </script>
</body>
</html>
