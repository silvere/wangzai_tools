<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>居家健身动作库 | 按部位分类，图文要点</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe-ui', Roboto, sans-serif;
        }
        .exercise-card {
            transition: all 0.2s ease;
        }
        .exercise-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gray-800 mb-3">🏋️ 居家健身动作库</h1>
            <p class="text-gray-600 text-lg">按部位分类收藏，图文要点随时查，在家健身不用翻找视频</p>
        </div>

        <!-- Filter -->
        <div class="flex flex-wrap justify-center gap-2 mb-8">
            <button class="filter-btn px-4 py-2 bg-blue-600 text-white rounded-full font-medium" data-filter="all">全部</button>
            <button class="filter-btn px-4 py-2 bg-white text-gray-700 rounded-full font-medium hover:bg-blue-100" data-filter="chest">胸部</button>
            <button class="filter-btn px-4 py-2 bg-white text-gray-700 rounded-full font-medium hover:bg-blue-100" data-filter="back">背部</button>
            <button class="filter-btn px-4 py-2 bg-white text-gray-700 rounded-full font-medium hover:bg-blue-100" data-filter="shoulder">肩部</button>
            <button class="filter-btn px-4 py-2 bg-white text-gray-700 rounded-full font-medium hover:bg-blue-100" data-filter="arm">手臂</button>
            <button class="filter-btn px-4 py-2 bg-white text-gray-700 rounded-full font-medium hover:bg-blue-100" data-filter="abs">核心</button>
            <button class="filter-btn px-4 py-2 bg-white text-gray-700 rounded-full font-medium hover:bg-blue-100" data-filter="leg">腿部</button>
            <button class="filter-btn px-4 py-2 bg-white text-gray-700 rounded-full font-medium hover:bg-blue-100" data-filter="cardio">有氧</button>
            <button class="filter-btn px-4 py-2 bg-white text-gray-700 rounded-full font-medium hover:bg-blue-100" data-filter="stretch">拉伸</button>
        </div>

        <!-- Exercise Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="exercise-grid">
            <!-- Populated by JS -->
        </div>

        <!-- Tips -->
        <div class="mt-12 bg-blue-50 rounded-xl p-6">
            <h3 class="text-xl font-semibold text-blue-800 mb-3">💡 健身小贴士</h3>
            <ul class="list-disc list-inside space-y-2 text-blue-700">
                <li>每个动作建议做 3~4 组，每组 8~12 次（力量）/ 15~20 次（塑形）</li>
                <li>健身前一定要热身 5~10 分钟，健身后拉伸放松</li>
                <li>如果动作过程中感到疼痛，立刻停下来，不要硬撑</li>
                <li>渐进超负荷，慢慢增加重量/次数，进步才会持续</li>
                <li>三分练七分吃，想要效果记得配合饮食</li>
            </ul>
        </div>

        <footer class="text-center mt-12 text-gray-500 text-sm">
            <p>Built with ❤️ by 旺仔 · 在家健身随时查动作</p>
        </footer>
    </div>

        function renderExercises(filter = 'all') {
            const grid = document.getElementById('exercise-grid');
            grid.innerHTML = '';

            const filtered = exercises.filter(e => filter === 'all' || e.muscle === filter);

            filtered.forEach(ex => {
                const card = document.createElement('div');
                card.className = 'exercise-card bg-white rounded-xl shadow-md overflow-hidden';
                card.innerHTML = `
                    <div class="p-5">
                        <div class="flex items-start justify-between mb-3">
                            <h3 class="text-xl font-bold text-gray-800">${ex.name}</h3>
                            <span class="px-2 py-1 ${getDifficultyColor(ex.difficulty)} rounded-full text-xs font-medium">${ex.difficulty}</span>
                        </div>
                        <p class="text-gray-600 mb-3">${ex.description}</p>
                        <div class="aspect-video bg-gray-100 rounded-lg mb-3 overflow-hidden">
                            <img src="${ex.imageUrl}" alt="${ex.name}" class="w-full h-full object-contain">
                        </div>
                        <div class="bg-blue-50 rounded-lg p-3">
                            <p class="text-sm text-blue-800"><strong>💡 要点:</strong> ${ex.tips}</p>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function getDifficultyColor(diff) {
            const map = {
                'simple': 'bg-green-100 text-green-700',
                'medium': 'bg-yellow-100 text-yellow-700',
                'hard': 'bg-red-100 text-red-700'
            };
            return map[diff] || map['medium'];
        }

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => {
                    b.classList.remove('bg-blue-600', 'text-white');
                    b.classList.add('bg-white', 'text-gray-700');
                });
                btn.classList.remove('bg-white', 'text-gray-700');
                btn.classList.add('bg-blue-600', 'text-white');
                renderExercises(btn.dataset.filter);
            });
        });

        // Initial render
        renderExercises();

</body>
</html>
