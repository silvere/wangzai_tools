<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大模型输出对比工具 🆚</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Noto Sans SC', sans-serif;
        }
        .score-badge {
            transition: all 0.2s ease;
        }
        .score-badge:hover {
            transform: scale(1.1);
        }
        .model-panel {
            transition: all 0.3s ease;
        }
        .text-area {
            resize: vertical;
            min-height: 300px;
            max-height: 800px;
        }
        .comparison-row {
            transition: background-color 0.2s ease;
        }
        .comparison-row:hover {
            background-color: #f8fafc;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-6 max-w-7xl">
        <!-- Header -->
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">大模型输出对比工具 🆚</h1>
            <p class="text-gray-600">并排对比两个大模型的回答，方便评测和选型</p>
        </header>

        <!-- Control Panel -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">问题/Prompt</label>
                    <textarea id="question" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-area" placeholder="在这里输入你给两个模型的同一个问题..."></textarea>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">对比结论（可选）</label>
                    <textarea id="conclusion" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none" placeholder="在这里写下你的对比结论和总结..." rows="4"></textarea>
                </div>
            </div>
            <div class="flex flex-wrap gap-3">
                <button onclick="addComparison()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-medium transition-colors">➕ 添加对比</button>
                <button onclick="clearAll()" class="bg-gray-600 hover:bg-gray-700 text-white px-6 py-2 rounded-lg font-medium transition-colors">🗑️ 清空全部</button>
                <button onclick="exportMarkdown()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg font-medium transition-colors">📝 导出 Markdown</button>
                <button onclick="saveComparison()" class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded-lg font-medium transition-colors">💾 保存到本地</button>
                <button onclick="loadComparison()" class="bg-orange-600 hover:bg-orange-700 text-white px-6 py-2 rounded-lg font-medium transition-colors">📂 加载本地保存</button>
            </div>
        </div>

        <!-- Model Names -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-6">
            <h2 class="text-lg font-semibold text-gray-800 mb-4">模型名称设置</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">左侧模型 A</label>
                    <input type="text" id="modelAName" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none" value="GPT-4o" placeholder="输入模型A名称">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">右侧模型 B</label>
                    <input type="text" id="modelBName" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none" value="Claude 3 Opus" placeholder="输入模型B名称">
                </div>
            </div>
        </div>

        <!-- Comparison List -->
        <div id="comparisonList" class="space-y-6">
            <!-- Comparison items will be added here -->
        </div>

        <!-- Instructions -->
        <div class="mt-8 bg-blue-50 border border-blue-200 rounded-xl p-6">
            <h3 class="text-lg font-semibold text-blue-900 mb-3">💡 使用说明</h3>
            <ul class="list-disc list-inside space-y-2 text-blue-800">
                <li>在上方输入你问两个模型的同一个问题，然后分别粘贴两个模型的回答</li>
                <li>可以给每个模型打分（1-10分），勾选你更喜欢哪个模型的回答</li>
                <li>支持添加多轮对比，可以对比同一个问题在不同轮次的回答</li>
                <li>完成后可以导出为 Markdown 格式，方便写评测报告使用</li>
                <li>所有数据都保存在浏览器本地，不会上传到任何服务器</li>
                <li>点击"保存到本地"可以把当前对比保存为文件，后续继续编辑</li>
            </ul>
        </div>

        <!-- Footer -->
        <footer class="mt-8 text-center text-gray-500 text-sm">
            <p>Build #152 - 旺仔工具百宝箱 • 完全本地运行 • 保护数据隐私</p>
        </footer>
    </div>

    <script>
        let comparisonCount = 0;
        let savedKey = 'llm-comparison-local-storage';

        function addComparison() {
            comparisonCount++;
            const container = document.getElementById('comparisonList');
            const item = document.createElement('div');
            item.className = 'comparison-item bg-white rounded-xl shadow-md overflow-hidden';
            item.id = `comparison-${comparisonCount}`;
            item.innerHTML = `
                <div class="bg-gray-100 px-6 py-3 flex items-center justify-between">
                    <h3 class="font-semibold text-gray-800">对比 #${comparisonCount}</h3>
                    <button onclick="removeComparison(${comparisonCount})" class="text-red-600 hover:text-red-800 px-3 py-1 rounded hover:bg-red-100 transition-colors">🗑️ 删除</button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2">
                    <!-- Model A -->
                    <div class="p-4 border-b md:border-b-0 md:border-r border-gray-200">
                        <div class="flex items-center justify-between mb-3">
                            <div class="flex items-center gap-2">
                                <div class="w-3 h-3 bg-blue-500 rounded-full"></div>
                                <span class="font-semibold text-gray-800" id="display-a-${comparisonCount}">${document.getElementById('modelAName').value || '模型 A'}</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="text-sm text-gray-600">分数:</span>
                                <div class="flex gap-1">
                                    ${generateScoreButtons(comparisonCount, 'a')}
                                </div>
                            </div>
                        </div>
                        <textarea id="output-a-${comparisonCount}" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-area" placeholder="在这里粘贴模型 A 的回答..."></textarea>
                        <div class="mt-3 flex items-center">
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" id="win-a-${comparisonCount}" class="w-4 h-4 text-blue-600 rounded focus:ring-blue-500" onchange="handleWinChange(${comparisonCount}, 'a')">
                                <span class="text-sm text-gray-700">✅ 我更喜欢这个回答</span>
                            </label>
                        </div>
                    </div>
                    <!-- Model B -->
                    <div class="p-4">
                        <div class="flex items-center justify-between mb-3">
                            <div class="flex items-center gap-2">
                                <div class="w-3 h-3 bg-green-500 rounded-full"></div>
                                <span class="font-semibold text-gray-800" id="display-b-${comparisonCount}">${document.getElementById('modelBName').value || '模型 B'}</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="text-sm text-gray-600">分数:</span>
                                <div class="flex gap-1">
                                    ${generateScoreButtons(comparisonCount, 'b')}
                                </div>
                            </div>
                        </div>
                        <textarea id="output-b-${comparisonCount}" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none text-area" placeholder="在这里粘贴模型 B 的回答..."></textarea>
                        <div class="mt-3 flex items-center">
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" id="win-b-${comparisonCount}" class="w-4 h-4 text-green-600 rounded focus:ring-green-500" onchange="handleWinChange(${comparisonCount}, 'b')">
                                <span class="text-sm text-gray-700">✅ 我更喜欢这个回答</span>
                            </label>
                        </div>
                    </div>
                </div>
                <div class="px-6 py-3 bg-gray-50 border-t border-gray-200">
                    <label class="block text-sm font-medium text-gray-700 mb-2">备注（可选）</label>
                    <textarea id="note-${comparisonCount}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none" rows="2" placeholder="对这一轮对比的备注说明..."></textarea>
                </div>
            `;
            container.appendChild(item);
            autoSave();
        }

        function generateScoreButtons(id, side) {
            let html = '';
            for (let i = 1; i <= 10; i++) {
                html += `<button onclick="setScore(${id}, '${side}', ${i})" id="score-${side}-${id}-${i}" class="score-badge w-6 h-6 text-xs rounded border border-gray-300 bg-white hover:bg-gray-100 text-gray-700 font-medium">${i}</button>`;
            }
            return html;
        }

        function setScore(cmpId, side, score) {
            // Clear previous selection
            for (let i = 1; i <= 10; i++) {
                const btn = document.getElementById(`score-${side}-${cmpId}-${i}`);
                if (i === score) {
                    btn.classList.remove('bg-white', 'border-gray-300', 'text-gray-700');
                    if (side === 'a') {
                        btn.classList.add('bg-blue-600', 'border-blue-600', 'text-white');
                    } else {
                        btn.classList.add('bg-green-600', 'border-green-600', 'text-white');
                    }
                } else {
                    btn.classList.remove('bg-blue-600', 'border-blue-600', 'text-white', 'bg-green-600', 'border-green-600', 'text-white');
                    btn.classList.add('bg-white', 'border-gray-300', 'text-gray-700');
                }
            }
            autoSave();
        }

        function getScore(cmpId, side) {
            for (let i = 10; i >= 1; i--) {
                const btn = document.getElementById(`score-${side}-${cmpId}-${i}`);
                if (btn && btn.classList.contains(side === 'a' ? 'bg-blue-600' : 'bg-green-600')) {
                    return i;
                }
            }
            return null;
        }

        function handleWinChange(cmpId, side) {
            const other = side === 'a' ? 'b' : 'a';
            const otherCheckbox = document.getElementById(`win-${other}-${cmpId}`);
            if (document.getElementById(`win-${side}-${cmpId}`).checked) {
                otherCheckbox.checked = false;
            }
            autoSave();
        }

        function removeComparison(id) {
            const item = document.getElementById(`comparison-${id}`);
            if (item) {
                item.remove();
            }
            autoSave();
        }

        function clearAll() {
            if (confirm('确定要清空所有对比内容吗？此操作不可撤销。')) {
                document.getElementById('comparisonList').innerHTML = '';
                document.getElementById('question').value = '';
                document.getElementById('conclusion').value = '';
                comparisonCount = 0;
                localStorage.removeItem(savedKey);
            }
        }

        function collectData() {
            const modelA = document.getElementById('modelAName').value || '模型 A';
            const modelB = document.getElementById('modelBName').value || '模型 B';
            const question = document.getElementById('question').value;
            const conclusion = document.getElementById('conclusion').value;
            const comparisons = [];

            const items = document.querySelectorAll('.comparison-item');
            items.forEach((item, index) => {
                const cmpId = parseInt(item.id.split('-')[1]);
                const outputA = document.getElementById(`output-a-${cmpId}`).value;
                const outputB = document.getElementById(`output-b-${cmpId}`).value;
                const scoreA = getScore(cmpId, 'a');
                const scoreB = getScore(cmpId, 'b');
                const winA = document.getElementById(`win-a-${cmpId}`).checked;
                const winB = document.getElementById(`win-b-${cmpId}`).checked;
                const note = document.getElementById(`note-${cmpId}`).value;

                comparisons.push({
                    index: cmpId,
                    outputA,
                    outputB,
                    scoreA,
                    scoreB,
                    winA,
                    winB,
                    note
                });
            });

            return {
                modelA,
                modelB,
                question,
                conclusion,
                comparisons
            };
        }

        function exportMarkdown() {
            const data = collectData();
            if (data.comparisons.length === 0) {
                alert('请先添加至少一组对比再导出');
                return;
            }

            let md = `# 大模型输出对比报告\n\n`;
            md += `## 对比模型\n\n`;
            md += `- **模型 A**: ${data.modelA}\n`;
            md += `- **模型 B**: ${data.modelB}\n\n`;

            if (data.question && data.question.trim()) {
                md += `## 问题\n\n\`\`\`\n${data.question.trim()}\n\`\`\`\n\n`;
            }

            let totalA = 0, countA = 0;
            let totalB = 0, countB = 0;
            let winA = 0, winB = 0;

            data.comparisons.forEach((cmp, i) => {
                md += `---\n\n`;
                md += `### 第 ${cmp.index} 轮对比\n\n`;

                if (cmp.note && cmp.note.trim()) {
                    md += `**备注**: ${cmp.note.trim()}\n\n`;
                }

                md += `| ${data.modelA}${cmp.scoreA ? ` (${cmp.scoreA}/10)` : ''} | ${data.modelB}${cmp.scoreB ? ` (${cmp.scoreB}/10)` : ''} |\n`;
                md += `|---|---|\n`;
                const outputA = cmp.outputA.trim().replace(/\|/g, '\\|').replace(/\n/g, '<br>');
                const outputB = cmp.outputB.trim().replace(/\|/g, '\\|').replace(/\n/g, '<br>');
                md += `| ${outputA} | ${outputB} |\n\n`;

                if (cmp.winA) {
                    md += `👉 **结果**: 更喜欢 ${data.modelA}\n\n`;
                    winA++;
                } else if (cmp.winB) {
                    md += `👉 **结果**: 更喜欢 ${data.modelB}\n\n`;
                    winB++;
                }

                if (cmp.scoreA) {
                    totalA += cmp.scoreA;
                    countA++;
                }
                if (cmp.scoreB) {
                    totalB += cmp.scoreB;
                    countB++;
                }
            });

            if (data.conclusion && data.conclusion.trim()) {
                md += `---\n\n`;
                md += `## 总结结论\n\n${data.conclusion.trim()}\n\n`;
            }

            // Add statistics
            md += `## 统计\n\n`;
            if (countA > 0 && countB > 0) {
                md += `- **平均分**: ${data.modelA} ${(totalA / countA).toFixed(2)} / ${data.modelB} ${(totalB / countB).toFixed(2)}\n`;
            }
            md += `- **偏好次数**: ${data.modelA} ${winA} 次 / ${data.modelB} ${winB} 次\n\n`;

            md += `*生成于: ${new Date().toLocaleString('zh-CN')}*\n`;

            // Download
            const blob = new Blob([md], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `llm-comparison-${data.modelA}-vs-${data.modelB}-${new Date().toISOString().slice(0, 10)}.md`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function autoSave() {
            const data = collectData();
            localStorage.setItem(savedKey, JSON.stringify(data));
        }

        function saveComparison() {
            const data = collectData();
            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `llm-comparison-${new Date().toISOString().slice(0, 10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            alert('对比数据已保存到文件');
        }

        function loadComparison() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json,application/json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        loadData(data);
                        alert('对比数据加载完成');
                    } catch (err) {
                        alert('加载失败: ' + err.message);
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function loadData(data) {
            // Clear existing
            document.getElementById('comparisonList').innerHTML = '';
            comparisonCount = 0;

            // Load basic info
            document.getElementById('modelAName').value = data.modelA || '模型 A';
            document.getElementById('modelBName').value = data.modelB || '模型 B';
            document.getElementById('question').value = data.question || '';
            document.getElementById('conclusion').value = data.conclusion || '';

            // Load comparisons
            data.comparisons.forEach(cmp => {
                comparisonCount = cmp.index;
                const container = document.getElementById('comparisonList');
                const item = document.createElement('div');
                item.className = 'comparison-item bg-white rounded-xl shadow-md overflow-hidden';
                item.id = `comparison-${cmp.index}`;
                item.innerHTML = `
                    <div class="bg-gray-100 px-6 py-3 flex items-center justify-between">
                        <h3 class="font-semibold text-gray-800">对比 #${cmp.index}</h3>
                        <button onclick="removeComparison(${cmp.index})" class="text-red-600 hover:text-red-800 px-3 py-1 rounded hover:bg-red-100 transition-colors">🗑️ 删除</button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2">
                        <!-- Model A -->
                        <div class="p-4 border-b md:border-b-0 md:border-r border-gray-200">
                            <div class="flex items-center justify-between mb-3">
                                <div class="flex items-center gap-2">
                                    <div class="w-3 h-3 bg-blue-500 rounded-full"></div>
                                    <span class="font-semibold text-gray-800" id="display-a-${cmp.index}">${data.modelA || '模型 A'}</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="text-sm text-gray-600">分数:</span>
                                    <div class="flex gap-1">
                                        ${generateScoreButtons(cmp.index, 'a')}
                                    </div>
                                </div>
                            </div>
                            <textarea id="output-a-${cmp.index}" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-area" placeholder="在这里粘贴模型 A 的回答...">${cmp.outputA || ''}</textarea>
                            <div class="mt-3 flex items-center">
                                <label class="flex items-center gap-2 cursor-pointer">
                                    <input type="checkbox" id="win-a-${cmp.index}" class="w-4 h-4 text-blue-600 rounded focus:ring-blue-500" onchange="handleWinChange(${cmp.index}, 'a')" ${cmp.winA ? 'checked' : ''}>
                                    <span class="text-sm text-gray-700">✅ 我更喜欢这个回答</span>
                                </label>
                            </div>
                        </div>
                        <!-- Model B -->
                        <div class="p-4">
                            <div class="flex items-center justify-between mb-3">
                                <div class="flex items-center gap-2">
                                    <div class="w-3 h-3 bg-green-500 rounded-full"></div>
                                    <span class="font-semibold text-gray-800" id="display-b-${cmp.index}">${data.modelB || '模型 B'}</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="text-sm text-gray-600">分数:</span>
                                    <div class="flex gap-1">
                                        ${generateScoreButtons(cmp.index, 'b')}
                                    </div>
                                </div>
                            </div>
                            <textarea id="output-b-${cmp.index}" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none text-area" placeholder="在这里粘贴模型 B 的回答...">${cmp.outputB || ''}</textarea>
                            <div class="mt-3 flex items-center">
                                <label class="flex items-center gap-2 cursor-pointer">
                                    <input type="checkbox" id="win-b-${cmp.index}" class="w-4 h-4 text-green-600 rounded focus:ring-green-500" onchange="handleWinChange(${cmp.index}, 'b')" ${cmp.winB ? 'checked' : ''}>
                                    <span class="text-sm text-gray-700">✅ 我更喜欢这个回答</span>
                                </label>
                            </div>
                        </div>
                    </div>
                    <div class="px-6 py-3 bg-gray-50 border-t border-gray-200">
                        <label class="block text-sm font-medium text-gray-700 mb-2">备注（可选）</label>
                        <textarea id="note-${cmp.index}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none" rows="2" placeholder="对这一轮对比的备注说明...">${cmp.note || ''}</textarea>
                    </div>
                `;
                container.appendChild(item);

                // Restore scores
                if (cmp.scoreA) {
                    setScore(cmp.index, 'a', cmp.scoreA);
                }
                if (cmp.scoreB) {
                    setScore(cmp.index, 'b', cmp.scoreB);
                }
            });

            autoSave();
        }

        function autoLoad() {
            const saved = localStorage.getItem(savedKey);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    if (data.comparisons && data.comparisons.length > 0) {
                        loadData(data);
                    }
                } catch (e) {
                    console.error('Auto load failed', e);
                }
            }
        }

        // Update model name displays when changed
        document.getElementById('modelAName').addEventListener('input', updateModelDisplays);
        document.getElementById('modelBName').addEventListener('input', updateModelDisplays);

        function updateModelDisplays() {
            const nameA = document.getElementById('modelAName').value || '模型 A';
            const nameB = document.getElementById('modelBName').value || '模型 B';
            const items = document.querySelectorAll('.comparison-item');
            items.forEach(item => {
                const cmpId = parseInt(item.id.split('-')[1]);
                const displayA = document.getElementById(`display-a-${cmpId}`);
                const displayB = document.getElementById(`display-b-${cmpId}`);
                if (displayA) displayA.textContent = nameA;
                if (displayB) displayB.textContent = nameB;
            });
            autoSave();
        }

        // Auto load on page open
        window.addEventListener('load', () => {
            autoLoad();
            // Add an empty comparison if none exists
            if (comparisonCount === 0) {
                addComparison();
            }
        });

        // Auto save on any input change
        document.addEventListener('input', () => {
            autoSave();
        });
    </script>
</body>
</html>
