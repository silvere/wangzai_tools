<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>原则</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0d0d0d;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", sans-serif;
      padding: 40px 20px;
    }

    .card {
      max-width: 560px;
      width: 100%;
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 48px 44px;
    }

    h1 {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 40px;
    }

    .principle {
      padding: 20px 0;
      border-bottom: 1px solid #1e1e1e;
      color: #d0d0d0;
      font-size: 17px;
      line-height: 1.8;
    }
    .principle:last-child {
      border-bottom: none;
    }
    .principle:first-of-type {
      padding-top: 0;
    }

    .footnote {
      margin-top: 40px;
      font-size: 12px;
      color: #333;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>原则</h1>

    <div class="principle">做个有用的人。</div>
    <div class="principle">关注自己，只关注自己的大脑，只专注在当下，不要被外界的声音所束缚。</div>
    <div class="principle">身体是第一位的。</div>
    <div class="principle">时间是自己的，永远不要骗自己。</div>
    <div class="principle">不一定非要当面聊，有时候语音或者视频，哪怕飞书上一段文字，也是不错的。</div>

    <div class="footnote">个人笔记</div>
  </div>
</body>
</html>
