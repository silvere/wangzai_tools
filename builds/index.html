<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旺仔工具索引 🥛 | Wangzai Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.15);
        }
        .search-box {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }
    </style>
</head>
<body>
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <header class="text-center mb-8">
            <h1 class="text-5xl font-bold text-white mb-3">🥛 旺仔工具索引</h1>
            <p class="text-xl text-gray-100">旺仔每4小时构建一个小工具，持续改善工作流</p>
        </header>

        <div class="search-box rounded-xl shadow-lg p-6 mb-8">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="🔍 搜索工具名称或描述..." 
                class="w-full px-4 py-3 text-lg border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                onkeyup="filterTools()"
            >
            <div class="mt-3 text-sm text-gray-500">
                <span id="countDisplay">共 <span id="toolCount">0</span> 个工具</span>
            </div>
        </div>

        <div id="toolsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- 工具卡片会被动态插入 -->
        </div>

        <footer class="text-center text-gray-200 mt-12 pb-8">
            <p class="text-lg">Built with ❤️ by 旺仔 🥛</p>
            <p class="text-sm mt-2">Every 4 hours, a new small tool is born</p>
        </footer>
    </div>

    <script>
        // 工具列表 - 构建时自动更新，这里保存所有工具信息
        const tools = [
            {
                id: "llm-knowledge-map",
                name: "LLM 知识图谱",
                description: "Claude Artifacts 导出的大模型知识图谱",
                url: "./llm-knowledge-map/",
                category: "参考资料"
            },
            {
                id: "build-158-llm-leaderboard-generator",
                name: "大模型评测榜单生成器",
                description: "输入benchmarks和模型分数，一键生成Markdown表格+雷达图",
                url: "./build-158-llm-leaderboard-generator/",
                category: "评测工具"
            },
            {
                id: "build-157-benchmark-search",
                name: "Benchmark 搜索引擎",
                description: "70+主流大模型评测基准全文搜索，支持分类筛选",
                url: "./build-157-benchmark-search/",
                category: "评测工具"
            },
            {
                id: "build-156-llm-pairwise-collector",
                name: "大模型 Pairwise 偏好收集工具",
                description: "收集 pairwise 人类偏好数据，用于RLHF和模型对比",
                url: "./build-156-llm-pairwise-collector/",
                category: "评测工具"
            },
            {
                id: "build-155-content-repurpose-tool",
                name: "多平台内容改写工具",
                description: "一篇长文一键改写成朋友圈/公众号/推特/即刻多个版本",
                url: "./build-155-content-repurpose-tool/",
                category: "内容工具"
            },
            {
                id: "build-154-json-to-csv-converter",
                name: "JSON 转 CSV 转换器",
                description: "一键转换JSON数组到CSV，支持嵌套自动展平",
                url: "./build-154-json-to-csv-converter/",
                category: "数据工具"
            },
            {
                id: "build-153-llm-benchmark-table-generator",
                name: "大模型Benchmark分数对比表生成器",
                description: "自动计算平均分，高亮最高分，导出Markdown表格",
                url: "./build-153-llm-benchmark-table-generator/",
                category: "评测工具"
            },
            {
                id: "build-152-llm-comparison-tool",
                name: "大模型输出对比工具",
                description: "并排对比两个模型输出，打分偏好统计，导出Markdown报告",
                url: "./build-152-llm-comparison-tool/",
                category: "评测工具"
            },
            {
                id: "daily-inspiration-generator",
                name: "每日灵感语录随机生成器",
                description: "50+高质量语录格言，每日一句获得灵感能量",
                url: "./daily-inspiration-generator/",
                category: "生活工具"
            },
            {
                id: "build-150-css-animation-generator",
                name: "CSS Animation 关键帧动画可视化生成器",
                description: "可视化配置CSS动画，实时预览，一键复制代码",
                url: "./build-150-css-animation-generator/",
                category: "开发工具"
            },
            {
                id: "build-149-css-backdrop-filter-generator",
                name: "CSS Backdrop-Filter 毛玻璃可视化生成器",
                description: "可视化调节毛玻璃效果，一键复制可用CSS",
                url: "./build-149-css-backdrop-filter-generator/",
                category: "开发工具"
            },
            {
                id: "build-148-css-transform-generator",
                name: "CSS Transform 变换可视化生成器",
                description: "可视化调节平移旋转缩放倾斜，一键复制CSS",
                url: "./build-148-css-transform-generator/",
                category: "开发工具"
            },
            {
                id: "build-147-css-border-radius-generator",
                name: "CSS Border-Radius 可视化生成器",
                description: "四个圆角独立调节，支持椭圆圆角，一键复制CSS",
                url: "./build-147-css-border-radius-generator/",
                category: "开发工具"
            },
            {
                id: "llm-explorer",
                name: "大模型参数探险家",
                description: "交互式浏览不同尺寸大模型参数和性能",
                url: "./llm-explorer/",
                category: "数据工具"
            },
            {
                id: "llm-pricing",
                name: "大模型API价格对比表",
                description: "主流大模型API价格对比，帮助选型",
                url: "./llm-pricing/",
                category: "参考资料"
            }
        ];

        const categoryColors = {
            "评测工具": "bg-red-100 text-red-800",
            "开发工具": "bg-blue-100 text-blue-800",
            "数据工具": "bg-green-100 text-green-800",
            "内容工具": "bg-yellow-100 text-yellow-800",
            "生活工具": "bg-purple-100 text-purple-800",
            "参考资料": "bg-gray-100 text-gray-800"
        };

        function renderTools(filteredTools) {
            const grid = document.getElementById('toolsGrid');
            const countDisplay = document.getElementById('toolCount');
            grid.innerHTML = '';
            countDisplay.textContent = filteredTools.length;

            filteredTools.forEach(tool => {
                const card = document.createElement('a');
                card.href = tool.url;
                card.target = '_blank';
                card.className = 'card bg-white rounded-xl shadow p-5 block';
                const colorClass = categoryColors[tool.category] || 'bg-gray-100 text-gray-800';
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="text-xl font-bold text-gray-800">${tool.name}</h3>
                        <span class="px-2 py-1 rounded-full text-xs font-semibold ${colorClass}">${tool.category}</span>
                    </div>
                    <p class="text-gray-600 mb-3">${tool.description}</p>
                    <div class="text-blue-600 font-medium text-sm">点击打开 →</div>
                `;
                grid.appendChild(card);
            });
        }

        function filterTools() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = tools.filter(tool => 
                tool.name.toLowerCase().includes(query) || 
                tool.description.toLowerCase().includes(query) ||
                tool.category.toLowerCase().includes(query)
            );
            renderTools(filtered);
        }

        // 初始渲染
        renderTools(tools);
    </script>
</body>
</html>
