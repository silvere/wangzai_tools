            "评测工具": "bg-red-100 text-red-800",
            "开发工具": "bg-blue-100 text-blue-800",
            "数据工具": "bg-green-100 text-green-800",
            "内容工具": "bg-yellow-100 text-yellow-800",
            "生活工具": "bg-purple-100 text-purple-800",
            "参考资料": "bg-gray-100 text-gray-800",
            "工具": "bg-indigo-100 text-indigo-800"
        };

        function getCategoryColor(category) {
            return categoryColors[category] || categoryColors["工具"];
        }

        function renderTools(filteredTools) {
            const grid = document.getElementById('toolsGrid');
            const countDisplay = document.getElementById('visibleCount');
            const totalCount = document.getElementById('totalCount');
            grid.innerHTML = '';
            countDisplay.textContent = filteredTools.length;
            totalCount.textContent = tools.length;

            filteredTools.forEach(tool => {
                const card = document.createElement('a');
                card.href = tool.url;
                card.target = '_blank';
                card.className = 'card bg-white rounded-xl shadow p-5 block';
                const colorClass = getCategoryColor(tool.category);
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="text-xl font-bold text-gray-800">${tool.name}</h3>
                        <span class="px-2 py-1 rounded-full text-xs font-semibold ${colorClass}">${tool.category}</span>
                    </div>
                    <p class="text-gray-600 mb-3 line-clamp-2">${tool.description || '工具'}</p>
                    <div class="text-blue-600 font-medium text-sm">点击打开 →</div>
                `;
                grid.appendChild(card);
            });
        }

        function filterTools() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = tools.filter(tool => 
                tool.name.toLowerCase().includes(query) || 
                tool.description.toLowerCase().includes(query) ||
                tool.category.toLowerCase().includes(query)
            );
            renderTools(filtered);
        }

        // 初始渲染
        renderTools(tools);
