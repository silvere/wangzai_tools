        // DOM Elements
        const searchInput = document.getElementById('searchInput');
        const categoryFilter = document.getElementById('categoryFilter');
        const difficultyFilter = document.getElementById('difficultyFilter');
        const benchmarkGrid = document.getElementById('benchmarkGrid');
        const noResults = document.getElementById('noResults');
        const detailModal = document.getElementById('detailModal');
        const closeModal = document.getElementById('closeModal');
        const totalCount = document.getElementById('totalCount');

        // Render benchmarks
        function renderBenchmarks(filtered = benchmarks) {
            benchmarkGrid.innerHTML = '';
            
            if (filtered.length === 0) {
                noResults.classList.remove('hidden');
                totalCount.textContent = '0';
                return;
            }
            
            noResults.classList.add('hidden');
            totalCount.textContent = filtered.length;
            
            filtered.forEach(benchmark => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-2xl shadow-lg overflow-hidden card-hover cursor-pointer';
                card.innerHTML = `
                    <div class="p-6">
                        <div class="flex items-start justify-between mb-4">
                            <div>
                                <div class="flex items-center gap-2 mb-2">
                                    <span class="tag ${getCategoryColor(benchmark.category)}">${benchmark.category}</span>
                                    <span class="tag bg-gray-100 text-gray-700">${'⭐'.repeat(benchmark.difficulty)}</span>
                                </div>
                                <h3 class="text-xl font-bold text-gray-900 mb-1">${benchmark.name}</h3>
                                <p class="text-sm text-gray-500">${benchmark.source} · ${benchmark.year}</p>
                            </div>
                            <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary">
                                <i class="fa fa-chevron-right"></i>
                            </div>
                        </div>
                        <p class="text-gray-700 text-sm leading-relaxed mb-4">${benchmark.description}</p>
                        <div class="flex items-center justify-between text-sm">
                            <span class="text-gray-600 flex items-center gap-1">
                                <i class="fa fa-trophy text-yellow-500"></i>
                                SOTA: ${benchmark.sota}
                            </span>
                            <span class="text-gray-600 flex items-center gap-1">
                                <i class="fa fa-list-ul text-blue-500"></i>
                                ${benchmark.count}
                            </span>
                        </div>
                    </div>
                `;
                
                card.addEventListener('click', () => openModal(benchmark));
                benchmarkGrid.appendChild(card);
            });
        }

        // Get category color
        function getCategoryColor(category) {
            const colors = {
                '代码能力': 'bg-green-100 text-green-800',
                '推理与数学': 'bg-orange-100 text-orange-800',
                '知识与理解': 'bg-purple-100 text-purple-800',
                '指令遵循': 'bg-blue-100 text-blue-800',
                'Agent': 'bg-red-100 text-red-800',
                '多模态': 'bg-pink-100 text-pink-800',
                '长上下文': 'bg-teal-100 text-teal-800',
                '安全与鲁棒性': 'bg-yellow-100 text-yellow-800',
                '工具调用': 'bg-indigo-100 text-indigo-800',
                '综合对话': 'bg-cyan-100 text-cyan-800'
            };
            return colors[category] || 'bg-gray-100 text-gray-800';
        }

        // Open modal
        function openModal(benchmark) {
            document.getElementById('modalTitle').textContent = benchmark.name;
            document.getElementById('modalCategory').textContent = benchmark.category;
            document.getElementById('modalDifficulty').textContent = '⭐'.repeat(benchmark.difficulty);
            document.getElementById('modalSource').textContent = benchmark.source;
            document.getElementById('modalYear').textContent = benchmark.year;
            document.getElementById('modalWhat').textContent = benchmark.what;
            document.getElementById('modalWhy').textContent = benchmark.why;
            document.getElementById('modalCount').textContent = benchmark.count;
            document.getElementById('modalSota').textContent = benchmark.sota;

            // Features
            const featuresList = document.getElementById('modalFeatures');
            featuresList.innerHTML = '';
            benchmark.features.forEach(feature => {
                const li = document.createElement('li');
                li.className = 'flex items-start gap-2';
                li.innerHTML = `<i class="fa fa-check-circle text-green-500 mt-1 flex-shrink-0"></i><span>${feature}</span>`;
                featuresList.appendChild(li);
            });

            // Limitations
            const limitationsList = document.getElementById('modalLimitations');
            limitationsList.innerHTML = '';
            benchmark.limitations.forEach(limitation => {
                const li = document.createElement('li');
                li.className = 'flex items-start gap-2';
                li.innerHTML = `<i class="fa fa-times-circle text-red-500 mt-1 flex-shrink-0"></i><span>${limitation}</span>`;
                limitationsList.appendChild(li);
            });

            // Links
            const linksDiv = document.getElementById('modalLinks');
            linksDiv.innerHTML = '';
            benchmark.links.forEach(link => {
                const a = document.createElement('a');
                a.href = link.url;
                a.target = '_blank';
                a.className = 'px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-gray-700 text-sm font-medium flex items-center gap-1 transition-all';
                a.innerHTML = `<i class="fa fa-external-link"></i> ${link.name}`;
                linksDiv.appendChild(a);
            });

            detailModal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        // Close modal
        closeModal.addEventListener('click', () => {
            detailModal.classList.add('hidden');
            document.body.style.overflow = 'auto';
        });

        // Close modal on outside click
        detailModal.addEventListener('click', (e) => {
            if (e.target === detailModal) {
                detailModal.classList.add('hidden');
                document.body.style.overflow = 'auto';
            }
        });

        // Filter benchmarks
        function filterBenchmarks() {
            const searchTerm = searchInput.value.toLowerCase();
            const category = categoryFilter.value;
            const difficulty = parseInt(difficultyFilter.value);

            const filtered = benchmarks.filter(benchmark => {
                const matchesSearch = 
                    benchmark.name.toLowerCase().includes(searchTerm) ||
                    benchmark.description.toLowerCase().includes(searchTerm) ||
                    benchmark.category.toLowerCase().includes(searchTerm) ||
                    benchmark.source.toLowerCase().includes(searchTerm) ||
                    benchmark.what.toLowerCase().includes(searchTerm);
                
                const matchesCategory = category === 'all' || benchmark.category === category;
                const matchesDifficulty = isNaN(difficulty) || benchmark.difficulty === difficulty;

                return matchesSearch && matchesCategory && matchesDifficulty;
            });

            renderBenchmarks(filtered);
        }

        // Event listeners
        searchInput.addEventListener('input', filterBenchmarks);
        categoryFilter.addEventListener('change', filterBenchmarks);
        difficultyFilter.addEventListener('change', filterBenchmarks);

        // Initial render
        renderBenchmarks();
    </script>
</body>
</html>
