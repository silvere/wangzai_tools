<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>调色板生成器 🎨</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a1a;--card:#12122a;--border:#1e1e40;--text:#e0e0e0;--dim:#888;--accent:#7c83ff}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
.container{max-width:720px;width:100%}
.header{text-align:center;padding:20px 0 12px}
.header h1{font-size:1.6em;color:#fff}
.header .sub{color:var(--dim);font-size:0.85em;margin-top:4px}
.controls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;align-items:center}
.ctrl-btn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:0.85em;transition:all 0.2s}
.ctrl-btn:hover{border-color:var(--accent);color:var(--accent)}
.ctrl-btn.active{background:rgba(124,131,255,0.12);border-color:var(--accent);color:var(--accent)}
.ctrl-btn.primary{background:linear-gradient(135deg,var(--accent),#5a5fd6);border:none;color:#fff;font-weight:600}
.ctrl-btn.primary:hover{opacity:0.9}
.palette{display:flex;gap:0;border-radius:16px;overflow:hidden;margin-bottom:16px;min-height:220px;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.swatch{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;padding:16px 8px;cursor:pointer;position:relative;transition:flex 0.3s}
.swatch:hover{flex:1.3}
.swatch .lock-btn{position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.3);border:none;color:#fff;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:0.85em;opacity:0;transition:opacity 0.2s;display:flex;align-items:center;justify-content:center}
.swatch:hover .lock-btn{opacity:1}
.swatch .lock-btn.locked{opacity:1;background:rgba(0,0,0,0.6)}
.swatch .info{background:rgba(0,0,0,0.35);backdrop-filter:blur(4px);border-radius:8px;padding:8px 10px;text-align:center;width:100%;max-width:120px}
.swatch .hex{font-weight:700;font-size:0.9em;color:#fff;letter-spacing:1px}
.swatch .rgb{font-size:0.7em;color:rgba(255,255,255,0.7);margin-top:2px}
.swatch .copy-hint{font-size:0.65em;color:rgba(255,255,255,0.5);margin-top:4px}
.shades{display:flex;gap:0;border-radius:12px;overflow:hidden;margin-bottom:16px;height:40px}
.shade{flex:1;cursor:pointer;position:relative;transition:flex 0.2s}
.shade:hover{flex:1.5}
.shade:hover::after{content:attr(data-hex);position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);font-size:0.7em;color:var(--dim);white-space:nowrap}
.section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.section-title{font-size:0.9em;font-weight:600;color:var(--dim);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.css-output{background:rgba(0,0,0,0.3);border-radius:8px;padding:12px;font-family:'SF Mono',Monaco,monospace;font-size:0.82em;line-height:1.6;color:#a5d6ff;white-space:pre;overflow-x:auto}
.copy-btn{background:rgba(124,131,255,0.1);border:1px solid var(--accent);color:var(--accent);padding:4px 12px;border-radius:6px;cursor:pointer;font-size:0.78em;transition:all 0.2s}
.copy-btn:hover{background:var(--accent);color:#fff}
.history-row{display:flex;gap:4px;margin-bottom:8px;cursor:pointer;border-radius:8px;padding:4px;transition:background 0.2s}
.history-row:hover{background:rgba(255,255,255,0.03)}
.history-swatch{flex:1;height:32px;border-radius:4px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);color:var(--accent);padding:10px 20px;border-radius:8px;font-size:0.9em;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:99}
.toast.show{opacity:1}
.kbd{display:inline-block;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:4px;padding:1px 6px;font-size:0.75em;color:var(--dim);margin-left:4px}
.footer{text-align:center;padding:16px 0;color:#444;font-size:0.8em}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🎨 调色板生成器</h1>
    <div class="sub">按空格键生成新配色 · 点击色块复制色值</div>
  </div>
  <div class="controls">
    <button class="ctrl-btn primary" onclick="generate()">🎲 生成 <span class="kbd">Space</span></button>
    <button class="ctrl-btn active" data-mode="random" onclick="setMode('random')">随机</button>
    <button class="ctrl-btn" data-mode="analogous" onclick="setMode('analogous')">类似色</button>
    <button class="ctrl-btn" data-mode="complementary" onclick="setMode('complementary')">互补色</button>
    <button class="ctrl-btn" data-mode="triadic" onclick="setMode('triadic')">三角色</button>
    <button class="ctrl-btn" data-mode="monochromatic" onclick="setMode('monochromatic')">单色系</button>
  </div>
  <div class="palette" id="palette"></div>
  <div class="shades" id="shades"></div>
  <div class="section">
    <div class="section-title"><span>📋 CSS 变量</span><button class="copy-btn" onclick="copyCSS()">复制</button></div>
    <div class="css-output" id="cssOutput"></div>
  </div>
  <div class="section">
    <div class="section-title"><span>📜 历史记录</span><button class="copy-btn" onclick="clearHistory()">清空</button></div>
    <div id="historyList"></div>
  </div>
  <div class="footer">🥛 旺仔出品 · 调色板生成器 · 点击色块复制 HEX</div>
</div>
<div class="toast" id="toast"></div>
<script>
let colors=[],locked=[false,false,false,false,false],mode='random',selectedIdx=0;
let history=JSON.parse(localStorage.getItem('palette-history')||'[]');

function hslToRgb(h,s,l){
  s/=100;l/=100;
  const a=s*Math.min(l,1-l);
  const f=n=>{const k=(n+h/30)%12;return l-a*Math.max(Math.min(k-3,9-k,1),-1)};
  return [Math.round(f(0)*255),Math.round(f(8)*255),Math.round(f(4)*255)];
}
function rgbToHex(r,g,b){return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('')}
function randH(){return Math.floor(Math.random()*360)}
function randS(){return 50+Math.floor(Math.random()*40)}
function randL(){return 35+Math.floor(Math.random()*35)}

function generateColors(){
  const baseH=randH(),baseS=randS(),baseL=randL();
  let hues=[];
  if(mode==='random'){
    hues=Array.from({length:5},()=>({h:randH(),s:randS(),l:randL()}));
  }else if(mode==='analogous'){
    hues=[-30,-15,0,15,30].map(d=>({h:(baseH+d+360)%360,s:baseS+Math.random()*10-5,l:baseL+Math.random()*15-7}));
  }else if(mode==='complementary'){
    const compH=(baseH+180)%360;
    hues=[{h:baseH,s:baseS,l:baseL},{h:(baseH+15)%360,s:baseS,l:baseL+10},{h:(baseH+345)%360,s:baseS,l:baseL-5},{h:compH,s:baseS,l:baseL},{h:(compH+15)%360,s:baseS,l:baseL+10}];
  }else if(mode==='triadic'){
    const h2=(baseH+120)%360,h3=(baseH+240)%360;
    hues=[{h:baseH,s:baseS,l:baseL},{h:(baseH+10)%360,s:baseS,l:baseL+12},{h:h2,s:baseS,l:baseL},{h:h3,s:baseS,l:baseL},{h:(h3+10)%360,s:baseS,l:baseL+12}];
  }else if(mode==='monochromatic'){
    hues=[20,35,50,65,80].map(l=>({h:baseH,s:baseS,l}));
  }
  return hues.map(c=>({h:((c.h%360)+360)%360,s:Math.max(30,Math.min(90,c.s)),l:Math.max(20,Math.min(80,c.l))}));
}

function generate(){
  const newColors=generateColors();
  colors=colors.map((c,i)=>locked[i]?c:newColors[i]);
  if(colors.length===0)colors=newColors;
  render();
  saveHistory();
}

function render(){
  const palette=document.getElementById('palette');
  palette.innerHTML=colors.map((c,i)=>{
    const [r,g,b]=hslToRgb(c.h,c.s,c.l);
    const hex=rgbToHex(r,g,b);
    return `<div class="swatch" style="background:${hex}" onclick="copyColor('${hex}')" onmouseenter="showShades(${i})">
      <button class="lock-btn ${locked[i]?'locked':''}" onclick="event.stopPropagation();toggleLock(${i})">${locked[i]?'🔒':'🔓'}</button>
      <div class="info"><div class="hex">${hex.toUpperCase()}</div><div class="rgb">rgb(${r},${g},${b})</div><div class="copy-hint">点击复制</div></div>
    </div>`;
  }).join('');
  showShades(selectedIdx);
  renderCSS();
}

function showShades(idx){
  selectedIdx=idx;
  const c=colors[idx];
  const shades=document.getElementById('shades');
  const steps=[10,20,30,40,50,60,70,80,90];
  shades.innerHTML=steps.map(l=>{
    const [r,g,b]=hslToRgb(c.h,c.s,l);
    const hex=rgbToHex(r,g,b);
    return `<div class="shade" style="background:${hex}" data-hex="${hex.toUpperCase()}" onclick="copyColor('${hex}')"></div>`;
  }).join('');
}

function toggleLock(i){locked[i]=!locked[i];render()}

function copyColor(hex){
  navigator.clipboard.writeText(hex.toUpperCase()).then(()=>showToast('✅ 已复制 '+hex.toUpperCase()));
}

function renderCSS(){
  const lines=colors.map((c,i)=>{
    const [r,g,b]=hslToRgb(c.h,c.s,c.l);
    return `  --color-${i+1}: ${rgbToHex(r,g,b)};`;
  });
  document.getElementById('cssOutput').textContent=`:root {\n${lines.join('\n')}\n}`;
}

function copyCSS(){
  const text=document.getElementById('cssOutput').textContent;
  navigator.clipboard.writeText(text).then(()=>showToast('✅ CSS 变量已复制'));
}

function setMode(m){
  mode=m;
  document.querySelectorAll('[data-mode]').forEach(b=>b.classList.toggle('active',b.dataset.mode===m));
  generate();
}

function saveHistory(){
  const entry=colors.map(c=>{const [r,g,b]=hslToRgb(c.h,c.s,c.l);return rgbToHex(r,g,b)});
  history.unshift(entry);
  if(history.length>15)history.pop();
  localStorage.setItem('palette-history',JSON.stringify(history));
  renderHistory();
}

function renderHistory(){
  const el=document.getElementById('historyList');
  if(history.length===0){el.innerHTML='<div style="color:var(--dim);font-size:0.83em;text-align:center;padding:8px">还没有记录</div>';return}
  el.innerHTML=history.map((pal,pi)=>`<div class="history-row" onclick="loadHistory(${pi})">${pal.map(hex=>`<div class="history-swatch" style="background:${hex}"></div>`).join('')}</div>`).join('');
}

function loadHistory(idx){
  const pal=history[idx];
  colors=pal.map(hex=>{
    const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    // approximate HSL
    const max=Math.max(r,g,b)/255,min=Math.min(r,g,b)/255,d=max-min;
    let h=0,s=0,l=(max+min)/2;
    if(d>0){
      s=l>0.5?d/(2-max-min):d/(max+min);
      if(max===r/255)h=((g/255-b/255)/d+(g<b?6:0))*60;
      else if(max===g/255)h=((b/255-r/255)/d+2)*60;
      else h=((r/255-g/255)/d+4)*60;
    }
    return {h:Math.round(h),s:Math.round(s*100),l:Math.round(l*100)};
  });
  locked=[false,false,false,false,false];
  render();
}

function clearHistory(){history=[];localStorage.removeItem('palette-history');renderHistory()}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1500);
}

document.addEventListener('keydown',e=>{
  if(e.code==='Space'&&e.target.tagName!=='INPUT'&&e.target.tagName!=='TEXTAREA'){e.preventDefault();generate()}
});

generate();
renderHistory();
</script>
</body>
</html>
